<div class="login-card">
  <img src="https://raw.githubusercontent.com/defensoriacordoba/portalgestion/refs/heads/main/Icono.png" class="login-logo" alt="Logo Defensoría">
  
  <h2 class="login-title">Portal de Gestión</h2>
  <p class="login-subtitle">Defensoría del Pueblo de Córdoba</p>
  
  <form id="form-login" onsubmit="procesarLogin(event)">
    <div class="form-group">
      <label for="login-dni"><i class="fas fa-id-card" style="margin-right: 5px; color: var(--text-light);"></i> Usuario (DNI)</label>
      <input type="text" id="login-dni" placeholder="Ej: 30123456" required autocomplete="username">
    </div>
    
    <div class="form-group">
      <label for="login-pass"><i class="fas fa-lock" style="margin-right: 5px; color: var(--text-light);"></i> Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" required autocomplete="current-password">
    </div>
    
    <div id="login-error" class="hidden" style="color: #ef4444; font-size: 0.85rem; margin-bottom: 20px; text-align: left; background: #fee2e2; padding: 10px 15px; border-radius: 8px; border: 1px solid #fecaca; display: flex; align-items: center; gap: 8px;">
       <i class="fas fa-exclamation-triangle"></i> <span id="login-error-text"></span>
    </div>
    
    <button type="submit" id="btn-login" class="btn-login">
      Ingresar al Sistema <i class="fas fa-arrow-right" style="margin-left: 5px;"></i>
    </button>
    
    <div style="margin-top: 25px;">
      <a href="javascript:void(0)" onclick="solicitarRecuperacion()" style="color: var(--primary); font-size: 0.85rem; text-decoration: none; font-weight: 600; transition: color 0.2s;">¿Olvidó su contraseña?</a>
    </div>
  </form>
</div>

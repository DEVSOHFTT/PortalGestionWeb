<script>
  /**
   * Admin_Usuarios_JS — Portal de Gestión - Defensoría del Pueblo
   */

  const _PERM_GROUPS = [
    { key:'ACT',    label:'Actuaciones',   color:'#7c3aed' },
    { key:'CASO',   label:'Casos',         color:'#059669' },
    { key:'AGENTE', label:'Agentes',       color:'#3B6D11' },
    { key:'USR',    label:'Usuarios',      color:'#2563eb' },
    { key:'INV',    label:'Inventario',    color:'#d97706' },
    { key:'CFG',    label:'Configuración', color:'#6b7280' },
  ];

  function _agruparPermisos(permisos) {
    const grupos = {};
    _PERM_GROUPS.forEach(g => { grupos[g.key] = { ...g, items: [] }; });
    const otros = { key:'OTROS', label:'Otros', color:'#6b7280', items: [] };
    permisos.forEach(p => {
      const prefix = (p.clave_tecnica || '').split('_')[0];
      if (grupos[prefix]) grupos[prefix].items.push(p);
      else otros.items.push(p);
    });
    const result = Object.values(grupos).filter(g => g.items.length > 0);
    if (otros.items.length > 0) result.push(otros);
    return result;
  }

  function _renderizarPermisos(containerId, permisos, seleccionados, cssClass) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const grupos = _agruparPermisos(permisos);

    container.innerHTML = grupos.map(g => {
      const checkedCount = g.items.filter(p => seleccionados.includes(p.id)).length;
      const allChecked   = checkedCount === g.items.length;

      const items = g.items.map(p => `
        <div class="perm-item" onclick="_togglePermItem('${p.id}','${cssClass}','${containerId}')">
          <input type="checkbox" id="perm-${p.id}" value="${p.id}" class="${cssClass}"
                 ${seleccionados.includes(p.id) ? 'checked' : ''}
                 onclick="event.stopPropagation(); _togglePermItem('${p.id}','${cssClass}','${containerId}',this)">
          <span class="perm-code">${p.clave_tecnica}</span>
          <span class="perm-desc">${p.nombre}</span>
        </div>`).join('');

      return `
        <div class="perm-group" id="pgrp-${containerId}-${g.key}">
          <div class="perm-group-hdr" onclick="_toggleGrupo('${containerId}','${g.key}')">
            <span class="perm-group-title">
              <span class="perm-group-dot" style="background:${g.color};"></span>
              ${g.label}
            </span>
            <span class="perm-group-count" id="pcnt-${containerId}-${g.key}">${checkedCount}/${g.items.length}</span>
            <button class="perm-group-toggle" id="ptgl-${containerId}-${g.key}"
                    onclick="event.stopPropagation(); _toggleGrupoPermisos('${containerId}','${g.key}','${cssClass}')">
              ${allChecked ? 'Quitar Todos' : 'Marcar Todos'}
            </button>
          </div>
          <div class="perm-group-body" id="pbody-${containerId}-${g.key}">${items}</div>
        </div>`;
    }).join('');
  }

  function _togglePermItem(permId, cssClass, containerId, cb) {
    const checkbox = cb || document.getElementById('perm-' + permId);
    if (!cb && checkbox) checkbox.checked = !checkbox.checked;
    _actualizarContadoresGrupo(containerId, cssClass);
  }

  function _toggleGrupo(containerId, key) {
    const body = document.getElementById(`pbody-${containerId}-${key}`);
    if (body) body.style.display = body.style.display === 'none' ? '' : 'none';
  }

  function _toggleGrupoPermisos(containerId, key, cssClass) {
    const g = _PERM_GROUPS.find(x => x.key === key) || { items: [] };
    const body = document.getElementById(`pbody-${containerId}-${key}`);
    if (!body) return;
    const checks = body.querySelectorAll(`.${cssClass}`);
    const allChecked = Array.from(checks).every(c => c.checked);
    checks.forEach(c => c.checked = !allChecked);
    _actualizarContadoresGrupo(containerId, cssClass);
  }

  function _actualizarContadoresGrupo(containerId, cssClass) {
    _PERM_GROUPS.forEach(g => {
      const body    = document.getElementById(`pbody-${containerId}-${g.key}`);
      const cntEl   = document.getElementById(`pcnt-${containerId}-${g.key}`);
      const btEl    = document.getElementById(`ptgl-${containerId}-${g.key}`);
      if (!body) return;
      const checks  = body.querySelectorAll(`.${cssClass}`);
      const total   = checks.length;
      const checked = Array.from(checks).filter(c => c.checked).length;
      if (cntEl) cntEl.textContent = `${checked}/${total}`;
      if (btEl)  btEl.textContent  = checked === total ? 'Quitar Todos' : 'Marcar Todos';
    });
  }

  // =========================================================

  window.AdminUsuarios = {

    _cache: null,
    _todos: [],

    iniciar: function() {
      document.getElementById('ruta-actual').innerText = 'Administración de Usuarios';
      if (!window.USUARIO_ACTUAL || parseInt(window.USUARIO_ACTUAL.tipoUsuario) !== 1) {
        Portal_Core.mostrarToast('error', 'Acceso Denegado', 'Solo usuarios de tipo Sistemas pueden acceder.');
        cargarModulo('PortalHome');
        return;
      }
      
      ['modal-crear-usuario','modal-reset-password','modal-editar-usuario'].forEach(id => {
        const m = document.getElementById(id);
        if (m && m.parentElement !== document.body) document.body.appendChild(m);
      });
      this.cargarUsuarios();
    },

    toggleFiltrosPanel: function() {
      const panel = document.getElementById('adm-usr-filtros-panel');
      const btn = document.getElementById('btn-toggle-filtros-usr');
      if (!panel || !btn) return;
      
      const isOpen = panel.classList.toggle('open');
      if (isOpen) {
        btn.classList.add('btn-primary');
        btn.classList.remove('btn-outline');
      } else {
        btn.classList.add('btn-outline');
        btn.classList.remove('btn-primary');
      }
    },

    limpiarFiltros: function() {
      document.getElementById('usr-busqueda').value = '';
      this._filtrarLocal();
    },

    cargarUsuarios: async function() {
      const loader = document.getElementById('admin-usr-loader');
      const tabla  = document.getElementById('admin-usr-tabla');
      if (loader) loader.classList.remove('hidden');
      if (tabla)  tabla.classList.add('hidden');

      try {
        const res = await Portal_Core.ejecutarBackend('listarUsuariosSistema');
        if (loader) loader.classList.add('hidden');
        if (!res.success) { Portal_Core.mostrarToast('error', 'Error', res.message); return; }
        this._todos = res.data || [];
        this._filtrarLocal();
        if (tabla) tabla.classList.remove('hidden');
      } catch (err) {
        if (loader) loader.classList.add('hidden');
        Portal_Core.mostrarToast('error', 'Error de Red', err.message);
      }
    },

    _filtrarLocal: function() {
      const q = (document.getElementById('usr-busqueda')?.value || '').toLowerCase();
      const lista = q
        ? this._todos.filter(u => (u.apellido + ' ' + u.nombre + ' ' + u.username).toLowerCase().includes(q))
        : this._todos;
      this.renderizarTabla(lista);
    },

    renderizarTabla: function(usuarios) {
      const TIPOS   = { 1:'Sistemas', 2:'Administrador', 3:'Supervisor', 4:'Operador', 5:'Consulta' };
      const COLORES = { 1:'#7c3aed', 2:'#2563eb', 3:'#059669', 4:'#d97706', 5:'#6b7280' };
      const ICONS   = { 1:'fa-laptop-code', 2:'fa-user-tie', 3:'fa-user-shield', 4:'fa-user-cog', 5:'fa-eye' };

      const total    = this._todos.length;
      const activos  = this._todos.filter(u => u.estado).length;
      const sistemas = this._todos.filter(u => u.tipo_usuario_id === 1).length;
      const setTxt   = (id, v) => { const el = document.getElementById(id); if(el) el.innerText = v; };
      setTxt('usr-stat-total',   total);
      setTxt('usr-stat-activos', activos);
      setTxt('usr-stat-sistemas',sistemas);

      const body = document.getElementById('admin-usr-body');
      if (!usuarios || usuarios.length === 0) {
        body.innerHTML = `
          <div style="text-align:center; padding:80px 40px; color:var(--text-muted); background:var(--bg-surface); border-radius:var(--radius-lg); border:1px dashed var(--border-hard);">
            <i class="fas fa-users-slash fa-3x" style="opacity:0.15; margin-bottom:16px;"></i>
            <p style="font-weight:700; font-size:1rem; margin-bottom:4px; color:var(--text-main);">Sin resultados</p>
            <p style="font-size:0.85rem;">No se encontraron usuarios con esos parámetros.</p>
          </div>`;
        return;
      }

      body.innerHTML = `<div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:12px; text-align:right; font-weight:700; text-transform:uppercase;">
        ${usuarios.length} usuario${usuarios.length !== 1 ? 's' : ''}</div>` +
        usuarios.map((u, i) => {
          const tipo  = TIPOS[u.tipo_usuario_id]   || 'Sin rol asignado';
          const color = COLORES[u.tipo_usuario_id] || '#6b7280';
          const iconT = ICONS[u.tipo_usuario_id]   || 'fa-user';
          const permisos   = (u.accesos || []).length;
          
          const estadoKey = u.estado ? 'ACCESO HABILITADO' : 'ACCESO SUSPENDIDO';
          const cE = u.estado ? 'var(--success)' : 'var(--danger)';
          const bgE = u.estado ? 'var(--success-bg)' : 'var(--danger-bg)';
          const iE = u.estado ? 'fa-check-circle' : 'fa-ban';

          return `
          <div class="card-caso" style="${!u.estado ? 'opacity:0.7;' : ''}">
            <div style="width:5px; flex-shrink:0; background:${cE};"></div>
            
            <div class="tc-content">
              <div class="tc-header">
                <div class="tc-avatar" style="background:${color}18; color:${color};">
                  ${(u.apellido||'S')[0]}${(u.nombre||'D')[0]}
                </div>
                <div class="tc-info">
                  <div class="tc-title">
                    ${u.apellido||''}, ${u.nombre||''}
                  </div>
                  <div class="tc-subtitle">
                    <i class="far fa-id-badge"></i> <span style="font-family: monospace;">${u.username}</span>
                  </div>
                </div>
              </div>

              <div class="tc-badge" style="background:${bgE}; color:${cE};">
                <i class="fas ${iE}"></i> ${estadoKey}
              </div>

              <div class="tc-footer">
                <div class="tc-tags">
                  <span class="tc-tag" style="background:${color}18; color:${color};">
                    <i class="fas ${iconT}"></i> ${tipo}
                  </span>
                  <span class="tc-tag-text tc-border-left">
                    <i class="fas fa-key" style="color: var(--warning);"></i> ${permisos} permisos granulares
                  </span>
                </div>
                <div class="tc-actions">
                  <button class="btn btn-outline btn-icono" style="width:34px; height:34px;" onclick="AdminUsuarios.abrirEditar('${u.id}')" title="Modificar Permisos">
                    <i class="fas fa-pencil-alt" style="color:var(--primary); font-size: 0.8rem;"></i>
                  </button>
                  <button class="btn btn-outline btn-icono" style="width:34px; height:34px;" onclick="AdminUsuarios.abrirResetPassword('${u.username}','${u.apellido}, ${u.nombre}')" title="Blanquear Contraseña">
                    <i class="fas fa-key" style="color:var(--warning); font-size: 0.8rem;"></i>
                  </button>
                  <button class="btn btn-outline btn-icono" style="width:34px; height:34px;" onclick="AdminUsuarios.${u.estado ? 'confirmarDesactivar' : 'confirmarReactivar'}('${u.id}','${u.apellido}, ${u.nombre}')" title="${u.estado ? 'Suspender Acceso' : 'Reactivar Acceso'}">
                    <i class="fas ${u.estado ? 'fa-user-slash' : 'fa-user-check'}" style="color:${u.estado ? 'var(--danger)' : 'var(--success)'}; font-size: 0.8rem;"></i>
                  </button>
                </div>
              </div>
            </div>

          </div>`;
        }).join('');
    },

    _tabCrear: function(i) {
      document.querySelectorAll('#modal-crear-usuario .usr-tab-btn').forEach((b,idx) => b.classList.toggle('active', idx===i));
      
      document.querySelectorAll('#modal-crear-usuario .usr-tab-panel').forEach((p,idx) => {
        if (idx === i) {
          p.classList.remove('hidden');
          p.classList.add('active'); // ← FIX APLICADO
        } else {
          p.classList.add('hidden');
          p.classList.remove('active'); // ← FIX APLICADO
        }
      });
    },

    _tabEditar: function(i) {
      document.querySelectorAll('#modal-editar-usuario .usr-tab-btn').forEach((b,idx) => b.classList.toggle('active', idx===i));
      
      document.querySelectorAll('#modal-editar-usuario .usr-tab-panel').forEach((p,idx) => {
        if (idx === i) {
          p.classList.remove('hidden');
          p.classList.add('active'); // ← FIX APLICADO
        } else {
          p.classList.add('hidden');
          p.classList.remove('active'); // ← FIX APLICADO
        }
      });
    },

    abrirModalCrear: async function() {
      Portal_Core.abrirModal('modal-crear-usuario');

      document.getElementById('adm-agente').value       = '';
      document.getElementById('adm-password').value     = '';
      document.getElementById('adm-tipo-usuario').value = '';
      document.getElementById('adm-permisos-grid').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:0.85rem;"><i class="fas fa-circle-notch spinner"></i> Cargando cuadrícula...</div>';

      const btn = document.getElementById('btn-crear-usuario');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-save" style="margin-right:5px;"></i> Habilitar Usuario';

      this._tabCrear(0);

      try {
        const res = await Portal_Core.ejecutarBackend('obtenerDiccionariosUsuarios');
        if (!res.success) { Portal_Core.mostrarToast('error', 'Error', res.message); return; }
        this._cache = res.data;
        this._poblarFormulario(res.data);
      } catch (err) {
        Portal_Core.mostrarToast('error', 'Error de red', err.message);
      }
    },

    _poblarFormulario: function(data) {
      document.getElementById('adm-agente').innerHTML = '<option value="">Seleccione un agente...</option>' +
        data.agentes_sin_usuario.map(a => `<option value="${a.dni}">${a.apellido}, ${a.nombre} — DNI: ${a.dni}</option>`).join('');
      document.getElementById('adm-tipo-usuario').innerHTML = '<option value="">Seleccione tipo...</option>' +
        data.tipos_usuario.map(t => `<option value="${t.id}">${t.nombre} — ${t.descripcion}</option>`).join('');
      _renderizarPermisos('adm-permisos-grid', data.permisos, [], 'adm-permiso-check');
    },

    seleccionarTodosPermisos: function(valor) {
      document.querySelectorAll('.adm-permiso-check').forEach(cb => cb.checked = valor);
      _actualizarContadoresGrupo('adm-permisos-grid', 'adm-permiso-check');
    },

    generarPassword: function() {
      const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#';
      let p = ''; for (let i = 0; i < 10; i++) p += chars.charAt(Math.floor(Math.random() * chars.length));
      document.getElementById('adm-password').value = p;
    },

    guardarUsuario: async function() {
      const dni      = document.getElementById('adm-agente').value;
      const password = document.getElementById('adm-password').value.trim();
      const tipoId   = document.getElementById('adm-tipo-usuario').value;
      if (!dni)                            return Portal_Core.mostrarToast('warning', 'Validación', 'Seleccione un agente.');
      if (!password || password.length < 6) return Portal_Core.mostrarToast('warning', 'Validación', 'La contraseña debe tener al menos 6 caracteres.');
      if (!tipoId)                         return Portal_Core.mostrarToast('warning', 'Validación', 'Seleccione un rol del sistema.');

      const permisosIds = [];
      document.querySelectorAll('.adm-permiso-check:checked').forEach(cb => permisosIds.push(cb.value));

      const btn = document.getElementById('btn-crear-usuario');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i> Habilitando...';

      try {
        const res = await Portal_Core.ejecutarBackend('crearUsuarioSistema', { dni, password, tipo_usuario_id: tipoId, permisos_ids: permisosIds });
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-save" style="margin-right:5px;"></i> Habilitar Usuario';
        if (res.success) { 
          Portal_Core.cerrarModal('modal-crear-usuario'); 
          Portal_Core.mostrarToast('success','Usuario Creado',res.message); 
          this.cargarUsuarios(); 
        } else {
          Portal_Core.mostrarToast('error','Error',res.message);
        }
      } catch (err) {
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-save" style="margin-right:5px;"></i> Habilitar Usuario';
        Portal_Core.mostrarToast('error','Error de Red',err.message);
      }
    },

    abrirResetPassword: function(dni, nombreCompleto) {
      document.getElementById('reset-dni').value            = dni;
      document.getElementById('reset-nombre-agente').innerText = nombreCompleto;
      document.getElementById('reset-nuevo-pass').value     = '';
      Portal_Core.abrirModal('modal-reset-password');
    },

    generarPasswordReset: function() {
      const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#';
      let p = ''; for (let i = 0; i < 10; i++) p += chars.charAt(Math.floor(Math.random() * chars.length));
      document.getElementById('reset-nuevo-pass').value = p;
    },

    ejecutarReset: async function() {
      const dni       = document.getElementById('reset-dni').value;
      const nuevoPass = document.getElementById('reset-nuevo-pass').value.trim();
      if (!nuevoPass || nuevoPass.length < 6) return Portal_Core.mostrarToast('warning','Validación','Mínimo 6 caracteres.');
      const btn = document.getElementById('btn-reset-pass');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i>';

      try {
        const res = await Portal_Core.ejecutarBackend('resetearPasswordUsuario', dni, nuevoPass);
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-sync-alt" style="margin-right:5px;"></i> Restablecer Acceso';
        if (res.success) { 
          Portal_Core.cerrarModal('modal-reset-password'); 
          Portal_Core.mostrarToast('success','Contraseña Reseteada',res.message); 
        } else {
          Portal_Core.mostrarToast('error','Error',res.message);
        }
      } catch (err) {
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-sync-alt" style="margin-right:5px;"></i> Restablecer Acceso';
        Portal_Core.mostrarToast('error', 'Error de Red', err.message);
      }
    },

    confirmarDesactivar: function(usuarioId, nombre) {
      Portal_Core.mostrarConfirmacion('¿Suspender acceso?', `El usuario de ${nombre} será suspendido y no podrá ingresar al Portal.`, async () => {
        try {
          const res = await Portal_Core.ejecutarBackend('desactivarUsuario', usuarioId);
          if (res.success) { 
            Portal_Core.mostrarToast('success','Suspendido',res.message); 
            this.cargarUsuarios(); 
          } else {
            Portal_Core.mostrarToast('error','Error',res.message);
          }
        } catch (err) {
          Portal_Core.mostrarToast('error', 'Error de Red', err.message);
        }
      });
    },
    
    confirmarReactivar: function(usuarioId, nombre) {
      Portal_Core.mostrarConfirmacion('¿Reactivar usuario?', `El usuario de ${nombre} podrá ingresar nuevamente al Portal.`, async () => {
        try {
          const res = await Portal_Core.ejecutarBackend('reactivarUsuario', usuarioId);
          if (res.success) { 
            Portal_Core.mostrarToast('success','Reactivado',res.message); 
            this.cargarUsuarios(); 
          } else {
            Portal_Core.mostrarToast('error','Error',res.message);
          }
        } catch (err) {
          Portal_Core.mostrarToast('error', 'Error de Red', err.message);
        }
      });
    },

    abrirEditar: async function(usuarioId) {
      Portal_Core.abrirModal('modal-editar-usuario');
      const grid = document.getElementById('edit-usr-permisos-grid');
      if (grid) grid.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:0.85rem;"><i class="fas fa-circle-notch spinner"></i> Descargando accesos...</div>';
      this._tabEditar(0);

      try {
        const res = await Portal_Core.ejecutarBackend('obtenerUsuarioConPermisos', usuarioId);
        if (!res.success) { Portal_Core.cerrarModal('modal-editar-usuario'); Portal_Core.mostrarToast('error','Error',res.message); return; }
        const d = res.data, u = d.usuario;

        document.getElementById('edit-usr-id').value = u.id;
        document.getElementById('edit-usr-nombre').innerText = (u.apellido||'') + ', ' + (u.nombre||'');
        document.getElementById('edit-usr-dni-val').innerText = u.username;

        const AV_COLORS = ['#7c3aed','#059669','#2563eb','#d97706','#db2777'];
        const av = document.getElementById('edit-usr-avatar');
        if (av) {
          av.style.background = (AV_COLORS[Math.abs(u.id.charCodeAt(0) - 65) % AV_COLORS.length]) + '22';
          av.style.color = AV_COLORS[Math.abs(u.id.charCodeAt(0) - 65) % AV_COLORS.length];
          av.innerText = (u.apellido||'S')[0] + (u.nombre||'D')[0];
        }

        const selTipo = document.getElementById('edit-usr-tipo');
        selTipo.innerHTML = d.tipos_usuario.map(t =>
          `<option value="${t.id}"${t.id === u.tipo_usuario_id ? ' selected' : ''}>${t.nombre} — ${t.descripcion}</option>`
        ).join('');

        _renderizarPermisos('edit-usr-permisos-grid', d.todos_permisos, d.permisos_actuales, 'edit-permiso-check');
      } catch (err) {
        Portal_Core.cerrarModal('modal-editar-usuario'); 
        Portal_Core.mostrarToast('error','Error de Red',err.message);
      }
    },

    seleccionarTodosPermisosEdit: function(valor) {
      document.querySelectorAll('.edit-permiso-check').forEach(cb => cb.checked = valor);
      _actualizarContadoresGrupo('edit-usr-permisos-grid', 'edit-permiso-check');
    },

    guardarEdicion: async function() {
      const usuarioId  = document.getElementById('edit-usr-id').value;
      const tipoId     = document.getElementById('edit-usr-tipo').value;
      const permisosIds = [];
      document.querySelectorAll('.edit-permiso-check:checked').forEach(cb => permisosIds.push(cb.value));

      const btn = document.getElementById('btn-guardar-edicion-usr');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i> Actualizando...';

      try {
        const res = await Portal_Core.ejecutarBackend('actualizarUsuarioCompleto', usuarioId, tipoId, permisosIds);
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-save" style="margin-right:5px;"></i> Actualizar Perfil';
        if (res.success) { 
          Portal_Core.cerrarModal('modal-editar-usuario'); 
          Portal_Core.mostrarToast('success','Actualizado',res.message); 
          this.cargarUsuarios(); 
        } else {
          Portal_Core.mostrarToast('error','Error',res.message);
        }
      } catch (err) {
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-save" style="margin-right:5px;"></i> Actualizar Perfil';
        Portal_Core.mostrarToast('error','Error de Red',err.message);
      }
    }
  };
</script>

<script>
  window.AdminAgentes = {
    _cache: null,
    _todos: [],

    iniciar: function() {
      document.getElementById('ruta-actual').innerText = 'Gestión de Agentes';
      if (!window.USUARIO_ACTUAL || parseInt(window.USUARIO_ACTUAL.tipoUsuario) > 2) {
        Portal_Core.mostrarToast('error', 'Acceso Denegado', 'No tenés permisos para este módulo.');
        cargarModulo('PortalHome');
        return;
      }
      this._cargarDiccionarios(() => this.cargar());
    },

    _cargarDiccionarios: async function(callback) {
      if (this._cache) { this._poblarFiltros(); if (callback) callback(); return; }
      try {
        const res = await Portal_Core.ejecutarBackend('obtenerDiccionariosAgentes');
        if (res.success) { this._cache = res.data; this._poblarFiltros(); }
        if (callback) callback();
      } catch (err) {
        Portal_Core.mostrarToast('error', 'Error de Red', err.message);
      }
    },

    _poblarFiltros: function() {
      if (!this._cache) return;
      const sel = document.getElementById('adm-ag-filtro-area');
      if (sel && sel.options.length <= 1)
        sel.innerHTML = '<option value="">Todas las áreas</option>' + this._cache.areas.map(a => `<option value="${a.id}">${a.nombre}</option>`).join('');
    },

    _poblarSelect: function(id, items, placeholder) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = `<option value="">${placeholder || 'Seleccione...'}</option>` + (items || []).map(i => `<option value="${i.id}">${i.nombre}</option>`).join('');
    },

    cargar: async function() {
      document.getElementById('adm-ag-loader').classList.remove('hidden');
      document.getElementById('adm-ag-body').innerHTML = '';
      const filtros = {
        area_id: document.getElementById('adm-ag-filtro-area').value || undefined,
        estado: document.getElementById('adm-ag-filtro-estado').value
      };
      if (filtros.estado === '') delete filtros.estado;

      try {
        const res = await Portal_Core.ejecutarBackend('listarAgentesBackend', filtros);
        document.getElementById('adm-ag-loader').classList.add('hidden');
        if (!res.success) return Portal_Core.mostrarToast('error', 'Error', res.message);
        this._todos = res.data || [];
        this._filtrarLocal();
      } catch (err) {
        document.getElementById('adm-ag-loader').classList.add('hidden');
        Portal_Core.mostrarToast('error', 'Error de Red', err.message);
      }
    },

    _filtrarLocal: function() {
      const q = (document.getElementById('adm-ag-busqueda')?.value || '').toLowerCase();
      const lista = q ? this._todos.filter(a => (a.apellido + ' ' + a.nombre + ' ' + a.dni).toLowerCase().includes(q)) : this._todos;
      this._renderizar(lista);
    },

    _renderizar: function(agentes) {
      const body = document.getElementById('adm-ag-body');
      const AREAS = {}; const CARGOS = {}; const DELEGACIONES = {};
      if (this._cache) {
        this._cache.areas.forEach(a => AREAS[a.id] = a.nombre);
        this._cache.cargos.forEach(c => CARGOS[c.id] = c.nombre);
        this._cache.delegaciones.forEach(d => DELEGACIONES[d.id] = d.nombre);
      }

      const total    = this._todos.length;
      const activos  = this._todos.filter(a => a.estado).length;
      const inactivos = total - activos;
      const setTxt = (id, v) => { const el = document.getElementById(id); if(el) el.innerText = v; };
      setTxt('adm-ag-stat-total', total);
      setTxt('adm-ag-stat-activos', activos);
      setTxt('adm-ag-stat-inactivos', inactivos);

      if (!agentes || agentes.length === 0) {
        body.innerHTML = `
          <div style="text-align:center; padding:80px 40px; color:var(--text-muted); background:var(--bg-surface); border-radius:var(--radius-lg); border:1px dashed var(--border-hard);">
            <i class="fas fa-user-slash fa-3x" style="opacity:0.15; margin-bottom:16px;"></i>
            <p style="font-weight:700; font-size:1rem; margin-bottom:4px; color:var(--text-main);">Sin resultados</p>
            <p style="font-size:0.85rem;">No se encontraron agentes con los filtros aplicados.</p>
          </div>`;
        return;
      }

      const AV_COLORS = ['#7c3aed','#059669','#2563eb','#d97706','#db2777'];
      
      body.innerHTML = `<div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:12px; text-align:right; font-weight:700; text-transform:uppercase;">
        ${agentes.length} agente${agentes.length !== 1 ? 's' : ''}</div>` +
        agentes.map((a, i) => {
          const area  = AREAS[a.area_id] || 'Sin Área Asignada';
          const cargo = CARGOS[a.cargo_id] || 'Sin Cargo';
          const deleg = DELEGACIONES[a.delegacion_id] || 'Sede Central';
          const color = AV_COLORS[i % AV_COLORS.length];
          
          const estadoKey = a.estado ? 'ACTIVO' : 'INACTIVO';
          const cE = a.estado ? 'var(--success)' : 'var(--danger)';
          const bgE = a.estado ? 'var(--success-bg)' : 'var(--danger-bg)';
          const iE = a.estado ? 'fa-user-check' : 'fa-user-slash';

          return `
          <div class="card-caso" style="${!a.estado ? 'opacity:0.7;' : ''}">
            <div style="width:5px; flex-shrink:0; background:${cE};"></div>
            <div style="flex:1; padding:14px 18px; display:grid; grid-template-columns:1fr auto; gap:8px 16px; align-items:start;">
              
              <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:40px; height:40px; border-radius:10px; flex-shrink:0; background:${color}18; color:${color}; display:flex; align-items:center; justify-content:center; font-size:0.95rem; font-weight:800;">
                  ${(a.apellido||'S')[0]}${(a.nombre||'D')[0]}
                </div>
                <div style="min-width:0;">
                  <div style="font-weight:800; font-size:1.05rem; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:6px; letter-spacing: -0.01em;">
                    ${a.apellido}, ${a.nombre}
                    ${a.auth_id ? '<i class="fas fa-check-circle" style="font-size:0.7rem; color:var(--success);" title="Posee usuario del sistema"></i>' : ''}
                  </div>
                  <div style="font-size:0.8rem; color:var(--text-muted); display:flex; align-items:center; gap:4px; font-weight:500;">
                    <i class="fas fa-id-card" style="opacity:0.5;"></i> DNI: ${a.dni}
                  </div>
                </div>
              </div>

              <div style="display:flex; align-items:center; gap:5px; justify-self:end; padding:5px 12px; border-radius:20px; font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:0.3px; background:${bgE}; color:${cE}; white-space:nowrap; align-self:center;">
                <i class="fas ${iE}" style="font-size:0.65rem;"></i> ${estadoKey}
              </div>

              <div style="grid-column:1 / -1; display:flex; align-items:center; justify-content:space-between; border-top:1px dashed var(--border-soft); padding-top:12px; margin-top: 4px;">
                <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                  <span style="font-size:0.75rem; font-weight:700; padding:4px 12px; border-radius:8px; background:var(--primary-light); color:var(--primary); text-transform:uppercase; letter-spacing:0.5px;">
                    <i class="fas fa-building" style="margin-right:4px;"></i> ${area}
                  </span>
                  <span style="font-size:0.75rem; font-weight:600; color:var(--text-muted);"><i class="fas fa-briefcase" style="opacity:0.5; margin-right:4px;"></i> ${cargo}</span>
                  <span style="font-size:0.75rem; font-weight:600; color:var(--text-muted); border-left:1px solid var(--border-hard); padding-left:10px;"><i class="fas fa-map-marker-alt" style="opacity:0.5; margin-right:4px;"></i> ${deleg}</span>
                </div>
                <div style="display:flex; gap:6px;">
                  <button class="btn btn-outline btn-icono" style="width:34px; height:34px; background:var(--bg-surface);" onclick="event.stopPropagation();AdminAgentes.editar('${a.id}')" title="Editar Ficha">
                    <i class="fas fa-pencil-alt" style="color:var(--primary); font-size: 0.8rem;"></i>
                  </button>
                  <button class="btn btn-outline btn-icono" style="width:34px; height:34px; background:var(--bg-surface);" onclick="event.stopPropagation();AdminAgentes.toggleEstado('${a.id}',${!a.estado},'${a.apellido}, ${a.nombre}')" title="${a.estado ? 'Suspender Agente' : 'Habilitar Agente'}">
                    <i class="fas ${a.estado ? 'fa-user-slash' : 'fa-user-check'}" style="color:${a.estado ? 'var(--danger)' : 'var(--success)'}; font-size: 0.8rem;"></i>
                  </button>
                </div>
              </div>

            </div>
          </div>`;
        }).join('');
    },

    _tab: function(i) {
      // Toggle the active class on buttons
      document.querySelectorAll('.adm-tab-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
      
      // Toggle the 'hidden' class on the panels (this fixes the overlapping issue)
      document.querySelectorAll('.adm-tab-panel').forEach((p, idx) => {
        if (idx === i) {
          p.classList.remove('hidden');
        } else {
          p.classList.add('hidden');
        }
      });
    },

    _toggleDiscapacidad: function() {
      const cb  = document.getElementById('ag-discapacidad');
      const det = document.getElementById('ag-disc-detalle');
      if (!cb || !det) return;
      det.classList.toggle('hidden', !cb.checked);
    },

    abrirModal: function() {
      Portal_Core.abrirModal('modal-agente');

      document.getElementById('ag-id').value = '';
      document.getElementById('modal-ag-titulo').innerHTML = '<i class="fas fa-user-plus" style="color:var(--primary); margin-right:8px;"></i> Nuevo Agente';

      ['ag-apellido','ag-nombre','ag-dni','ag-cuil','ag-fecha-nac','ag-telefono','ag-email',
       'ag-domicilio','ag-titulo','ag-fecha-inicio','ag-fecha-venc','ag-hora-ingreso','ag-horas-laborales'].forEach(id => {
        const el = document.getElementById(id); if (el) el.value = '';
      });
      document.getElementById('ag-hijos').value = 0;
      document.getElementById('ag-discapacidad').checked = false;
      document.getElementById('ag-discapacidad-nombre').value = '';
      document.getElementById('ag-disc-detalle').classList.add('hidden');

      this._tab(0);
      this._poblarSelectsModal();
    },

    _poblarSelectsModal: function() {
      if (!this._cache) return;
      this._poblarSelect('ag-genero',        this._cache.generos,         'Seleccione...');
      this._poblarSelect('ag-estado-civil',  this._cache.estados_civil,   'Seleccione...');
      this._poblarSelect('ag-nivel-estudio', this._cache.niveles_estudio, 'Seleccione...');
      this._poblarSelect('ag-modalidad',     this._cache.modalidades,     'Seleccione...');
      this._poblarSelect('ag-delegacion',    this._cache.delegaciones,    'Seleccione...');
      this._poblarSelect('ag-area',          this._cache.areas,           'Seleccione...');
      this._poblarSelect('ag-cargo',         this._cache.cargos,          'Seleccione...');
    },

    editar: async function(id) {
      Portal_Core.abrirModal('modal-agente');
      this._poblarSelectsModal();
      this._tab(0);
      document.getElementById('modal-ag-titulo').innerHTML = '<i class="fas fa-pencil-alt" style="color:var(--primary); margin-right:8px;"></i> Editar Agente';

      try {
        const res = await Portal_Core.ejecutarBackend('obtenerAgenteBackend', id);
        if (!res.success) return Portal_Core.mostrarToast('error', 'Error', res.message);
        
        const a = res.data;
        document.getElementById('ag-id').value             = a.id;
        document.getElementById('ag-apellido').value       = a.apellido || '';
        document.getElementById('ag-nombre').value         = a.nombre || '';
        document.getElementById('ag-dni').value            = a.dni || '';
        document.getElementById('ag-cuil').value           = a.cuil || '';
        document.getElementById('ag-fecha-nac').value      = a.fecha_nacimiento || '';
        document.getElementById('ag-genero').value         = a.genero_id || '';
        document.getElementById('ag-estado-civil').value   = a.estado_civil_id || '';
        document.getElementById('ag-hijos').value          = a.hijos_a_cargo || 0;
        document.getElementById('ag-telefono').value       = a.telefono || '';
        document.getElementById('ag-email').value          = a.email || '';
        document.getElementById('ag-domicilio').value      = a.domicilio || '';
        document.getElementById('ag-nivel-estudio').value  = a.nivel_estudio_id || '';
        document.getElementById('ag-titulo').value         = a.titulo_obtenido || '';
        document.getElementById('ag-delegacion').value     = a.delegacion_id || '';
        document.getElementById('ag-area').value           = a.area_id || '';
        document.getElementById('ag-cargo').value          = a.cargo_id || '';
        document.getElementById('ag-modalidad').value      = a.modalidad_id || '';
        document.getElementById('ag-fecha-inicio').value   = a.fecha_inicio_sp || '';
        document.getElementById('ag-fecha-venc').value     = a.fecha_vencimiento_contrato || '';
        document.getElementById('ag-hora-ingreso').value   = a.hora_ingreso || '';
        document.getElementById('ag-horas-laborales').value = a.horas_laborales || '';
        document.getElementById('ag-discapacidad').checked = a.discapacidad || false;
        document.getElementById('ag-discapacidad-nombre').value = a.discapacidad_nombre || '';
        document.getElementById('ag-disc-detalle').classList.toggle('hidden', !a.discapacidad);
      } catch (err) {
        Portal_Core.cerrarModal('modal-agente');
        Portal_Core.mostrarToast('error', 'Error de Red', err.message);
      }
    },

    guardar: async function() {
      const apellido = document.getElementById('ag-apellido').value.trim();
      const nombre   = document.getElementById('ag-nombre').value.trim();
      const dni      = document.getElementById('ag-dni').value.trim();
      const cuil     = document.getElementById('ag-cuil').value.trim();

      if (!apellido || !nombre) return Portal_Core.mostrarToast('warning', 'Validación', 'Apellido y nombre son obligatorios.');
      if (!dni || dni.length < 7) return Portal_Core.mostrarToast('warning', 'Validación', 'DNI inválido (7-8 dígitos).');
      if (!cuil) return Portal_Core.mostrarToast('warning', 'Validación', 'CUIL es obligatorio.');

      const payload = {
        id: document.getElementById('ag-id').value || null,
        apellido, nombre, dni, cuil,
        fecha_nacimiento:           document.getElementById('ag-fecha-nac').value || null,
        genero_id:                  document.getElementById('ag-genero').value || null,
        estado_civil_id:            document.getElementById('ag-estado-civil').value || null,
        hijos_a_cargo:              document.getElementById('ag-hijos').value,
        telefono:                   document.getElementById('ag-telefono').value.trim() || null,
        email:                      document.getElementById('ag-email').value.trim() || null,
        domicilio:                  document.getElementById('ag-domicilio').value.trim() || null,
        nivel_estudio_id:           document.getElementById('ag-nivel-estudio').value || null,
        titulo_obtenido:            document.getElementById('ag-titulo').value.trim() || null,
        delegacion_id:              document.getElementById('ag-delegacion').value || null,
        area_id:                    document.getElementById('ag-area').value || null,
        cargo_id:                   document.getElementById('ag-cargo').value || null,
        modalidad_id:               document.getElementById('ag-modalidad').value || null,
        fecha_inicio_sp:            document.getElementById('ag-fecha-inicio').value || null,
        fecha_vencimiento_contrato: document.getElementById('ag-fecha-venc').value || null,
        hora_ingreso:               document.getElementById('ag-hora-ingreso').value || null,
        horas_laborales:            document.getElementById('ag-horas-laborales').value || null,
        discapacidad:               document.getElementById('ag-discapacidad').checked,
        discapacidad_nombre:        document.getElementById('ag-discapacidad-nombre').value.trim() || null,
        estado: true
      };

      const btn = document.getElementById('btn-guardar-agente');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i> Guardando...';

      try {
        const res = await Portal_Core.ejecutarBackend('guardarAgenteBackend', payload);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save" style="margin-right:5px;"></i> Guardar Agente';
        if (res.success) {
          Portal_Core.cerrarModal('modal-agente');
          Portal_Core.mostrarToast('success', 'Guardado', res.message);
          this.cargar();
        } else {
          Portal_Core.mostrarToast('error', 'Error', res.message);
        }
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save" style="margin-right:5px;"></i> Guardar Agente';
        Portal_Core.mostrarToast('error', 'Error de Red', err.message);
      }
    },

    toggleEstado: function(id, nuevoEstado, nombre) {
      Portal_Core.mostrarConfirmacion(
        `¿${nuevoEstado ? 'Activar' : 'Desactivar'} agente?`,
        `Se va a ${nuevoEstado ? 'activar' : 'desactivar'} a ${nombre}.`,
        async () => {
          try {
            const res = await Portal_Core.ejecutarBackend('toggleEstadoAgenteBackend', id, nuevoEstado);
            if (res.success) { 
              Portal_Core.mostrarToast('success', 'Actualizado', res.message); 
              this.cargar(); 
            } else {
              Portal_Core.mostrarToast('error', 'Error', res.message);
            }
          } catch (err) {
            Portal_Core.mostrarToast('error', 'Error de Red', err.message);
          }
        }
      );
    }
  };
</script>

<div style="padding:20px; max-width:1100px; margin:0 auto;">

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; flex-wrap:wrap; gap:12px;">
    <div>
      <h2 style="font-size:1.3rem; font-weight:800; color:var(--text-main); margin:0;">
        <i class="fas fa-id-badge" style="color:var(--primary); margin-right:8px;"></i>
        Gestión de Agentes
      </h2>
      <p style="font-size:0.8rem; color:var(--text-muted); margin-top:4px;">
        Alta, modificación y baja lógica del personal.
      </p>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <select id="adm-ag-filtro-area" class="form-input" style="max-width:200px; font-size:0.82rem;" onchange="AdminAgentes.cargar()">
        <option value="">Todas las Áreas</option>
      </select>
      <select id="adm-ag-filtro-estado" class="form-input" style="max-width:140px; font-size:0.82rem;" onchange="AdminAgentes.cargar()">
        <option value="">Todos</option>
        <option value="true" selected>Activos</option>
        <option value="false">Inactivos</option>
      </select>
      <button class="btn btn-primary" onclick="AdminAgentes.abrirModal()">
        <i class="fas fa-user-plus" style="margin-right:6px;"></i> Nuevo Agente
      </button>
    </div>
  </div>

  <div id="adm-ag-loader" style="text-align:center; padding:40px;">
    <i class="fas fa-circle-notch spinner fa-2x" style="color:var(--primary);"></i>
    <p style="margin-top:10px; color:var(--text-muted);">Cargando agentes...</p>
  </div>

  <div id="adm-ag-body"></div>
</div>

<!-- ============================================= MODAL ============================================= -->
<div id="modal-agente" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:700px; max-height:90vh; overflow-y:auto;">
    <div class="modal-header">
      <span id="modal-ag-titulo"><i class="fas fa-user-plus" style="color:var(--primary)"></i> Nuevo Agente</span>
      <button class="btn-icono" style="border:none;" onclick="Portal_Core.cerrarModal('modal-agente')"><i class="fas fa-times"></i></button>
    </div>
    <input type="hidden" id="ag-id" value="">

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
      <!-- Identificación -->
      <div class="form-group"><label class="form-label">Apellido <span style="color:var(--danger)">*</span></label>
        <input type="text" id="ag-apellido" class="form-input" required></div>
      <div class="form-group"><label class="form-label">Nombre <span style="color:var(--danger)">*</span></label>
        <input type="text" id="ag-nombre" class="form-input" required></div>
      <div class="form-group"><label class="form-label">DNI <span style="color:var(--danger)">*</span></label>
        <input type="text" id="ag-dni" class="form-input" maxlength="8" required></div>
      <div class="form-group"><label class="form-label">CUIL <span style="color:var(--danger)">*</span></label>
        <input type="text" id="ag-cuil" class="form-input" maxlength="13"></div>
      <div class="form-group"><label class="form-label">Fecha Nacimiento</label>
        <input type="date" id="ag-fecha-nac" class="form-input"></div>
      <div class="form-group"><label class="form-label">Género</label>
        <select id="ag-genero" class="form-input"></select></div>
      <div class="form-group"><label class="form-label">Estado Civil</label>
        <select id="ag-estado-civil" class="form-input"></select></div>
      <div class="form-group"><label class="form-label">Hijos a Cargo</label>
        <input type="number" id="ag-hijos" class="form-input" min="0" value="0"></div>

      <!-- Contacto -->
      <div class="form-group"><label class="form-label">Teléfono</label>
        <input type="text" id="ag-telefono" class="form-input"></div>
      <div class="form-group"><label class="form-label">Email</label>
        <input type="email" id="ag-email" class="form-input"></div>
      <div class="form-group" style="grid-column:span 2;"><label class="form-label">Domicilio</label>
        <input type="text" id="ag-domicilio" class="form-input"></div>

      <!-- Estudios -->
      <div class="form-group"><label class="form-label">Nivel de Estudio</label>
        <select id="ag-nivel-estudio" class="form-input"></select></div>
      <div class="form-group"><label class="form-label">Título Obtenido</label>
        <input type="text" id="ag-titulo" class="form-input"></div>

      <!-- Laboral -->
      <div class="form-group"><label class="form-label">Delegación <span style="color:var(--danger)">*</span></label>
        <select id="ag-delegacion" class="form-input"></select></div>
      <div class="form-group"><label class="form-label">Área <span style="color:var(--danger)">*</span></label>
        <select id="ag-area" class="form-input"></select></div>
      <div class="form-group"><label class="form-label">Cargo</label>
        <select id="ag-cargo" class="form-input"></select></div>
      <div class="form-group"><label class="form-label">Modalidad</label>
        <select id="ag-modalidad" class="form-input"></select></div>
      <div class="form-group"><label class="form-label">Fecha Inicio SP</label>
        <input type="date" id="ag-fecha-inicio" class="form-input"></div>
      <div class="form-group"><label class="form-label">Vencimiento Contrato</label>
        <input type="date" id="ag-fecha-venc" class="form-input"></div>

      <!-- Discapacidad -->
      <div class="form-group" style="grid-column:span 2;">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" id="ag-discapacidad" onchange="document.getElementById('ag-discapacidad-nombre').classList.toggle('hidden', !this.checked)">
          <span class="form-label" style="margin:0;">Registra Discapacidad</span>
        </label>
        <input type="text" id="ag-discapacidad-nombre" class="form-input hidden" placeholder="Especificar..." style="margin-top:8px;">
      </div>
    </div>

    <div style="text-align:right; margin-top:20px; border-top:1px solid var(--border-soft); padding-top:15px;">
      <button class="btn btn-outline" onclick="Portal_Core.cerrarModal('modal-agente')">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-agente" onclick="AdminAgentes.guardar()">
        <i class="fas fa-save" style="margin-right:6px;"></i> Guardar
      </button>
    </div>
  </div>
</div>

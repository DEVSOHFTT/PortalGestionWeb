<script>
  /**
   * ========================================================================
   * Inventario_Scan_JS.html  — v2.1 (fix)
   * PROYECTO: Portal de Gestión - Defensoría del Pueblo
   * CAMBIOS v2.1:
   *   • FIX PRINCIPAL: el listener de postMessage ahora llama automáticamente
   *     a procesarCodigoManual() después de setear el valor en el input.
   *     Antes el QR se mostraba solo en la notificación y en el campo,
   *     pero no navegaba a la ficha del activo.
   *   • Toast cambia de 'success' a 'info' para no confundir al usuario
   *     (la acción real aún está en curso — la navegación).
   *   • Guard defensivo igual que en Bandeja_JS.
   * ========================================================================
   */

  // ── Guard defensivo ──────────────────────────────────────────────────────
  if (!window.INV_App || typeof window.INV_App !== 'object') {
    console.warn('[INV Scan] INV_App no encontrado — creando namespace de emergencia.');
    window.INV_App = {};
  }
  // ────────────────────────────────────────────────────────────────────────

  Object.assign(window.INV_App, {

    // =========================================================
    // ESTADO INTERNO DEL SCANNER
    // =========================================================
    _popupQR:         null,
    _listenerMensaje: null,
    _stream:          null,

    // =========================================================
    // INICIALIZACIÓN DE LA VISTA SCAN
    // =========================================================
    iniciarScan: function () {
      document.getElementById('ruta-actual').innerText = 'Escanear Activo';
      this.detenerCamaraEnVivo();
    },

    // =========================================================
    // ENTRADA MANUAL DE CÓDIGO
    // =========================================================
    procesarCodigoManual: function () {
      const input = document.getElementById('manual-qr-input');
      const id    = input ? input.value.trim().toUpperCase() : '';
      if (!id) return Portal_Core.mostrarToast('warning', 'Dato Requerido', 'Ingresá un código válido.');
      cargarModulo('InventarioFicha', id);
    },

    // =========================================================
    // APERTURA DEL POPUP DE CÁMARA
    // =========================================================
    // CONTEXTO: GAS sirve el portal en un iframe con Feature-Policy
    // que bloquea getUserMedia. La solución es abrir un popup
    // top-level donde el permiso de cámara sí funciona.
    // El popup lee el QR y devuelve el resultado via postMessage.
    // =========================================================
    abrirCamaraEnVivo: function () {
      const inputEl = document.getElementById('manual-qr-input');
      if (inputEl) inputEl.value = '';

      this.detenerCamaraEnVivo();

      const htmlPopup = `<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Escanear QR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0f172a; color: #f1f5f9; display: flex; flex-direction: column;
           align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    h2  { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    p   { font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; text-align: center; }
    #visor { position: relative; width: 100%; max-width: 340px; border-radius: 16px;
             overflow: hidden; background: #000; aspect-ratio: 1; }
    video  { width: 100%; height: 100%; object-fit: cover; display: block; }
    canvas { display: none; }
    .mira  { position: absolute; inset: 0; display: flex; align-items: center;
             justify-content: center; pointer-events: none; }
    .mira svg { width: 65%; height: 65%; opacity: 0.7; }
    #estado { margin-top: 18px; font-size: 0.9rem; font-weight: 600;
              color: #94a3b8; text-align: center; min-height: 1.4em; }
    #estado.ok  { color: #4ade80; }
    #estado.err { color: #f87171; }
  </style>
</head>
<body>
  <h2>📷 Escanear código QR</h2>
  <p>Apuntá la cámara al código QR del activo</p>
  <div id="visor">
    <video id="video" muted playsinline autoplay></video>
    <canvas id="canvas"></canvas>
    <div class="mira">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 30 L10 10 L30 10" stroke="white" stroke-width="4" stroke-linecap="round"/>
        <path d="M70 10 L90 10 L90 30" stroke="white" stroke-width="4" stroke-linecap="round"/>
        <path d="M90 70 L90 90 L70 90" stroke="white" stroke-width="4" stroke-linecap="round"/>
        <path d="M30 90 L10 90 L10 70" stroke="white" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
  <div id="estado">Iniciando cámara…</div>
  <script>
    const video    = document.getElementById('video');
    const canvas   = document.getElementById('canvas');
    const estado   = document.getElementById('estado');

    let detectando   = true;
    let rafId        = null;
    let streamActivo = null;

    async function iniciar() {
      try {
        streamActivo = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = streamActivo;
        await video.play();
        estado.textContent = 'Buscando código QR…';

        const usarNativa = ('BarcodeDetector' in window);
        const detector   = usarNativa ? new BarcodeDetector({ formats: ['qr_code'] }) : null;
        const ctx        = canvas.getContext('2d');
        let ultimoFrame  = 0;

        const scan = async (ts) => {
          if (!detectando) return;
          if (ts - ultimoFrame < 100) { rafId = requestAnimationFrame(scan); return; }
          ultimoFrame = ts;
          if (video.readyState < video.HAVE_ENOUGH_DATA) { rafId = requestAnimationFrame(scan); return; }

          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0);

          let resultado = null;
          try {
            if (usarNativa) {
              const lista = await detector.detect(video);
              if (lista.length > 0) resultado = lista[0].rawValue;
            } else {
              const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const code    = jsQR(imgData.data, imgData.width, imgData.height,
                                   { inversionAttempts: 'dontInvert' });
              if (code) resultado = code.data;
            }
          } catch (e) { /* continuar */ }

          if (resultado) {
            detectando = false;
            cancelAnimationFrame(rafId);
            streamActivo.getTracks().forEach(t => t.stop());
            estado.textContent = 'Código leído: ' + resultado;
            estado.className   = 'ok';
            if (window.opener && !window.opener.closed) {
              window.opener.postMessage(
                { tipo: 'QR_RESULT', valor: resultado.trim().toUpperCase() },
                '*'
              );
            }
            setTimeout(() => window.close(), 800);
            return;
          }
          rafId = requestAnimationFrame(scan);
        };

        // Cargar jsQR como fallback si BarcodeDetector no está disponible
        if (!usarNativa) {
          const s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
          s.onload = () => { rafId = requestAnimationFrame(scan); };
          document.head.appendChild(s);
        } else {
          rafId = requestAnimationFrame(scan);
        }

      } catch (err) {
        const msg = err.name === 'NotAllowedError'
          ? 'Permiso de cámara denegado. Revisá la configuración del navegador.'
          : 'Error: ' + err.message;
        estado.textContent = msg;
        estado.className   = 'err';
      }
    }

    window.addEventListener('beforeunload', () => {
      detectando = false;
      if (rafId) cancelAnimationFrame(rafId);
      if (streamActivo) streamActivo.getTracks().forEach(t => t.stop());
    });

    iniciar();
  <\/script>
</body>
</html>`;

      const ancho = Math.min(420, screen.width);
      const alto  = Math.min(620, screen.height);
      const left  = Math.round((screen.width  - ancho) / 2);
      const top   = Math.round((screen.height - alto)  / 2);

      this._popupQR = window.open(
        'about:blank',
        'QRScanner',
        `width=${ancho},height=${alto},left=${left},top=${top},` +
        `resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no`
      );

      if (!this._popupQR) {
        Portal_Core.mostrarToast(
          'warning',
          'Popup Bloqueado',
          'El navegador bloqueó la ventana emergente. Permitila para este sitio en la barra de direcciones.'
        );
        return;
      }

      this._popupQR.document.open();
      this._popupQR.document.write(htmlPopup);
      this._popupQR.document.close();

      // ─────────────────────────────────────────────────────────────────
      // FIX v2.1: recibir el QR y NAVEGAR automáticamente a la ficha.
      // Antes: solo mostraba toast + seteaba el input → el usuario tenía
      //        que presionar el botón de búsqueda manualmente.
      // Ahora: setea el input (feedback visual), muestra toast informativo
      //        y llama a procesarCodigoManual() que dispara cargarModulo().
      // ─────────────────────────────────────────────────────────────────
      this._listenerMensaje = (event) => {
        if (!event.data || event.data.tipo !== 'QR_RESULT') return;

        const valor   = event.data.valor;
        const inputEl = document.getElementById('manual-qr-input');
        if (inputEl) {
          inputEl.value = valor;
          inputEl.style.backgroundColor = '#fef08a';
          setTimeout(() => { inputEl.style.backgroundColor = ''; }, 1200);
        }

        Portal_Core.reproducirSonido('success');
        // Info en lugar de success: la navegación aún no terminó
        Portal_Core.mostrarToast('info', 'QR Leído', 'Abriendo ficha: ' + valor);

        // Limpiar listener y referencia al popup ANTES de navegar
        window.removeEventListener('message', this._listenerMensaje);
        this._listenerMensaje = null;
        this._popupQR         = null;

        // ✅ FIX: navegar automáticamente a la ficha del activo
        if (typeof INV_App.procesarCodigoManual === 'function') {
          INV_App.procesarCodigoManual();
        }
      };

      window.addEventListener('message', this._listenerMensaje);
    },

    // =========================================================
    // LIMPIEZA DE RECURSOS DEL SCANNER
    // =========================================================
    detenerCamaraEnVivo: function () {
      if (this._popupQR && !this._popupQR.closed) this._popupQR.close();
      this._popupQR = null;

      if (this._listenerMensaje) {
        window.removeEventListener('message', this._listenerMensaje);
        this._listenerMensaje = null;
      }

      if (this._stream) {
        this._stream.getTracks().forEach(t => t.stop());
        this._stream = null;
      }

      // Restaurar la vista de la pantalla de scan si existe
      const promptCard = document.getElementById('scan-prompt-card');
      const liveCard   = document.getElementById('live-camera-card');
      if (promptCard) promptCard.classList.remove('hidden');
      if (liveCard)   liveCard.classList.add('hidden');
    }

  });
</script>

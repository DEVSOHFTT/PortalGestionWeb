<style>
  .inv-ficha-wrapper {
    max-width: 800px;
    margin: 0 auto;
    padding-bottom: 80px; 
    animation: fadeIn 0.3s ease-out;
  }
  
  .inv-header-card {
    background: var(--primary);
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
    border-radius: var(--radius-lg);
    padding: 20px;
    color: white;
    margin-bottom: 20px;
    position: relative;
    box-shadow: var(--shadow-md);
  }
  
  .inv-header-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 5px; line-height: 1.2; }
  .inv-header-subtitle { font-size: 0.9rem; opacity: 0.9; font-weight: 500; }
  .inv-badge-estado {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(5px);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.4);
  }

  .inv-info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
  }

  .inv-info-box {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    padding: 15px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
  }
  
  .inv-info-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .inv-info-val { font-size: 0.95rem; color: var(--text-main); font-weight: 600; word-break: break-word; }

  .inv-actions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 25px;
  }
  
  .btn-inv-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    padding: 15px 10px;
    border-radius: var(--radius-md);
    color: var(--text-main);
    font-weight: 600;
    font-size: 0.85rem;
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: var(--transition);
  }
  .btn-inv-action:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
  .btn-inv-action i { font-size: 1.5rem; color: var(--primary); }

  .file-camera-input { display: none; }
</style>

<div class="inv-ficha-wrapper">
  
  <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
    <button class="btn btn-icono" onclick="INV_App.volverAlScanOBandeja()"><i class="fas fa-arrow-left"></i></button>
    <h2 style="font-size: 1.2rem; font-weight: 700; color: var(--text-main); margin:0;">Ficha Técnica</h2>
  </div>

  <div id="loader-inv-ficha" style="text-align: center; padding: 60px 20px;">
    <i class="fas fa-circle-notch spinner fa-3x" style="color: var(--primary);"></i>
    <p style="margin-top: 15px; color: var(--text-muted); font-weight: 500;">Recuperando expediente del activo...</p>
  </div>

  <div id="content-inv-ficha" class="hidden">
    
    <div class="inv-header-card">
      <div id="ficha-inv-estado" class="inv-badge-estado">CARGANDO...</div>
      <div class="inv-header-title" id="ficha-inv-titulo">...</div>
      <div class="inv-header-subtitle" id="ficha-inv-subtitulo">...</div>
      <div style="margin-top: 15px; font-family: monospace; font-size: 0.8rem; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 6px;">
        <i class="fas fa-qrcode"></i> ID: <span id="ficha-inv-id">...</span>
      </div>
    </div>

    <div class="inv-info-grid">
      <div class="inv-info-box">
        <div class="inv-info-lbl"><i class="fas fa-map-marker-alt" style="color:var(--primary);"></i> Ubicación Actual</div>
        <div class="inv-info-val" id="ficha-inv-ubicacion">...</div>
      </div>
      <div class="inv-info-box">
        <div class="inv-info-lbl"><i class="fas fa-user-tie" style="color:var(--text-main);"></i> Responsable</div>
        <div class="inv-info-val" id="ficha-inv-responsable">...</div>
      </div>
      <div class="inv-info-box hidden" id="box-inv-stock">
        <div class="inv-info-lbl"><i class="fas fa-cubes" style="color:var(--warning);"></i> Stock Disponible</div>
        <div class="inv-info-val" id="ficha-inv-stock" style="font-size: 1.4rem; color: var(--warning);">...</div>
      </div>
      <div class="inv-info-box" id="box-inv-serie">
        <div class="inv-info-lbl"><i class="fas fa-hashtag"></i> N° Serie / Patrimonial</div>
        <div class="inv-info-val" id="ficha-inv-serie">...</div>
      </div>
    </div>

    <h3 style="font-size: 0.9rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px;">Registro Operativo</h3>
    <div class="inv-actions-grid" id="inv-botones-fijo">
      <button class="btn-inv-action" onclick="INV_App.abrirModalMovimiento('Traslado')">
        <i class="fas fa-people-carry"></i> Asignar / Trasladar
      </button>
      <button class="btn-inv-action" onclick="INV_App.abrirModalMovimiento('Reparacion')">
        <i class="fas fa-tools" style="color: var(--warning);"></i> Taller / Reparación
      </button>
      <button class="btn-inv-action" onclick="document.getElementById('input-foto-evidencia').click()">
        <i class="fas fa-camera"></i> Adjuntar Foto
      </button>
      <button class="btn-inv-action" onclick="INV_App.abrirModalMovimiento('Baja')">
        <i class="fas fa-trash-alt" style="color: var(--danger);"></i> Dar de Baja
      </button>
      <input type="file" id="input-foto-evidencia" class="file-camera-input" accept="image/*" capture="environment" onchange="INV_App.procesarFotoEvidencia(this)">
    </div>

    <div class="inv-actions-grid hidden" id="inv-botones-insumo">
      <button class="btn-inv-action" onclick="INV_App.abrirModalMovimiento('Consumo')" style="grid-column: span 2; border-color: var(--success); background: var(--success-bg);">
        <i class="fas fa-box-open" style="color: var(--success);"></i> Registrar Entrega (Descontar)
      </button>
    </div>

    <h3 style="font-size: 0.9rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; margin-top: 10px; letter-spacing: 0.5px;">Hoja de Vida</h3>
    <div class="ficha-card" style="padding: 20px;">
      <div class="timeline" id="timeline-inv-movimientos" style="margin-left: 0; padding-left: 20px;">
         </div>
    </div>

  </div>
</div>

<div id="modal-inv-movimiento" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span id="modal-inv-title"><i class="fas fa-exchange-alt" style="color:var(--primary)"></i> Nuevo Movimiento</span>
      <button class="btn-icono" style="border:none;" onclick="Portal_Core.cerrarModal('modal-inv-movimiento')"><i class="fas fa-times"></i></button>
    </div>
    
    <input type="hidden" id="modal-inv-tipo" value="">
    
    <div id="modal-inv-box-cantidad" class="form-group hidden">
      <label>Cantidad a Entregar <span style="color:var(--danger)">*</span></label>
      <input type="number" id="modal-inv-cantidad" min="1" value="1">
    </div>

    <div id="modal-inv-box-destino" class="form-group hidden">
      <label>Edificio Destino <span style="color:var(--danger)">*</span></label>
      <select id="modal-inv-edificio" class="form-input"></select>
    </div>

    <div id="modal-inv-box-responsable" class="form-group hidden">
      <label>Agente o Área Receptora <span style="color:var(--danger)">*</span></label>
      <select id="modal-inv-responsable" class="form-input"></select>
    </div>

    <div id="modal-inv-box-baja" class="form-group hidden">
      <label>Motivo de la Baja <span style="color:var(--danger)">*</span></label>
      <select id="modal-inv-motivo-baja" class="form-input">
        <option value="">Seleccione...</option>
        <option value="Obsolescencia Tecnológica">Obsolescencia Tecnológica</option>
        <option value="Daño Irreparable">Daño Irreparable</option>
        <option value="Extravío / Robo">Extravío / Robo</option>
      </select>
    </div>

    <div class="form-group">
      <label>Observaciones Adicionales</label>
      <textarea id="modal-inv-obs" class="form-input" rows="3" placeholder="Detalles de la entrega o estado del equipo..."></textarea>
    </div>

    <div style="text-align: right; margin-top: 25px;">
      <button class="btn btn-outline" onclick="Portal_Core.cerrarModal('modal-inv-movimiento')">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-mov-inv" onclick="INV_App.guardarMovimiento()"><i class="fas fa-save"></i> Confirmar</button>
    </div>
  </div>
</div>

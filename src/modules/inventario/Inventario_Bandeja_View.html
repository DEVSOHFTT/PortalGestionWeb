<style>
  .inv-stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:1.25rem; }
  .inv-stat-card { background:var(--bg-surface); border:1px solid var(--border-soft); border-radius:10px; padding:11px 14px; display:flex; align-items:center; gap:10px; }
  .inv-stat-icon { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:0.82rem; }
  .inv-stat-icon.p { background:var(--primary-light); color:var(--primary); }
  .inv-stat-icon.g { background:#EAF3DE; color:#3B6D11; }
  .inv-stat-icon.a { background:#FAEEDA; color:#854F0B; }
  .inv-stat-icon.r { background:#FCEBEB; color:#A32D2D; }
  .inv-stat-label { font-size:0.68rem; color:var(--text-muted); font-weight:700; text-transform:uppercase; }
  .inv-stat-val   { font-size:1.15rem; font-weight:800; color:var(--text-main); }

  .inv-qr-bar { display:flex; align-items:center; gap:10px; margin-bottom:1rem; padding:10px 14px;
    background:var(--bg-surface); border:1px solid var(--border-soft);
    border-left:3px solid var(--def-orange); border-radius:10px; }
  .inv-qr-label { font-size:0.7rem; font-weight:800; color:var(--def-orange); text-transform:uppercase;
    letter-spacing:0.04em; white-space:nowrap; display:flex; align-items:center; gap:5px; }
  .inv-qr-divider { width:1px; height:18px; background:var(--border-soft); }
  .inv-qr-bar input { flex:1; border:none; background:transparent; font-size:0.85rem; color:var(--text-main);
    outline:none; font-family:monospace; font-weight:700; text-transform:uppercase; min-width:0; }

  .inv-toolbar { display:flex; align-items:center; gap:8px; margin-bottom:1rem; flex-wrap:wrap; }
  .inv-search-wrap { flex:1; min-width:130px; position:relative; }
  .inv-search-wrap input { width:100%; padding:8px 10px 8px 28px; border:1px solid var(--border-soft);
    border-radius:8px; font-size:0.82rem; background:var(--bg-surface); color:var(--text-main); outline:none; }
  .inv-search-icon { position:absolute; left:8px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.75rem; pointer-events:none; }

  /* Cards de artículos */
  .card-inv-item { background:var(--bg-surface); border:1px solid var(--border-soft); border-radius:12px;
    padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:all 0.15s ease; }
  .card-inv-item:hover { transform:translateY(-1px); box-shadow:var(--shadow-md); border-color:var(--border-hard); }
  .inv-id-chip { font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:20px;
    background:var(--primary-light); color:var(--primary); font-family:monospace; white-space:nowrap; }
  .inv-cat-chip { font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:20px;
    background:var(--bg-app); color:var(--text-muted); }
  .inv-stock-chip { font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:20px; }
  .inv-stock-ok   { background:#EAF3DE; color:#3B6D11; }
  .inv-stock-low  { background:#FAEEDA; color:#854F0B; }
  .inv-stock-zero { background:#FCEBEB; color:#A32D2D; }

  /* Modal sections */
  .inv-fsec { display:flex; align-items:center; gap:7px; font-size:0.68rem; font-weight:800;
    text-transform:uppercase; letter-spacing:0.06em; color:var(--primary);
    margin:0.9rem 0 7px; padding-bottom:5px; border-bottom:1px solid var(--border-soft); }
  .inv-suaf-tag { font-size:0.62rem; padding:1px 6px; background:var(--primary-light); color:var(--primary);
    border-radius:4px; font-weight:700; letter-spacing:0.02em; margin-left:auto; }
</style>

<div class="fade-in" style="padding:16px 16px 60px;">

  <!-- STATS -->
  <div class="inv-stats-row">
    <div class="inv-stat-card">
      <div class="inv-stat-icon p"><i class="fas fa-boxes"></i></div>
      <div><div class="inv-stat-label">Total artículos</div><div class="inv-stat-val" id="inv-stat-total">—</div></div>
    </div>
    <div class="inv-stat-card">
      <div class="inv-stat-icon g"><i class="fas fa-check-circle"></i></div>
      <div><div class="inv-stat-label">Disponibles</div><div class="inv-stat-val" id="inv-stat-disp">—</div></div>
    </div>
    <div class="inv-stat-card">
      <div class="inv-stat-icon a"><i class="fas fa-user-tie"></i></div>
      <div><div class="inv-stat-label">Asignados</div><div class="inv-stat-val" id="inv-stat-asig">—</div></div>
    </div>
    <div class="inv-stat-card">
      <div class="inv-stat-icon r"><i class="fas fa-tools"></i></div>
      <div><div class="inv-stat-label">Mantenimiento</div><div class="inv-stat-val" id="inv-stat-mant">—</div></div>
    </div>
  </div>

  <!-- QR BAR -->
  <div class="inv-qr-bar">
    <div class="inv-qr-label"><i class="fas fa-qrcode"></i> QR / ID</div>
    <div class="inv-qr-divider"></div>
    <input type="text" id="manual-qr-input"
           placeholder="Escribir o escanear código de artículo..."
           onkeypress="if(event.key==='Enter'){event.preventDefault();window.INV_App.procesarCodigoManual();}">
    <button class="btn btn-primary" onclick="INV_App.abrirCamaraEnVivo()"
            style="gap:6px;padding:8px 14px;white-space:nowrap;flex-shrink:0;">
      <i class="fas fa-camera"></i> Cámara
    </button>
    <button class="btn btn-outline" onclick="INV_App.procesarCodigoManual()"
            style="padding:8px 12px;flex-shrink:0;" title="Buscar">
      <i class="fas fa-search"></i>
    </button>
  </div>

  <!-- TOOLBAR -->
  <div class="inv-toolbar">
    <select id="inv-filtro-categoria" class="form-input" style="max-width:160px;font-size:0.82rem;"
            onchange="INV_App.cargarDatosBandeja()"></select>
    <select id="inv-filtro-edificio" class="form-input" style="max-width:150px;font-size:0.82rem;"
            onchange="INV_App.cargarDatosBandeja()"></select>
    <select id="inv-filtro-agente" class="form-input" style="max-width:180px;font-size:0.82rem;"
            onchange="INV_App.filtrarBandejaDebounced()"></select>
    <div class="inv-search-wrap">
      <i class="fas fa-search inv-search-icon"></i>
      <input type="text" id="inv-filtro-texto" placeholder="Marca, modelo, serie..."
             onkeyup="INV_App.filtrarBandejaDebounced()">
    </div>
    <button class="btn btn-outline" onclick="INV_App.limpiarFiltrosBandeja()" title="Limpiar filtros" style="padding:8px 12px;">
      <i class="fas fa-eraser"></i>
    </button>
    <button class="btn btn-primary" onclick="INV_App.abrirModalAlta()">
      <i class="fas fa-plus" style="margin-right:5px;"></i> Nuevo artículo
    </button>
  </div>

  <div id="inv-dashboard-content">
    <div style="text-align:center;padding:60px 20px;">
      <i class="fas fa-circle-notch spinner fa-3x" style="color:var(--primary);"></i>
      <p style="margin-top:15px;color:var(--text-muted);font-weight:600;">Sincronizando inventario...</p>
    </div>
  </div>
</div>

<!-- MODAL: Nuevo Artículo -->
<div id="modal-inv-alta" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:580px;width:95%;max-height:92vh;overflow-y:auto;">
    <div class="modal-header" style="border-bottom:1px solid var(--border-soft);">
      <span style="font-weight:800;color:var(--primary);font-size:1rem;">
        <i class="fas fa-plus-circle"></i> Nuevo artículo
      </span>
      <button class="btn-icono" style="border:none;" onclick="Portal_Core.cerrarModal('modal-inv-alta')">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div style="padding:4px 0 10px;">

      <!-- SECCIÓN 1: IDENTIFICACIÓN (SUAF) -->
      <div class="inv-fsec">
        <i class="fas fa-qrcode" style="font-size:0.75rem;"></i> Identificación
        <span class="inv-suaf-tag">SUAF</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">ID patrimonial</label>
          <input type="text" id="alta-inv-idpat" class="form-input" placeholder="Ej: MIC.3">
        </div>
        <div class="form-group">
          <label class="form-label">N° Serie / IMEI</label>
          <input type="text" id="alta-inv-serie" class="form-input" placeholder="Opcional">
        </div>
        <div class="form-group" style="grid-column:span 2;">
          <label class="form-label">Observaciones</label>
          <textarea id="alta-inv-observaciones" class="form-input" style="min-height:52px;resize:vertical;" placeholder="Notas, aclaraciones, historial..."></textarea>
        </div>
      </div>

      <!-- SECCIÓN 2: PROPIEDADES DEL ARTÍCULO -->
      <div class="inv-fsec"><i class="fas fa-tag" style="font-size:0.75rem;"></i> Propiedades del artículo</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group" style="grid-column:span 2;">
          <label class="form-label">Categoría <span style="color:var(--danger)">*</span></label>
          <select id="alta-inv-categoria" class="form-input" onchange="INV_App.toggleCamposAlta()"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Marca</label>
          <select id="alta-inv-marca" class="form-input"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Modelo</label>
          <input type="text" id="alta-inv-modelo" class="form-input" placeholder="Ej: EliteBook 840">
        </div>
        <div class="form-group" style="grid-column:span 2;">
          <label class="form-label">Características</label>
          <textarea id="alta-inv-caracteristicas" class="form-input" style="min-height:52px;resize:vertical;" placeholder="Procesador, RAM, almacenamiento, etc."></textarea>
        </div>
      </div>

      <!-- SECCIÓN 3: ESTADO Y UBICACIÓN -->
      <div class="inv-fsec"><i class="fas fa-map-marker-alt" style="font-size:0.75rem;"></i> Estado y ubicación</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">Estado inicial <span style="color:var(--danger)">*</span></label>
          <select id="alta-inv-estado" class="form-input"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Edificio / Ubicación <span style="color:var(--danger)">*</span></label>
          <select id="alta-inv-edificio" class="form-input"></select>
        </div>
      </div>

      <!-- SECCIÓN 4: INVENTARIO Y ADQUISICIÓN -->
      <div class="inv-fsec"><i class="fas fa-calendar-alt" style="font-size:0.75rem;"></i> Inventario y adquisición</div>
      <div id="box-alta-insumos" class="hidden" style="margin-bottom:12px;">
        <div class="form-group">
          <label class="form-label">Cantidad inicial (stock) <span style="color:var(--danger)">*</span></label>
          <input type="number" id="alta-inv-stock" class="form-input" min="1" value="1">
        </div>
      </div>
      <!-- Placeholder para compatibilidad con toggleCamposAlta -->
      <div id="box-alta-equipos"></div>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--border-soft);">
      <button class="btn btn-outline" onclick="Portal_Core.cerrarModal('modal-inv-alta')">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-alta" onclick="INV_App.guardarNuevoActivo()">
        <i class="fas fa-save" style="margin-right:5px;"></i> Registrar artículo
      </button>
    </div>
  </div>
</div>

<!-- Modal: Ver QR (sin cambios) -->
<div id="modal-ver-qr" class="modal-overlay hidden">
  <div class="modal-box" style="text-align: center; max-width: 340px;">
    <div class="modal-header">
      <span style="font-weight: 800; color: var(--primary);">
        <i class="fas fa-qrcode" style="margin-right: 6px;"></i> Identificador Único
      </span>
      <button class="btn-icono" style="border:none;" onclick="Portal_Core.cerrarModal('modal-ver-qr')">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <h4 id="qr-modal-title" style="margin: 15px 0 5px; color: var(--text-main); font-size: 1.1rem; font-weight: 800;"></h4>
    <p style="font-size: 0.8rem; color: var(--text-muted); font-family: monospace; margin-bottom: 20px;
              background: var(--bg-app); padding: 4px; border-radius: 6px; display: inline-block;">
      ID: <span id="qr-modal-subtitle" style="font-weight: bold;"></span>
    </p>
    <div style="background: white; padding: 15px; border-radius: 16px; display: inline-block;
                border: 2px dashed var(--primary); box-shadow: var(--shadow-sm);">
      <img id="qr-modal-img" src="" alt="Código QR" style="width: 200px; height: 200px; display: block; margin: 0 auto;">
    </div>
    <div style="margin-top: 20px;">
      <button class="btn btn-primary" style="width: 100%; border-radius: 25px;" onclick="Portal_Core.cerrarModal('modal-ver-qr')">
        Cerrar
      </button>
    </div>
  </div>
</div>

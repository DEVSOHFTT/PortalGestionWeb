<style>
  .inv-header-actions { margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }

  .inv-title-group {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
    padding: 20px 25px;
    border-radius: var(--radius-lg);
    color: white;
    box-shadow: 0 10px 20px -5px rgba(63, 34, 186, 0.4);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .inv-title-group::after {
    content: '\f49e';
    font-family: 'Font Awesome 5 Free';
    font-weight: 900;
    position: absolute; right: -10px; bottom: -20px;
    font-size: 6.5rem; opacity: 0.1; transform: rotate(-15deg);
  }

  .inv-title { font-size: 1.4rem; font-weight: 800; margin: 0; display: flex; align-items: center; gap: 10px; }
  .inv-subtitle { font-size: 0.9rem; margin-top: 3px; font-weight: 500; opacity: 0.9; }

  /* ── QR Scanner integrado ── */
  .inv-scanner-bar {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-left: 4px solid var(--def-orange);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow-sm);
  }

  .inv-scanner-bar .scanner-label {
    font-size: 0.75rem;
    font-weight: 800;
    color: var(--def-orange);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .inv-scanner-bar input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border-soft);
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: monospace;
    font-weight: 700;
    text-transform: uppercase;
    outline: none;
    background: var(--bg-app);
    transition: 0.2s;
    color: var(--text-main);
  }

  .inv-scanner-bar input:focus {
    border-color: var(--def-orange);
    background: white;
    box-shadow: 0 0 0 3px rgba(249,141,20,0.1);
  }

  .inv-filtros-card {
    background: var(--bg-surface);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: var(--shadow-sm);
    border-left: 4px solid var(--primary);
  }

  .inv-filtros-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 15px;
    margin-top: 15px;
  }

  .inv-filtro-box label { font-size: 0.7rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 6px; display: block; }

  /* ── Cards de activos ── */
  .card-inv-item {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
  }
  .card-inv-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-hard); }

  .tm-badge-cat { font-size: 0.65rem; background: var(--bg-app); color: var(--text-muted); padding: 5px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
  .tm-badge-route { font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; background: var(--bg-app); padding: 6px 12px; border-radius: 20px; color: var(--text-main); border: 1px solid var(--border-soft); }

  /* ── FAB (solo alta manual) ── */
  .fab-alta {
    position: fixed;
    bottom: 25px;
    right: 25px;
    z-index: 100;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    font-size: 1.4rem;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 25px rgba(63, 34, 186, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab-alta:hover { transform: scale(1.08); box-shadow: 0 12px 30px rgba(63, 34, 186, 0.5); }
  .fab-alta:active { transform: scale(0.95); }
</style>

<div class="fade-in" style="padding-bottom: 90px;">

  <div class="inv-header-actions">

    <!-- Encabezado del módulo + botón alta -->
    <div class="inv-title-group">
      <div>
        <h2 class="inv-title"><i class="fas fa-boxes"></i> Inventario</h2>
        <p class="inv-subtitle">Control de activos, insumos y telefonía</p>
      </div>
      <button class="btn" onclick="INV_App.abrirModalAlta()"
              style="background:rgba(255,255,255,0.15); color:white; border-color:rgba(255,255,255,0.3);
                     backdrop-filter:blur(4px); font-weight:700; gap:8px; z-index:1; position:relative;">
        <i class="fas fa-plus-circle"></i> Nuevo Activo
      </button>
    </div>

    <!-- Barra QR integrada -->
    <div class="inv-scanner-bar">
      <span class="scanner-label">
        <i class="fas fa-qrcode"></i> QR / ID
      </span>
      <input type="text" id="manual-qr-input"
             placeholder="Escribir o escanear código..."
             onkeypress="if(event.key==='Enter'){event.preventDefault(); window.INV_App.procesarCodigoManual();}">
      <button class="btn btn-primary" onclick="INV_App.abrirCamaraEnVivo()"
              style="gap:6px; padding:10px 16px; white-space:nowrap; flex-shrink:0;">
        <i class="fas fa-camera"></i> Cámara
      </button>
      <button class="btn btn-outline" onclick="INV_App.procesarCodigoManual()"
              style="padding:10px 16px; flex-shrink:0;" title="Buscar por código">
        <i class="fas fa-search"></i>
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="inv-filtros-card">
    <div style="display: flex; justify-content: space-between; align-items: center;
                border-bottom: 1px dashed var(--border-soft); padding-bottom: 15px;">
      <span style="font-size: 0.9rem; font-weight: 800; color: var(--text-main); text-transform: uppercase;">
        <i class="fas fa-filter" style="color: var(--primary); margin-right: 6px;"></i> Filtros
      </span>
      <button class="btn-icono" style="width: 36px; height: 36px; background: var(--bg-app); border: none;"
              onclick="INV_App.limpiarFiltrosBandeja()" title="Limpiar Filtros">
        <i class="fas fa-eraser"></i>
      </button>
    </div>

    <div class="inv-filtros-grid">
      <div class="inv-filtro-box">
        <label>Categoría</label>
        <select id="inv-filtro-categoria" class="form-input" style="border-radius: 8px;"
                onchange="INV_App.cargarDatosBandeja()"></select>
      </div>
      <div class="inv-filtro-box">
        <label>Edificio</label>
        <select id="inv-filtro-edificio" class="form-input" style="border-radius: 8px;"
                onchange="INV_App.cargarDatosBandeja()"></select>
      </div>
      <div class="inv-filtro-box">
        <label>Agente Asignado</label>
        <select id="inv-filtro-agente" class="form-input" style="border-radius: 8px;"
                onchange="INV_App.filtrarBandejaDebounced()"></select>
      </div>
      <div class="inv-filtro-box">
        <label>Búsqueda Libre</label>
        <input type="text" id="inv-filtro-texto" class="form-input"
               placeholder="Marca, modelo, serie..."
               style="border-radius: 8px;" onkeyup="INV_App.filtrarBandejaDebounced()">
      </div>
    </div>
  </div>

  <div id="inv-dashboard-content">
    <div style="text-align: center; padding: 60px 20px;">
      <i class="fas fa-circle-notch spinner fa-3x" style="color: var(--primary);"></i>
      <p style="margin-top: 15px; color: var(--text-muted); font-weight: 600;">Sincronizando inventario...</p>
    </div>
  </div>

</div>

<!-- FAB alta manual (solo ícono +) -->
<button class="fab-alta" onclick="INV_App.abrirModalAlta()" title="Agregar nuevo activo">
  <i class="fas fa-plus"></i>
</button>

<!-- ── Modal: Nuevo Activo ── -->
<div id="modal-inv-alta" class="modal-overlay hidden">
  <div class="modal-box" style="max-width: 560px; width: 95%;">
    <div class="modal-header" style="border-bottom: 2px solid var(--primary); padding-bottom: 10px;">
      <span style="font-weight: 800; color: var(--primary); font-size: 1.1rem;">
        <i class="fas fa-plus-circle"></i> Nuevo Activo / Insumo
      </span>
      <button class="btn-icono" style="border:none;"
              onclick="Portal_Core.cerrarModal('modal-inv-alta')">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Sin max-height forzado: fluye naturalmente en desktop -->
    <div style="padding: 20px 0 10px;">

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
        <div class="form-group" style="grid-column: span 2;">
          <label>Categoría <span style="color:var(--danger)">*</span></label>
          <select id="alta-inv-categoria" class="form-input"
                  onchange="INV_App.toggleCamposAlta()"></select>
        </div>
        <div class="form-group">
          <label>Marca</label>
          <select id="alta-inv-marca" class="form-input"></select>
        </div>
        <div class="form-group">
          <label>Modelo</label>
          <input type="text" id="alta-inv-modelo" class="form-input" placeholder="Ej: EliteBook">
        </div>
      </div>

      <div id="box-alta-equipos">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
          <div class="form-group">
            <label>N° Serie / IMEI</label>
            <input type="text" id="alta-inv-serie" class="form-input" placeholder="Opcional">
          </div>
          <div class="form-group">
            <label>ID Patrimonial</label>
            <input type="text" id="alta-inv-idpat" class="form-input" placeholder="Ej: MIC.3">
          </div>
        </div>
      </div>

      <div id="box-alta-insumos" class="hidden" style="margin-bottom: 15px;">
        <div class="form-group">
          <label>Cantidad Inicial (Stock) <span style="color:var(--danger)">*</span></label>
          <input type="number" id="alta-inv-stock" class="form-input" min="1" value="1">
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="form-group">
          <label>Estado Inicial <span style="color:var(--danger)">*</span></label>
          <select id="alta-inv-estado" class="form-input"></select>
        </div>
        <div class="form-group">
          <label>Edificio / Ubicación <span style="color:var(--danger)">*</span></label>
          <select id="alta-inv-edificio" class="form-input"></select>
        </div>
      </div>
    </div>

    <div style="display: flex; gap: 10px; justify-content: flex-end; padding-top: 15px;
                border-top: 1px solid var(--border-soft);">
      <button class="btn btn-outline" onclick="Portal_Core.cerrarModal('modal-inv-alta')">
        Cancelar
      </button>
      <button class="btn btn-primary" id="btn-guardar-alta"
              onclick="INV_App.guardarNuevoActivo()">
        <i class="fas fa-save"></i> Registrar
      </button>
    </div>
  </div>
</div>

<!-- ── Modal: Ver QR ── -->
<div id="modal-ver-qr" class="modal-overlay hidden">
  <div class="modal-box" style="text-align: center; max-width: 340px;">
    <div class="modal-header">
      <span style="font-weight: 800; color: var(--primary);">
        <i class="fas fa-qrcode" style="margin-right: 6px;"></i> Identificador Único
      </span>
      <button class="btn-icono" style="border:none;"
              onclick="Portal_Core.cerrarModal('modal-ver-qr')">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <h4 id="qr-modal-title" style="margin: 15px 0 5px; color: var(--text-main); font-size: 1.1rem; font-weight: 800;"></h4>
    <p style="font-size: 0.8rem; color: var(--text-muted); font-family: monospace; margin-bottom: 20px;
              background: var(--bg-app); padding: 4px; border-radius: 6px; display: inline-block;">
      ID: <span id="qr-modal-subtitle" style="font-weight: bold;"></span>
    </p>
    <div style="background: white; padding: 15px; border-radius: 16px; display: inline-block;
                border: 2px dashed var(--primary); box-shadow: var(--shadow-sm);">
      <img id="qr-modal-img" src="" alt="Código QR"
           style="width: 200px; height: 200px; display: block; margin: 0 auto;">
    </div>
    <div style="margin-top: 20px;">
      <button class="btn btn-primary" style="width: 100%; border-radius: 25px;"
              onclick="Portal_Core.cerrarModal('modal-ver-qr')">
        Cerrar
      </button>
    </div>
  </div>
</div>

<style>
  /* ── STATS ROW ── */
  .inv-stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
  .inv-stat-card { background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-sm); }
  .inv-stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; }
  .inv-stat-icon.p { background: var(--primary-light); color: var(--primary); }
  .inv-stat-icon.g { background: #EAF3DE; color: #3B6D11; }
  .inv-stat-icon.a { background: #FAEEDA; color: #854F0B; }
  .inv-stat-icon.r { background: #FCEBEB; color: #A32D2D; }
  .inv-stat-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .inv-stat-val   { font-size: 1.3rem; font-weight: 800; color: var(--text-main); line-height: 1.1; }

  /* ── ACTION BAR ── */
  .inv-action-bar { display: flex; gap: 12px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; justify-content: space-between; }
  .inv-search-container { display: flex; flex: 1; min-width: 280px; gap: 8px; }
  .inv-search-input { flex: 1; position: relative; }
  .inv-search-input input { width: 100%; padding: 10px 10px 10px 38px; border: 1.5px solid var(--border-soft); border-radius: 10px; outline: none; transition: 0.2s; font-size: 0.95rem; font-weight: 500; background: var(--bg-surface); color: var(--text-main); }
  .inv-search-input input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
  .inv-search-input i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

  /* ── PANEL FILTROS ── */
  .inv-filter-panel { background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: 12px; padding: 20px; margin-bottom: 20px; display: none; box-shadow: var(--shadow-sm); }
  .inv-filter-panel.open { display: block; animation: fadeIn 0.3s ease; }
  .inv-filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; align-items: end; }

  /* ── ITEM CARDS ── */
  .card-inv-item { background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: 14px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; gap: 12px; }
  .card-inv-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border-hard); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .inv-action-bar { flex-direction: column; align-items: stretch; }
    .inv-search-container { flex-wrap: wrap; width: 100%; }
    .inv-search-input { min-width: 100%; flex: 1 1 100%; }
    .inv-btn-text { display: none; }
    .btn-mobile-grow { flex: 1; justify-content: center; }
    .btn-mobile-full { width: 100%; justify-content: center; }
  }

  /* ── MODAL SECCIONES ── */
  .inv-fsec { display: flex; align-items: center; gap: 7px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); margin: 1rem 0 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border-soft); }
  .inv-suaf-tag { font-size: 0.65rem; padding: 2px 8px; background: var(--primary-light); color: var(--primary); border-radius: 6px; font-weight: 700; margin-left: auto; }

  /* ── TABS DEL MODAL ── */
  .inv-modal-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border-soft); margin-bottom: 20px; overflow-x: auto; padding-bottom: 0; }
  .inv-modal-tab  { flex-shrink: 0; padding: 8px 14px; font-size: 0.78rem; font-weight: 700; color: var(--text-muted); border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; border-radius: 6px 6px 0 0; display: flex; align-items: center; gap: 6px; }
  .inv-modal-tab:hover  { color: var(--primary); background: var(--primary-light); }
  .inv-modal-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--primary-light); }
  .inv-tab-panel { display: none; }
  .inv-tab-panel.active { display: block; animation: fadeIn 0.2s ease; }

  /* ── HINT EDIFICIO ── */
  .inv-edif-hint { font-size: 0.78rem; font-weight: 600; color: var(--primary); margin-top: 5px; min-height: 18px; display: flex; align-items: center; gap: 5px; }

  /* ── CHECKBOXES DE AUDITORÍA ── */
  .inv-check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .inv-check-item { display: flex; align-items: center; gap: 10px; background: var(--bg-app); border: 1px solid var(--border-soft); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: 0.15s; }
  .inv-check-item:hover { border-color: var(--primary); }
  .inv-check-item input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
  .inv-check-item label { font-size: 0.8rem; font-weight: 600; color: var(--text-main); cursor: pointer; line-height: 1.3; }
  .inv-check-item.danger label { color: var(--danger); }
  .inv-check-item.danger { border-color: rgba(163,45,45,0.25); background: #fff8f8; }
</style>

      </div>
    </div>
    <div class="inv-filter-grid">
      <div class="form-group" style="margin: 0;">
        <label class="form-label" style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; display: block;">Categoría</label>

  <div id="inv-dashboard-content">

</div>

<!-- MODAL: ALTA DE NUEVO ARTÍCULO — v2.4 con TABS                         -->
<!-- ═══════════════════════════════════════════════════════════════════════ -->
<div id="modal-inv-alta" class="modal-overlay hidden">
  <div class="modal-box" style="max-width: 600px; width: 95%; max-height: 92vh; overflow-y: auto;">

    <div class="modal-header" style="border-bottom: 1px solid var(--border-soft);">
      <span style="font-weight: 800; color: var(--primary); font-size: 1.1rem;">
        <i class="fas fa-plus-circle"></i> Nuevo Artículo
      </span>
      <button class="btn-icono" style="border: none;" onclick="Portal_Core.cerrarModal('modal-inv-alta')">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- TABS NAV -->
    <div class="inv-modal-tabs" style="margin-top: 16px;">
      <button class="inv-modal-tab active" onclick="INV_App.cambiarTabAlta('identificacion', this)">
        <i class="fas fa-id-card"></i> Identificación
      </button>
      <button class="inv-modal-tab" onclick="INV_App.cambiarTabAlta('articulo', this)">
        <i class="fas fa-tag"></i> Artículo
      </button>
      <button class="inv-modal-tab" onclick="INV_App.cambiarTabAlta('ubicacion', this)">
        <i class="fas fa-map-marker-alt"></i> Ubicación
      </button>
      <button class="inv-modal-tab" onclick="INV_App.cambiarTabAlta('auditoria', this)">
        <i class="fas fa-clipboard-check"></i> Auditoría
      </button>
    </div>

    <div style="padding: 0 0 10px;">

      <!-- ══ TAB 1: IDENTIFICACIÓN ══ -->
      <div class="inv-tab-panel active" id="alta-tab-identificacion">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">ID Administración</label>
            <input type="text" id="alta-inv-idpat" class="form-input" placeholder="Ej: MIC.3">
          </div>
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">
              ID SUAF <span style="font-size:0.65rem; color:var(--text-muted); font-weight:500;">(único)</span>
            </label>
            <input type="text" id="alta-inv-idsuaf" class="form-input" placeholder="Opcional">
          </div>
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">N° Serie / IMEI</label>
            <input type="text" id="alta-inv-serie" class="form-input" placeholder="Opcional">
          </div>
          <div class="form-group" style="margin: 0;"></div>
          <div class="form-group" style="grid-column: span 2; margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Observaciones</label>
            <textarea id="alta-inv-observaciones" class="form-input" style="min-height: 70px; resize: vertical;" placeholder="Notas, aclaraciones, historial previo..."></textarea>
          </div>
        </div>
      </div>

      <!-- ══ TAB 2: ARTÍCULO ══ -->
      <div class="inv-tab-panel" id="alta-tab-articulo">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group" style="grid-column: span 2; margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Categoría <span style="color:var(--danger)">*</span></label>
            <select id="alta-inv-categoria" class="form-input" onchange="INV_App.toggleCamposAlta()"></select>
          </div>
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Marca</label>
            <select id="alta-inv-marca" class="form-input"></select>
          </div>
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Modelo</label>
            <input type="text" id="alta-inv-modelo" class="form-input" placeholder="Ej: EliteBook 840">
          </div>
          <div class="form-group" style="grid-column: span 2; margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Características</label>
            <textarea id="alta-inv-caracteristicas" class="form-input" style="min-height: 70px; resize: vertical;" placeholder="Procesador, RAM, almacenamiento, etc."></textarea>
          </div>
          <div class="form-group" style="grid-column: span 2; margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">
              Impresora Compatible
              <span style="font-size:0.65rem; color:var(--text-muted); font-weight:500;"> — solo insumos de impresión</span>
            </label>
            <input type="text" id="alta-inv-impresora" class="form-input" placeholder="Ej: HP LaserJet M404dn">
          </div>
        </div>
      </div>

      <!-- ══ TAB 3: UBICACIÓN ══ -->
      <div class="inv-tab-panel" id="alta-tab-ubicacion">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Estado inicial <span style="color:var(--danger)">*</span></label>
            <select id="alta-inv-estado" class="form-input"></select>
          </div>
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Edificio / Ubicación <span style="color:var(--danger)">*</span></label>
            <select id="alta-inv-edificio" class="form-input"
                    onchange="INV_App.actualizarHintEdificio('alta-inv-edificio', 'alta-inv-edificio-hint')">
            </select>
            <!-- HINT: dirección + piso al seleccionar -->
            <div class="inv-edif-hint" id="alta-inv-edificio-hint"></div>
          </div>
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Área asignada</label>
            <select id="alta-inv-area" class="form-input"></select>
          </div>
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Agente responsable</label>
            <select id="alta-inv-agente" class="form-input"></select>
          </div>
        </div>
      </div>

      <!-- ══ TAB 4: AUDITORÍA ══ -->
      <div class="inv-tab-panel" id="alta-tab-auditoria">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Fecha de adquisición</label>
            <input type="date" id="alta-inv-fecha" class="form-input">
          </div>
          <div class="form-group" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Fecha de entrega al responsable</label>
            <input type="date" id="alta-inv-fecha-entrega" class="form-input">
          </div>
          <!-- Stock solo visible para insumos -->
          <div class="form-group hidden" id="box-alta-insumos" style="margin: 0;">
            <label class="form-label" style="font-size: 0.7rem; font-weight: 700; margin-bottom: 4px;">Stock inicial <span style="color:var(--danger)">*</span></label>
            <input type="number" id="alta-inv-stock" class="form-input" min="1" value="1">
          </div>
        </div>

        <div class="inv-fsec" style="margin-top: 4px;"><i class="fas fa-clipboard-check"></i> Verificación de Estado</div>
        <div class="inv-check-grid">
          <label class="inv-check-item">
            <input type="checkbox" id="alta-inv-coincide-suaf">
            <label for="alta-inv-coincide-suaf">
              <div style="font-weight:700; font-size:0.82rem;">Coincide con SUAF</div>
              <div style="font-size:0.72rem; color:var(--text-muted); font-weight:500;">Verificado en sistema SUAF</div>
            </label>
          </label>
          <label class="inv-check-item">
            <input type="checkbox" id="alta-inv-en-oficina">
            <label for="alta-inv-en-oficina">
              <div style="font-weight:700; font-size:0.82rem;">En oficina</div>
              <div style="font-size:0.72rem; color:var(--text-muted); font-weight:500;">Equipo físicamente presente</div>
            </label>
          </label>
          <label class="inv-check-item">
            <input type="checkbox" id="alta-inv-devuelto">
            <label for="alta-inv-devuelto">
              <div style="font-weight:700; font-size:0.82rem;">Devuelto</div>
              <div style="font-size:0.72rem; color:var(--text-muted); font-weight:500;">El agente lo devolvió</div>
            </label>
          </label>
          <label class="inv-check-item danger">
            <input type="checkbox" id="alta-inv-dar-baja">
            <label for="alta-inv-dar-baja">
              <div style="font-weight:700; font-size:0.82rem; color:var(--danger);">Solicitar baja</div>
              <div style="font-size:0.72rem; color:var(--text-muted); font-weight:500;">Pendiente de aprobación</div>
            </label>
          </label>
        </div>
        <div id="box-alta-equipos"></div>
      </div>

    </div><!-- /padding wrapper -->

    <!-- Footer con indicador de tab activo y botones -->
    <div style="display: flex; gap: 10px; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid var(--border-soft);">
      <span id="alta-tab-indicator" style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">
        <i class="fas fa-id-card" style="color:var(--primary);"></i> Identificación
      </span>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-outline" onclick="Portal_Core.cerrarModal('modal-inv-alta')">Cancelar</button>
        <button class="btn btn-primary" id="btn-guardar-alta" onclick="INV_App.guardarNuevoActivo()">
          <i class="fas fa-save" style="margin-right: 5px;"></i> Registrar artículo
        </button>
      </div>
    </div>
  </div>
</div>

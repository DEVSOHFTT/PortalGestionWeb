<script>
  Object.assign(window.INV_App, {
    estadoActual: { activo: null, idQR: null },
    estadoBandeja: { datosOriginales: [], timeoutBusqueda: null },
    
    // Variables nativas del lector
    camaraActiva: false,
    _stream: null,
    _rafId: null,
    
    iniciarBandeja: function() {
      document.getElementById('ruta-actual').innerText = 'Inventario General';
      document.getElementById('inv-filtro-texto').value = '';
      
      const m = document.getElementById('modal-ver-qr');
      if (m && m.parentElement !== document.body) document.body.appendChild(m);
      const mAlta = document.getElementById('modal-inv-alta');
      if (mAlta && mAlta.parentElement !== document.body) document.body.appendChild(mAlta);

      this.detenerCamaraEnVivo();

      const cacheINV = Memoria.leer('diccionariosINV');
      if (cacheINV && cacheINV.categorias) {
          this.poblarSelectores(cacheINV);
          this.cargarDatosBandeja();
      } else {
          document.getElementById('inv-dashboard-content').innerHTML = `
            <div style="text-align: center; padding: 60px 20px;">
              <i class="fas fa-circle-notch spinner fa-3x" style="color: var(--primary);"></i>
              <p style="margin-top: 15px; color: var(--text-muted); font-weight: 600;">Descargando catálogos del sistema...</p>
            </div>`;

          google.script.run
            .withSuccessHandler(res => {
                if(res && res.success && res.data) {
                    Memoria.guardar('diccionariosINV', res.data);
                    this.poblarSelectores(res.data);
                    this.cargarDatosBandeja();
                } else {
                    this.mostrarError(`Fallo de Base de Datos: ${res ? res.message : 'Respuesta vacía.'}`);
                }
            })
            .withFailureHandler(err => this.mostrarError(`Error de Servidor: ${err.message}`))
            .obtenerDiccionariosInventario();
      }
    },

    mostrarError: function(msg) {
      document.getElementById('inv-dashboard-content').innerHTML = `
        <div style="background: white; border: 1px solid var(--danger-bg); border-radius: 12px; padding: 30px 20px; text-align: center; margin: 20px; box-shadow: var(--shadow-sm);">
          <i class="fas fa-exclamation-triangle fa-3x" style="color: var(--danger); margin-bottom: 15px;"></i>
          <h3 style="color: var(--text-main); margin-bottom: 10px;">Aviso del Sistema</h3>
          <p style="color: var(--text-muted); font-size: 0.9rem;">${msg}</p>
        </div>`;
    },

    llenarSelectSeguro: function(id, arreglo, placeholder = "Todas las opciones") {
       const el = document.getElementById(id);
       if(!el) return;
       if(!arreglo || !Array.isArray(arreglo)) { el.innerHTML = `<option value="">Error de carga</option>`; return; }
       
       let html = `<option value="">${placeholder}</option>`;
       arreglo.forEach(item => {
          let texto = item.nombre || (item.apellido ? `${item.apellido}, ${item.nombre}` : item.id);
          html += `<option value="${item.id || texto}">${texto}</option>`;
       });
       el.innerHTML = html;
    },

    poblarSelectores: function(cache) {
      try {
          this.llenarSelectSeguro('inv-filtro-categoria', cache.categorias);
          this.llenarSelectSeguro('inv-filtro-edificio', cache.edificios);
          this.llenarSelectSeguro('inv-filtro-agente', cache.agentes, "Todos los Agentes");
          
          this.llenarSelectSeguro('alta-inv-categoria', cache.categorias, "Seleccione...");
          this.llenarSelectSeguro('alta-inv-marca', cache.marcas, "S/M");
          this.llenarSelectSeguro('alta-inv-estado', cache.estados, "Seleccione...");
          this.llenarSelectSeguro('alta-inv-edificio', cache.edificios, "Seleccione...");
      } catch(e) {
          console.error("Error armando selects:", e);
      }
    },

    limpiarFiltrosBandeja: function() {
      document.getElementById('inv-filtro-categoria').value = '';
      document.getElementById('inv-filtro-edificio').value = '';
      document.getElementById('inv-filtro-agente').value = '';
      document.getElementById('inv-filtro-texto').value = '';
      this.cargarDatosBandeja();
    },

    filtrarBandejaDebounced: function() {
      clearTimeout(this.estadoBandeja.timeoutBusqueda);
      this.estadoBandeja.timeoutBusqueda = setTimeout(() => { this.procesarFiltrosLocales(); }, 300);
    },

    cargarDatosBandeja: function() {
      const cat = document.getElementById('inv-filtro-categoria').value;
      const edif = document.getElementById('inv-filtro-edificio').value;

      document.getElementById('inv-dashboard-content').innerHTML = `
        <div style="text-align: center; padding: 60px 20px;">
          <i class="fas fa-circle-notch spinner fa-3x" style="color: var(--primary);"></i>
          <p style="margin-top: 15px; color: var(--text-muted); font-weight: 600;">Consultando inventario...</p>
        </div>`;

      google.script.run
        .withSuccessHandler(res => {
          if (!res || !res.success) { this.mostrarError(res ? res.message : "Sin respuesta"); return; }
          this.estadoBandeja.datosOriginales = res.data || [];
          this.procesarFiltrosLocales(); 
        })
        .withFailureHandler(err => this.mostrarError(err.message))
        .obtenerInventarioBackend({
            categoria_id: cat ? parseInt(cat) : null,
            edificio_id: edif ? parseInt(edif) : null
        });
    },

    procesarFiltrosLocales: function() {
      const texto = document.getElementById('inv-filtro-texto').value.toLowerCase().trim();
      const agente = document.getElementById('inv-filtro-agente').value;
      
      let datosFiltrados = this.estadoBandeja.datosOriginales;

      if (agente !== '') datosFiltrados = datosFiltrados.filter(a => a.agente_asignado === agente);
      if (texto !== '') {
         datosFiltrados = datosFiltrados.filter(a => {
            const cadena = `${a.activo_id} ${a.categoria} ${a.marca} ${a.modelo} ${a.caracteristicas} ${a.nro_serie_imei} ${a.id_patrimonial} ${a.agente_asignado}`.toLowerCase();
            return cadena.includes(texto);
         });
      }
      this.renderizarGrilla(datosFiltrados, texto);
    },

    renderizarGrilla: function(lista, terminoResalte = '') {
      const box = document.getElementById('inv-dashboard-content');
      
      if (!lista || lista.length === 0) {
        box.innerHTML = `<div style="text-align:center; padding:60px; color:var(--text-muted); background: var(--bg-surface); border-radius: 16px; border: 1px dashed var(--border-hard);">
           <i class="fas fa-boxes fa-3x" style="opacity:0.2; margin-bottom:15px;"></i><p style="font-weight: 600;">El padrón de activos está vacío o no hay coincidencias.</p></div>`;
        return;
      }

      const resaltar = (texto) => {
        if (!terminoResalte || !texto) return texto || '';
        return String(texto).replace(new RegExp(`(${terminoResalte})`, 'gi'), `<mark style="background-color:var(--warning-bg); color:var(--warning); padding:0 2px; border-radius:4px;">$1</mark>`);
      };

      box.innerHTML = `<div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px; text-align: right; font-weight: 700; text-transform: uppercase;">Resultados: ${lista.length}</div>` + 
      lista.map(a => {
        let detalleFila3 = '';
        let iconCat = 'fa-desktop';
        if(a.categoria.toLowerCase().includes('insumo')) iconCat = 'fa-tint';
        else if(a.categoria.toLowerCase().includes('telefon')) iconCat = 'fa-mobile-alt';
        else if(a.categoria.toLowerCase().includes('electro')) iconCat = 'fa-blender';

        if (a.es_consumible) {
           detalleFila3 = `<span class="tm-badge-route" style="border-color:var(--success); color:var(--success); background:var(--success-bg);"><i class="fas fa-cubes"></i> Stock: ${a.stock_actual}</span>`;
        } else {
           detalleFila3 = `
             <span class="tm-badge-route"><i class="fas fa-map-marker-alt" style="color: var(--primary);"></i> ${a.edificio || 'S/D'}</span>
             <span class="tm-badge-route"><i class="fas fa-user-tie" style="color: var(--text-main);"></i> ${resaltar(a.agente_asignado)}</span>
           `;
        }

        const snText = a.nro_serie_imei ? `S/N: ${a.nro_serie_imei}` : '';
        const nombreDescriptivo = `${a.marca || ''} ${a.modelo || ''}`.trim() || a.categoria;

        return `
        <div class="ticket-activo" onclick="cargarModulo('InventarioFicha', '${a.activo_id}')" style="border-left-color: ${a.estado_color || 'var(--primary)'};">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
             <span class="tm-badge-cat"><i class="fas ${iconCat}" style="margin-right:4px;"></i> ${a.categoria}</span>
             <div style="display: flex; gap: 8px; align-items: center;">
               <button class="btn-icono" style="width: 32px; height: 32px; font-size: 0.85rem; background: var(--primary-light); border-color: transparent;" onclick="event.stopPropagation(); window.INV_App.mostrarQRCard('${a.activo_id}', '${nombreDescriptivo}')" title="Ver Código QR">
                  <i class="fas fa-qrcode" style="color: var(--primary);"></i>
               </button>
               <span style="font-size: 0.7rem; font-weight: 800; padding: 4px 10px; border-radius: 20px; background:${a.estado_color}20; color:${a.estado_color}; text-transform:uppercase;">${a.estado}</span>
             </div>
          </div>
          <div style="font-size: 1.15rem; font-weight: 800; color: var(--text-main); margin-bottom: 4px; line-height: 1.2;">
             ${resaltar(nombreDescriptivo)}
          </div>
          <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-bottom: 12px;">
             ${a.id_patrimonial ? `ID: <span style="color:var(--primary);">${resaltar(a.id_patrimonial)}</span> &bull; ` : ''} ${resaltar(snText)}
          </div>
          <div style="display: flex; gap: 8px; flex-wrap: wrap; border-top: 1px dashed var(--border-soft); padding-top: 12px;">
             ${detalleFila3}
          </div>
        </div>
      `}).join('');
    },

    mostrarQRCard: function(idActivo, marcaModelo) {
       document.getElementById('qr-modal-title').innerText = marcaModelo || 'Equipo Genérico';
       document.getElementById('qr-modal-subtitle').innerText = idActivo;
       document.getElementById('qr-modal-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(idActivo)}&margin=0`;
       document.getElementById('modal-ver-qr').classList.remove('hidden');
    },

    abrirModalAlta: function() {
       document.getElementById('alta-inv-categoria').value = '';
       document.getElementById('alta-inv-marca').value = '';
       document.getElementById('alta-inv-modelo').value = '';
       document.getElementById('alta-inv-serie').value = '';
       document.getElementById('alta-inv-idpat').value = '';
       document.getElementById('alta-inv-stock').value = 1;
       document.getElementById('alta-inv-estado').value = 1; 
       
       this.toggleCamposAlta();
       document.getElementById('modal-inv-alta').classList.remove('hidden');
    },

    toggleCamposAlta: function() {
       const selectCat = document.getElementById('alta-inv-categoria');
       const esInsumo = selectCat.options[selectCat.selectedIndex]?.text.toLowerCase().includes('insumo');
       
       if(esInsumo) {
           document.getElementById('box-alta-equipos').classList.add('hidden');
           document.getElementById('box-alta-insumos').classList.remove('hidden');
       } else {
           document.getElementById('box-alta-insumos').classList.add('hidden');
           document.getElementById('box-alta-equipos').classList.remove('hidden');
       }
    },

    guardarNuevoActivo: function() {
       const selectCat = document.getElementById('alta-inv-categoria');
       if(!selectCat.value) return Portal_Core.mostrarToast('warning', 'Faltan Datos', 'La categoría es obligatoria.');
       if(!document.getElementById('alta-inv-estado').value) return Portal_Core.mostrarToast('warning', 'Faltan Datos', 'El estado es obligatorio.');
       if(!document.getElementById('alta-inv-edificio').value) return Portal_Core.mostrarToast('warning', 'Faltan Datos', 'Debe asignarle un edificio de depósito inicial.');

       const esInsumo = selectCat.options[selectCat.selectedIndex]?.text.toLowerCase().includes('insumo');

       const payload = {
           categoria_id: parseInt(selectCat.value),
           marca_id: document.getElementById('alta-inv-marca').value ? parseInt(document.getElementById('alta-inv-marca').value) : null,
           modelo: document.getElementById('alta-inv-modelo').value.trim(),
           estado_id: parseInt(document.getElementById('alta-inv-estado').value),
           edificio_id: parseInt(document.getElementById('alta-inv-edificio').value),
           es_consumible: esInsumo,
           stock_actual: esInsumo ? parseInt(document.getElementById('alta-inv-stock').value) : 1
       };

       if(!esInsumo) {
           const serie = document.getElementById('alta-inv-serie').value.trim();
           const idpat = document.getElementById('alta-inv-idpat').value.trim();
           if(serie) payload.nro_serie_imei = serie;
           if(idpat) payload.id_patrimonial = idpat;
       }

       const btn = document.getElementById('btn-guardar-alta');
       btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner spinner"></i>';

       google.script.run
         .withSuccessHandler(res => {
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Registrar';
            if(res.success) {
               Portal_Core.cerrarModal('modal-inv-alta');
               Portal_Core.mostrarToast('success', 'Éxito', 'Activo ingresado a la base de datos.');
               this.cargarDatosBandeja(); 
               this.mostrarQRCard(res.id_qr, payload.modelo || 'Equipo Nuevo');
            } else {
               Portal_Core.mostrarToast('error', 'Error BD', res.message);
            }
         })
         .crearActivoBackend(payload, window.USUARIO_ACTUAL.idAgente);
    },

    iniciarFicha: function(idActivo) {
      this.estadoActual.idQR = idActivo;
      document.getElementById('ruta-actual').innerText = 'Ficha del Activo';
      document.getElementById('content-inv-ficha').classList.add('hidden');
      document.getElementById('loader-inv-ficha').classList.remove('hidden');
      
      this.detenerCamaraEnVivo(); 

      const m = document.getElementById('modal-inv-movimiento');
      if (m && m.parentElement !== document.body) document.body.appendChild(m);

      google.script.run
        .withSuccessHandler(res => {
           if (!res.success) { Portal_Core.mostrarToast('error', 'Error', res.message); this.volverAlScanOBandeja(); return; }
           this.estadoActual.activo = res.activo;
           this.renderizarFicha(res.activo, res.historial);
        })
        .withFailureHandler(err => {
           Portal_Core.mostrarToast('error', 'Red', err.message); this.volverAlScanOBandeja();
        })
        .obtenerFichaActivoBackend(idActivo);
    },

    volverAlScanOBandeja: function() {
        cargarModulo('InventarioBandeja');
    },

    renderizarFicha: function(activo, historial) {
      document.getElementById('ficha-inv-id').innerText = activo.activo_id.substring(0,8).toUpperCase();
      document.getElementById('ficha-inv-titulo').innerText = `${activo.marca || ''} ${activo.modelo || ''}`.trim() || activo.categoria;
      document.getElementById('ficha-inv-subtitulo').innerText = activo.categoria;
      
      const badge = document.getElementById('ficha-inv-estado');
      badge.innerText = activo.estado;
      badge.style.backgroundColor = activo.estado_color || 'var(--primary)';

      document.getElementById('ficha-inv-ubicacion').innerHTML = activo.edificio ? `${activo.edificio} <br><span style="font-size:0.8rem; color:var(--text-muted); font-weight: 500;">${activo.piso || 'S/P'} &bull; ${activo.area_asignada}</span>` : '<span style="color:var(--warning);">Depósito Central</span>';
      document.getElementById('ficha-inv-responsable').innerText = activo.agente_asignado !== 'Sin Asignar' ? activo.agente_asignado : (activo.area_asignada !== 'Sin Área' ? `Área: ${activo.area_asignada}` : 'Sin Responsable');

      const boxSerie = document.getElementById('box-inv-serie');
      const boxStock = document.getElementById('box-inv-stock');
      const btnFijo = document.getElementById('inv-botones-fijo');
      const btnInsumo = document.getElementById('inv-botones-insumo');

      if (activo.es_consumible) {
         boxSerie.classList.add('hidden');
         boxStock.classList.remove('hidden');
         document.getElementById('ficha-inv-stock').innerText = activo.stock_actual;
         btnFijo.classList.add('hidden');
         btnInsumo.classList.remove('hidden');
      } else {
         boxStock.classList.add('hidden');
         boxSerie.classList.remove('hidden');
         document.getElementById('ficha-inv-serie').innerHTML = `${activo.nro_serie_imei || 'S/N'}<br><span style="font-size:0.8rem; color:var(--text-muted); font-weight: 500;">ID Adm: ${activo.id_patrimonial || 'S/D'}</span>`;
         btnInsumo.classList.add('hidden');
         btnFijo.classList.remove('hidden');
      }

      this.dibujarTimeline(historial);
      document.getElementById('loader-inv-ficha').classList.add('hidden');
      document.getElementById('content-inv-ficha').classList.remove('hidden');
    },

    dibujarTimeline: function(historial) {
      const box = document.getElementById('timeline-inv-movimientos');
      if (!historial || historial.length === 0) {
        box.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted);"><i class="fas fa-box-open fa-2x" style="opacity:0.3; margin-bottom:10px;"></i><p>Sin movimientos registrados.</p></div>`;
        return;
      }

      box.innerHTML = historial.map(m => {
        let icono = 'fa-exchange-alt'; let color = 'var(--primary)';
        if(m.tipo_movimiento.includes('Alta')) { icono = 'fa-plus-circle'; color = 'var(--success)'; }
        if(m.tipo_movimiento.includes('Baja')) { icono = 'fa-trash-alt'; color = 'var(--danger)'; }
        if(m.tipo_movimiento.includes('Consumo')) { icono = 'fa-box-open'; color = 'var(--warning)'; }

        let fecha = 'S/D';
        try { const d = new Date(m.fecha_movimiento); fecha = d.toLocaleDateString('es-AR') + ' ' + d.toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit'}); } catch(e){}

        let detallesHTML = '';
        if (m.agente_destino !== 'N/D') detallesHTML += `<div style="font-size:0.8rem; margin-top:6px; background:var(--bg-surface); padding:4px 8px; border-radius:4px; border:1px solid var(--border-soft);"><i class="fas fa-user-check" style="color:var(--primary);"></i> Receptor: <b>${m.agente_destino}</b></div>`;
        if (m.cantidad > 1 || m.afecta_stock !== 0) detallesHTML += `<div style="font-size:0.8rem; margin-top:6px; background:var(--bg-surface); padding:4px 8px; border-radius:4px; border:1px solid var(--border-soft);"><i class="fas fa-cubes" style="color:var(--warning);"></i> Cantidad afectada: <b>${m.cantidad}</b></div>`;
        if (m.motivo_baja) detallesHTML += `<div style="font-size:0.8rem; margin-top:6px; background:var(--danger-bg); color:var(--danger); padding:6px 10px; border-radius:6px; font-weight:600;"><i class="fas fa-exclamation-triangle"></i> Motivo: ${m.motivo_baja}</div>`;

        return `
        <div class="tl-item">
          <div class="tl-dot" style="background:${color}; border-color:var(--bg-surface);"></div>
          <div class="tl-content" style="border-left: 3px solid ${color};">
            <div style="display:flex; justify-content:space-between; margin-bottom: 5px;">
              <span style="font-weight:800; color:${color}; font-size:0.85rem; text-transform:uppercase; letter-spacing:0.5px;">
                <i class="fas ${icono}" style="margin-right:4px;"></i> ${m.tipo_movimiento}
              </span>
              <span style="font-size:0.75rem; color:var(--text-muted); font-weight:700;">${fecha}</span>
            </div>
            ${detallesHTML}
            <div style="font-size:0.85rem; color:var(--text-main); margin-top:10px; line-height: 1.5;">${m.observaciones || '<span style="opacity:0.5;font-style:italic;">Sin observaciones</span>'}</div>
            <div style="font-size:0.7rem; color:var(--text-light); margin-top:12px; font-weight:600;">
               <i class="fas fa-pencil-alt"></i> Registrado por: ${m.registrado_por}
            </div>
          </div>
        </div>`;
      }).join('');
    },

    abrirModalMovimiento: function(accion) {
      document.getElementById('modal-inv-obs').value = '';
      const inputCant = document.getElementById('modal-inv-cantidad');
      inputCant.value = 1;

      ['modal-inv-box-cantidad', 'modal-inv-box-destino', 'modal-inv-box-responsable', 'modal-inv-box-baja'].forEach(id => {
         document.getElementById(id).classList.add('hidden');
      });

      const title = document.getElementById('modal-inv-title');
      const tipoHidden = document.getElementById('modal-inv-tipo');

      if (accion === 'Traslado') {
         title.innerHTML = '<i class="fas fa-people-carry" style="color:var(--primary)"></i> Asignar / Trasladar';
         tipoHidden.value = '4'; 
         document.getElementById('modal-inv-box-destino').classList.remove('hidden');
         document.getElementById('modal-inv-box-responsable').classList.remove('hidden');
         this.cargarSelectoresMovimiento();
      } else if (accion === 'Consumo') {
         title.innerHTML = '<i class="fas fa-box-open" style="color:var(--warning)"></i> Descontar Insumo';
         tipoHidden.value = '5'; 
         document.getElementById('modal-inv-box-cantidad').classList.remove('hidden');
         document.getElementById('modal-inv-box-responsable').classList.remove('hidden');
         inputCant.max = this.estadoActual.activo.stock_actual; 
         this.cargarSelectoresMovimiento(true);
      } else if (accion === 'Baja') {
         title.innerHTML = '<i class="fas fa-trash-alt" style="color:var(--danger)"></i> Dar de Baja';
         tipoHidden.value = '6'; 
         document.getElementById('modal-inv-box-baja').classList.remove('hidden');
      } else if (accion === 'Reparacion') {
         title.innerHTML = '<i class="fas fa-tools" style="color:var(--warning)"></i> Enviar a Reparación';
         tipoHidden.value = '3';
         document.getElementById('modal-inv-box-destino').classList.remove('hidden');
         this._cargarSelectoresMovimiento();
      }

      document.getElementById('modal-inv-movimiento').classList.remove('hidden');
    },

    cargarSelectoresMovimiento: function(soloAgentes = false) {
       const cache = Memoria.leer('diccionariosINV'); 
       if(!cache) return;
       if(!soloAgentes) this.llenarSelectSeguro('modal-inv-edificio', cache.edificios);
       this.llenarSelectSeguro('modal-inv-responsable', cache.agentes);
    },

    guardarMovimiento: function() {
      const tipoId = document.getElementById('modal-inv-tipo').value;
      const obs = document.getElementById('modal-inv-obs').value.trim();
      
      const payload = {
         activo_id: this.estadoActual.idQR,
         tipo_movimiento_id: parseInt(tipoId),
         agente_registro_id: window.USUARIO_ACTUAL.idAgente,
         observaciones: obs
      };

      if (tipoId === '4' || tipoId === '2') {
         payload.edificio_destino_id = parseInt(document.getElementById('modal-inv-edificio').value);
         payload.agente_destino_id = document.getElementById('modal-inv-responsable').value;
      } else if (tipoId === '5') {
         payload.cantidad = parseInt(document.getElementById('modal-inv-cantidad').value);
         payload.agente_destino_id = document.getElementById('modal-inv-responsable').value;
      } else if (tipoId === '6') {
         payload.motivo_baja = document.getElementById('modal-inv-motivo-baja').value;
         if(!payload.motivo_baja) return Portal_Core.mostrarToast('warning', 'Dato Requerido', 'Indique el motivo de la baja.');
      }

      const btn = document.getElementById('btn-guardar-mov-inv');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner spinner"></i> Registrando...';

      google.script.run
        .withSuccessHandler(res => {
           btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Confirmar';
           if(res.success) {
              Portal_Core.cerrarModal('modal-inv-movimiento');
              Portal_Core.mostrarToast('success', 'Guardado', 'Movimiento registrado correctamente.');
              this.iniciarFicha(this.estadoActual.idQR); 
           } else {
              Portal_Core.mostrarToast('error', 'Error DB', res.message);
           }
        })
        .registrarMovimientoInventarioBackend(payload);
    },

    procesarCodigoManual: function() {
        const inputId = document.getElementById('manual-qr-input').value.trim().toUpperCase();
        if (!inputId) return Portal_Core.mostrarToast('warning', 'Dato Requerido', 'Ingrese un código válido.');
        cargarModulo('InventarioFicha', inputId);
    },

    // =========================================================
    // LECTOR QR — POPUP EXTERNO
    // =========================================================
    // CONTEXTO: Google Apps Script sirve el portal dentro de un <iframe>
    // con Feature-Policy que bloquea getUserMedia. No hay forma de
    // desactivar ese bloqueo desde adentro del iframe.
    //
    // SOLUCIÓN: Abrimos un popup (window.open) que corre en el TOP-LEVEL
    // del navegador, donde el permiso de cámara sí funciona. El popup
    // lee el QR y devuelve el resultado al portal via window.opener.
    // =========================================================

    _popupQR: null,
    _listenerMensaje: null,

    abrirCamaraEnVivo: function() {
        const inputEl = document.getElementById('manual-qr-input');
        if (inputEl) inputEl.value = '';

        // Limpiar listener y popup anterior si existía
        this.detenerCamaraEnVivo();

        // HTML completo del popup — todo autocontenido, sin deps externas al inicio
        const htmlPopup = `<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Escanear QR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    p  { font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; text-align: center; }
    #visor { position: relative; width: 100%; max-width: 340px; border-radius: 16px; overflow: hidden; background: #000; aspect-ratio: 1; }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    canvas { display: none; }
    .mira { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 60%; aspect-ratio: 1; border: 3px solid #818cf8; border-radius: 12px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.45); pointer-events: none; }
    .esquina { position: absolute; width: 20px; height: 20px; border-color: #6366f1; border-style: solid; }
    .esquina.tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .esquina.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .esquina.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .esquina.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    #estado { margin-top: 16px; font-size: 0.8rem; color: #64748b; min-height: 20px; text-align: center; }
    #estado.ok  { color: #4ade80; font-weight: 700; }
    #estado.err { color: #f87171; }
    button { margin-top: 20px; padding: 10px 28px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <h2>📷 Escanear Código QR</h2>
  <p>Enfocá el código QR del activo.<br>La ventana se cerrará automáticamente.</p>
  <div id="visor">
    <video id="v" autoplay muted playsinline></video>
    <canvas id="c"></canvas>
    <div class="mira">
      <div class="esquina tl"></div><div class="esquina tr"></div>
      <div class="esquina bl"></div><div class="esquina br"></div>
    </div>
  </div>
  <div id="estado">Iniciando cámara...</div>
  <button onclick="window.close()">Cancelar</button>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"><\/script>
  <script>
    const video  = document.getElementById('v');
    const canvas = document.getElementById('c');
    const estado = document.getElementById('estado');
    let rafId = null;
    let streamActivo = null;
    let detectando = true;

    async function iniciar() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 1280 } },
          audio: false
        });
        streamActivo = stream;
        video.srcObject = stream;
        await video.play();
        estado.textContent = 'Buscando código QR...';
        
        const usarNativa = 'BarcodeDetector' in window;
        const detector   = usarNativa ? new BarcodeDetector({ formats: ['qr_code'] }) : null;
        const ctx        = canvas.getContext('2d');
        let ultimoFrame  = 0;

        const scan = async (ts) => {
          if (!detectando) return;
          if (ts - ultimoFrame < 100) { rafId = requestAnimationFrame(scan); return; }
          ultimoFrame = ts;
          if (video.readyState < video.HAVE_ENOUGH_DATA) { rafId = requestAnimationFrame(scan); return; }

          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0);

          let resultado = null;
          try {
            if (usarNativa) {
              const lista = await detector.detect(video);
              if (lista.length > 0) resultado = lista[0].rawValue;
            } else {
              const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const code    = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
              if (code) resultado = code.data;
            }
          } catch(e) {}

          if (resultado) {
            detectando = false;
            cancelAnimationFrame(rafId);
            streamActivo.getTracks().forEach(t => t.stop());
            estado.textContent = '✅ Código leído: ' + resultado;
            estado.className   = 'ok';
            // Enviar resultado al portal (window.opener es el iframe de GAS)
            if (window.opener && !window.opener.closed) {
              window.opener.postMessage({ tipo: 'QR_RESULT', valor: resultado.trim().toUpperCase() }, '*');
            }
            setTimeout(() => window.close(), 800);
            return;
          }
          rafId = requestAnimationFrame(scan);
        };

        rafId = requestAnimationFrame(scan);

      } catch(err) {
        const msg = err.name === 'NotAllowedError'
          ? '⛔ Permiso de cámara denegado. Revisá la configuración del navegador para este popup.'
          : '⚠️ Error: ' + err.message;
        estado.textContent = msg;
        estado.className   = 'err';
      }
    }

    window.addEventListener('beforeunload', () => {
      detectando = false;
      if (rafId) cancelAnimationFrame(rafId);
      if (streamActivo) streamActivo.getTracks().forEach(t => t.stop());
    });

    iniciar();
  <\/script>
</body>
</html>`;

        // Abrir popup en top-level (sale del sandbox del iframe)
        const ancho  = Math.min(420, screen.width);
        const alto   = Math.min(620, screen.height);
        const left   = Math.round((screen.width  - ancho) / 2);
        const top    = Math.round((screen.height - alto)  / 2);

        this._popupQR = window.open(
            'about:blank',
            'QRScanner',
            `width=${ancho},height=${alto},left=${left},top=${top},resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no`
        );

        if (!this._popupQR) {
            Portal_Core.mostrarToast('warning', 'Popup Bloqueado', 'El navegador bloqueó la ventana emergente. Permitila para este sitio en la barra de direcciones.');
            return;
        }

        // Escribir el HTML en el popup
        this._popupQR.document.open();
        this._popupQR.document.write(htmlPopup);
        this._popupQR.document.close();

        // Escuchar el mensaje que manda el popup cuando lee el QR
        this._listenerMensaje = (event) => {
            if (!event.data || event.data.tipo !== 'QR_RESULT') return;
            
            const inputEl = document.getElementById('manual-qr-input');
            if (inputEl) {
                inputEl.value = event.data.valor;
                inputEl.style.backgroundColor = '#fef08a';
                setTimeout(() => inputEl.style.backgroundColor = '', 1200);
            }

            Portal_Core.reproducirSonido('success');
            Portal_Core.mostrarToast('success', 'QR Leído', 'Código: ' + event.data.valor);

            // Limpiar
            window.removeEventListener('message', this._listenerMensaje);
            this._listenerMensaje = null;
            this._popupQR = null;
        };

        window.addEventListener('message', this._listenerMensaje);
    },

    detenerCamaraEnVivo: function() {
        // Cerrar popup si está abierto
        if (this._popupQR && !this._popupQR.closed) {
            this._popupQR.close();
        }
        this._popupQR = null;

        // Quitar listener de mensajes
        if (this._listenerMensaje) {
            window.removeEventListener('message', this._listenerMensaje);
            this._listenerMensaje = null;
        }

        // Por compatibilidad: si hubiera un stream de video viejo
        if (this._stream) {
            this._stream.getTracks().forEach(t => t.stop());
            this._stream = null;
        }

        const promptCard = document.getElementById('scan-prompt-card');
        const liveCard   = document.getElementById('live-camera-card');
        if (promptCard) promptCard.classList.remove('hidden');
        if (liveCard)   liveCard.classList.add('hidden');
    },

    iniciarScan: function() {
        document.getElementById('ruta-actual').innerText = 'Escanear Activo';
        this.detenerCamaraEnVivo(); 
    }
  });
</script>

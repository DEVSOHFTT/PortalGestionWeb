<style>
  .scan-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 450px;
    margin: 0 auto;
    animation: fadeIn 0.4s ease-out;
    padding-bottom: 20px;
  }
  
  .scan-header {
    display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 25px;
    background: var(--bg-surface); padding: 15px 20px; border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm); border-bottom: 3px solid var(--primary);
  }
  
  .scan-title { font-size: 1.2rem; font-weight: 800; color: var(--text-main); margin: 0; display: flex; align-items: center; gap: 10px; }
  
  .camera-prompt-card {
    background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: var(--radius-lg);
    padding: 30px 20px; text-align: center; width: 100%; box-shadow: var(--shadow-md); margin-bottom: 25px;
  }

  .camera-icon-wrapper {
    width: 80px; height: 80px; background: var(--primary-light); color: var(--primary); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 20px;
    box-shadow: 0 0 0 10px rgba(63, 34, 186, 0.1);
  }

  .manual-entry-box {
    width: 100%; background: var(--bg-surface); padding: 25px 20px; border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm); border: 1px solid var(--border-soft); border-left: 4px solid var(--warning);
  }
</style>

<div class="scan-wrapper">
  
  <div class="scan-header">
    <button class="btn btn-icono" onclick="cargarModulo('InventarioBandeja')" style="background: var(--bg-app); border-color: transparent;">
      <i class="fas fa-arrow-left" style="color: var(--text-main);"></i>
    </button>
    <h2 class="scan-title">
      <i class="fas fa-camera" style="color: var(--primary);"></i> Lector QR
    </h2>
    <div style="width: 40px;"></div>
  </div>

  <div class="camera-prompt-card" id="scan-prompt-card">
    <div class="camera-icon-wrapper"><i class="fas fa-qrcode"></i></div>
    <h3 style="font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 10px;">Escanear Equipo</h3>
    <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; margin-bottom: 30px; padding: 0 10px;">
      Toque el botón debajo para abrir la cámara de su dispositivo y enfocar el código QR del equipo.
    </p>
    
    <button class="btn btn-primary" onclick="INV_App.abrirCamaraEnVivo()" style="width: 100%; padding: 16px; font-size: 1.05rem; border-radius: 16px; background: var(--primary); border: none; box-shadow: 0 6px 20px rgba(63, 34, 186, 0.35);">
      <i class="fas fa-camera" style="margin-right: 8px; font-size: 1.2rem;"></i> Iniciar Cámara
    </button>
  </div>

  <div class="camera-prompt-card hidden" id="live-camera-card" style="padding: 15px;">
     <div style="border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 2px solid var(--primary); line-height: 0;">
        <video id="qr-video" style="width: 100%; background: #000;" muted playsinline></video>
     </div>
     <canvas id="qr-canvas" style="display:none;"></canvas>

     <button class="btn btn-outline" onclick="INV_App.detenerCamaraEnVivo()" style="width: 100%; border-radius: 12px; padding: 12px;">
       <i class="fas fa-times" style="color: var(--danger);"></i> Cancelar Escaneo
     </button>
  </div>

  <div class="manual-entry-box">
    <label class="form-label" style="color: var(--primary); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px; display: block;">
      <i class="fas fa-keyboard"></i> Ingreso Manual
    </label>
    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px;">Si la etiqueta está dañada, escriba el ID alfanumérico:</p>
    <div style="display: flex; gap: 10px;">
      <input type="text" id="manual-qr-input" class="form-input" placeholder="Ej: DF-A8X9" 
             onkeypress="if(event.key === 'Enter'){ event.preventDefault(); window.INV_App.procesarCodigoManual(); }" style="border-radius: 12px; font-family: monospace; font-size: 1rem; padding: 12px; text-transform: uppercase;">
      <button class="btn btn-primary" onclick="window.INV_App.procesarCodigoManual()" style="padding: 0 25px; border-radius: 12px; background: var(--warning); border-color: var(--warning);">
        <i class="fas fa-search"></i>
      </button>
    </div>
  </div>

</div>

<script>
  Object.assign(window.ATC_App, {

    iniciarDetalle: function(id) {
      if (this.temporizadores.bandeja) clearInterval(this.temporizadores.bandeja);

      const modales = ['modal-interaccion', 'modal-actuacion', 'modal-derivar', 'modal-expediente'];
      modales.forEach(mId => {
         const el = document.getElementById(mId);
         if (el && el.parentElement !== document.body) {
             document.body.appendChild(el);
         }
      });

      this.estadoDetalle.idCaso = id;
      this.estadoDetalle.idCiudadano = null; 
      
      document.getElementById('ruta-actual').innerText = `Ficha Técnica #${id.toUpperCase()}`;
      document.getElementById('content-detalle').classList.add('hidden');
      document.getElementById('loader-detalle').classList.remove('hidden');

      this.resetPanelesDetalle();

      google.script.run
        .withSuccessHandler(res => {
          if(!res.success) { Portal_Core.mostrarToast('error', 'Error del Sistema', res.message); this.volverABandeja(); return; }
          this.estadoDetalle.categoriaActual = res.gestion.categoria;
          this.estadoDetalle.idEstado = parseInt(res.gestion.idEstado); 
          this.pintarFichaDetalle(res);
        })
        .withFailureHandler(err => { Portal_Core.mostrarToast('error', 'Fallo Crítico', err.message); this.volverABandeja(); })
        .obtenerPaqueteCompletoCaso(id);
    },

    togglePanelDetalle: function(panelId, iconId) {
      const panel = document.getElementById(panelId);
      const icon = document.getElementById(iconId);
      if (panel.classList.contains('hidden')) {
          panel.classList.remove('hidden');
          icon.style.transform = 'rotate(0deg)';
      } else {
          panel.classList.add('hidden');
          icon.style.transform = 'rotate(180deg)';
      }
    },

    resetPanelesDetalle: function() {
      ['panel-datos-caso', 'panel-datos-ciudadano-extra'].forEach(id => {
         const panel = document.getElementById(id);
         if(panel) panel.classList.remove('hidden');
      });
      ['icon-datos-caso', 'icon-datos-ciudadano'].forEach(id => {
         const icon = document.getElementById(id);
         if(icon) icon.style.transform = 'rotate(0deg)';
      });
    },

    pintarFichaDetalle: function(res) {
      const { gestion, ciudadano, historialUnificado } = res;
      this.estadoDetalle.idCiudadano = ciudadano.id; 
      
      document.getElementById('vc-id').innerText = gestion.id.toUpperCase();
      const estadoLimpio = gestion.estado.toUpperCase().trim();
      const elBadge = document.getElementById('vc-estado-badge');
      
      switch(estadoLimpio) {
         case 'PENDIENTE': elBadge.innerHTML = `<i class="fas fa-clock"></i> ${estadoLimpio}`; elBadge.style.background = 'var(--warning-bg)'; elBadge.style.color = 'var(--warning)'; elBadge.style.border = '1px solid var(--warning)'; break;
         case 'ASIGNADO': elBadge.innerHTML = `<i class="fas fa-user-check"></i> ${estadoLimpio}`; elBadge.style.background = 'var(--primary-light)'; elBadge.style.color = 'var(--primary)'; elBadge.style.border = '1px solid var(--primary)'; break;
         case 'EN PROCESO': elBadge.innerHTML = `<i class="fas fa-play-circle"></i> ${estadoLimpio}`; elBadge.style.background = 'var(--success-bg)'; elBadge.style.color = 'var(--success)'; elBadge.style.border = '1px solid var(--success)'; break;
         case 'DERIVADO': elBadge.innerHTML = `<i class="fas fa-share"></i> ${estadoLimpio}`; elBadge.style.background = '#f3f0f0'; elBadge.style.color = 'var(--def-brown)'; elBadge.style.border = '1px solid var(--def-brown)'; break;
         case 'FINALIZADO': elBadge.innerHTML = `<i class="fas fa-check-double"></i> ${estadoLimpio}`; elBadge.style.background = '#dcfce7'; elBadge.style.color = '#10b981'; elBadge.style.border = '1px solid #34d399'; break;
         default: elBadge.innerHTML = `<i class="fas fa-info-circle"></i> ${estadoLimpio}`; elBadge.style.background = '#f1f5f9'; elBadge.style.color = '#64748b'; elBadge.style.border = '1px solid #cbd5e1';
      }
      
      document.getElementById('vc-fecha').innerText = gestion.fecha;
      document.getElementById('vc-categoria').innerText = gestion.categoria;
      document.getElementById('vc-area').innerText = gestion.areaNombre || 'Sin Asignar';
      document.getElementById('vc-canal').innerText = gestion.canal;
      document.getElementById('vc-prioridad').innerText = gestion.prioridad;
      document.getElementById('vc-agente-origen').innerText = gestion.agenteOrigen;

      const elAgenteResp = document.getElementById('vc-agente-resp');
      if (gestion.agenteRespId === window.USUARIO_ACTUAL.idAgente) elAgenteResp.innerHTML = `<span style="background:var(--success-bg); color:var(--success); padding:3px 8px; border-radius:6px; font-weight:700; border: 1px solid var(--success); font-size:0.75rem;"><i class="fas fa-shield-alt"></i> Asignado a Mi</span>`;
      else elAgenteResp.innerText = gestion.agenteResp;
      
      const miId = String(window.USUARIO_ACTUAL.idAgente || window.USUARIO_ACTUAL.id);
      const miAreaId = String(window.USUARIO_ACTUAL.idArea || window.USUARIO_ACTUAL.area_id);
      const esMio = gestion.agenteRespId ? (miId === String(gestion.agenteRespId)) : false;
      const esMiArea = gestion.areaDestinoId ? (miAreaId === String(gestion.areaDestinoId)) : false;
      const puedeEditar = (esMio || esMiArea) && parseInt(gestion.idEstado) !== 3;

      const exp = document.getElementById('vc-expediente');
      if (gestion.expediente !== "No posee") {
          if (puedeEditar) {
              exp.innerHTML = `<div style="display:flex; align-items:center; gap:6px; flex-wrap: wrap; justify-content: flex-end;">
                  <span class="exp-badge-solid" style="display:flex; align-items:center; gap:4px;"><i class="fas fa-file-contract"></i> ${gestion.expediente}</span>
                  <button class="btn-icono" style="width: 24px; height: 24px; font-size: 0.7rem;" onclick="ATC_App.abrirModalExpediente('${gestion.expediente}')" title="Modificar Expediente"><i class="fas fa-pen"></i></button>
                  <button class="btn-icono" style="width: 24px; height: 24px; font-size: 0.7rem; color: var(--danger); border-color: var(--danger-bg); background: var(--danger-bg);" onclick="ATC_App.desvincularExpediente()" title="Desvincular Expediente"><i class="fas fa-unlink"></i></button>
              </div>`;
          } else {
              exp.innerHTML = `<span class="exp-badge-solid" style="display:flex; align-items:center; gap:6px;"><i class="fas fa-file-contract"></i> ${gestion.expediente}</span>`;
          }
      } else {
          if (puedeEditar) {
              exp.innerHTML = `<button class="btn btn-outline" style="padding: 2px 10px; font-size: 0.7rem; border-color: var(--primary); color: var(--primary);" onclick="ATC_App.abrirModalExpediente()"><i class="fas fa-link"></i> Vincular</button>`;
          } else {
              exp.innerHTML = `<span style="color:var(--text-light); font-size: 0.8rem;">No posee</span>`;
          }
      }
      
      document.getElementById('vc-observaciones').innerText = gestion.observaciones;

      const c = ciudadano;
      let nombreLimpio = c.nombre || "No Registrado";
      if (c.apellido && c.apellido !== '-') nombreLimpio = `${c.apellido}, ${c.nombre}`;
      document.getElementById('vc-ciu-nombre').innerText = nombreLimpio.toUpperCase();
      
      document.getElementById('vc-ciu-dni').innerHTML = c.dni ? `<i class="fas fa-id-card"></i> DNI: ${c.dni}` : `<i class="fas fa-id-card"></i> Sin DNI`;
      document.getElementById('vc-ciu-cuil').innerHTML = c.cuil ? `<i class="fas fa-hashtag"></i> CUIT/L: ${c.cuil}` : `<i class="fas fa-hashtag"></i> Sin CUIT/L`;
      document.getElementById('vc-ciu-tel').innerHTML = c.telefono ? `<i class="fas fa-phone-alt"></i> ${c.telefono}` : `<i class="fas fa-phone-alt"></i> Sin Teléfono`;
      document.getElementById('vc-ciu-email').innerHTML = c.email ? `<i class="fas fa-envelope"></i> ${c.email}` : `<i class="fas fa-envelope"></i> Sin Email`;

      const esOrg = (c.dni && c.dni.length > 8) || String(c.tipo_entidad_id) === '2';
      const avatarBox = document.getElementById('vc-ciu-avatar');
      if (esOrg) {
         avatarBox.innerHTML = '<i class="fas fa-building"></i>';
         avatarBox.style.background = 'var(--warning-bg)';
         avatarBox.style.color = 'var(--warning)';
      } else {
         avatarBox.innerHTML = '<i class="fas fa-user"></i>';
         avatarBox.style.background = 'var(--primary-light)';
         avatarBox.style.color = 'var(--primary)';
      }

      let edadTxt = 'Sin registrar';
      if(c.fecha_nacimiento) {
         try {
            const dn = new Date(c.fecha_nacimiento);
            const edad = Math.floor((new Date() - dn) / 31557600000);
            if(edad >= 0) edadTxt = `${edad} años`;
         } catch(e) {}
      }
      document.getElementById('vc-ciu-nac').innerText = edadTxt;

      let txtGen = 'N/D';
      if(String(c.genero_id)==='1') txtGen = 'Masculino';
      else if(String(c.genero_id)==='2') txtGen = 'Femenino';
      else if(String(c.genero_id)==='3') txtGen = 'No Binario';
      document.getElementById('vc-ciu-genero').innerText = txtGen;

      let loc = [];
      if(c.calle) loc.push(`${c.calle} ${c.altura || ''}`);
      if(c.piso || c.dpto) loc.push(`Piso ${c.piso || '-'} Dpto ${c.dpto || '-'}`);
      if(c.barrio_id) {
         const cache = Memoria.leer('diccionariosATC');
         if(cache && cache.barrios) {
            const b = cache.barrios.find(x => String(x.id) === String(c.barrio_id));
            if(b) loc.push(b.nombre);
         }
      }
      document.getElementById('vc-ciu-domicilio').innerText = loc.length > 0 ? loc.join(' - ') : 'Sin registrar';

      this.dibujarBotonesDetalle(gestion);
      this.dibujarTimelineUnificado(historialUnificado);

      document.getElementById('loader-detalle').classList.add('hidden');
      document.getElementById('content-detalle').classList.remove('hidden');
    },

    abrirFichaCiudadano: function() {
      if (this.estadoDetalle.idCiudadano) {
          window.ATC_App.estadoFicha = { idCasoOrigen: this.estadoDetalle.idCaso };
          cargarModulo('FichaCiudadano', this.estadoDetalle.idCiudadano);
      } else {
          Portal_Core.mostrarToast('warning', 'Sin Registro', 'Este caso no posee un ciudadano debidamente registrado.');
      }
    },

    dibujarBotonesDetalle: function(g) {
      const boxTop = document.getElementById('contenedor-acciones');
      const boxBtnHistorial = document.getElementById('contenedor-btn-historial');
      
      const miId = String(window.USUARIO_ACTUAL.idAgente || window.USUARIO_ACTUAL.id);
      const miAreaId = String(window.USUARIO_ACTUAL.idArea || window.USUARIO_ACTUAL.area_id);
      
      const esMio = g.agenteRespId ? (miId === String(g.agenteRespId)) : false;
      const esMiArea = g.areaDestinoId ? (miAreaId === String(g.areaDestinoId)) : false;
      const estaHuerfano = !g.agenteRespId || parseInt(g.idEstado) === 4;
      const idEst = parseInt(g.idEstado);

      boxTop.innerHTML = ''; boxBtnHistorial.innerHTML = '';

      if (idEst === 3) { 
        if (esMio) {
          boxTop.innerHTML = `<button class="btn btn-outline" style="color:var(--warning); border-color:var(--warning);" onclick="ATC_App.ejecutarAccionDetalle('reabrir')"><i class="fas fa-undo"></i> Retomar Caso</button>`;
          boxBtnHistorial.innerHTML = `<span style="font-size:0.85rem; color:var(--danger); font-weight:600;"><i class="fas fa-lock"></i> Caso Cerrado. Edición bloqueada.</span>`;
        } else {
          boxBtnHistorial.innerHTML = `<span style="font-size:0.85rem; color:var(--text-light);"><i class="fas fa-lock"></i> Finalizado por ${g.agenteResp}.</span>`;
        }
      } 
      else if (estaHuerfano) { 
        if (esMiArea) {
          boxTop.innerHTML = `<button class="btn btn-primary" onclick="ATC_App.ejecutarAccionDetalle('tomar')"><i class="fas fa-hand-paper"></i> Tomar Caso</button>`;
          boxBtnHistorial.innerHTML = `<span style="font-size:0.85rem; color:var(--warning); font-weight:600;"><i class="fas fa-exclamation-triangle"></i> Tome el caso para comenzar a operar.</span>`;
        } else {
          boxBtnHistorial.innerHTML = `<span style="font-size:0.85rem; color:var(--text-light);"><i class="fas fa-building"></i> En bandeja de ${g.areaNombre}.</span>`;
        }
      }
      else if (idEst === 2) { 
        boxBtnHistorial.innerHTML = `<span style="font-size:0.85rem; color:var(--danger); font-weight:600;"><i class="fas fa-external-link-alt"></i> Derivado externamente. Esperando respuesta.</span>`;
      }
      else { 
        if (esMio) {
           boxTop.innerHTML = `
             <button class="btn btn-outline" onclick="ATC_App.abrirModalDerivar()"><i class="fas fa-share"></i> Derivar</button>
             <button class="btn" style="background: #10b981; color: white;" onclick="ATC_App.ejecutarAccionDetalle('finalizar')"><i class="fas fa-check-double"></i> Finalizar Caso</button>
           `;
           boxBtnHistorial.innerHTML = `
             <button class="btn btn-outline btn-sm" style="color: var(--warning); border-color: var(--warning);" onclick="ATC_App.abrirModalInteraccion()"><i class="far fa-comment-dots"></i> Agregar Interacción</button>
             <button class="btn btn-primary btn-sm" onclick="ATC_App.abrirModalActuacion()"><i class="fas fa-plus"></i> Nueva Actuación</button>
           `;
        } else if (esMiArea) {
           boxTop.innerHTML = `<span style="background: var(--primary-light); color: var(--primary); padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; border: 1px solid rgba(63, 34, 186, 0.15); box-shadow: var(--shadow-sm);"><i class="fas fa-hands-helping"></i> MODO COLABORADOR</span>`;
           boxBtnHistorial.innerHTML = `
             <button class="btn btn-outline btn-sm" style="color: var(--warning); border-color: var(--warning);" onclick="ATC_App.abrirModalInteraccion()"><i class="far fa-comment-dots"></i> Agregar Interacción</button>
             <button class="btn btn-primary btn-sm" onclick="ATC_App.abrirModalActuacion()"><i class="fas fa-plus"></i> Nueva Actuación</button>
           `;
        } else {
           boxBtnHistorial.innerHTML = `<span style="font-size:0.85rem; color:var(--text-light);"><i class="fas fa-user-lock"></i> Asignado a ${g.agenteResp} (${g.areaNombre}).</span>`;
        }
      }
    },

    dibujarTimelineUnificado: function(lista) {
      const box = document.getElementById('timeline-unificado');
      if(!lista || lista.length === 0) {
        box.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-light); background:#f8fafc; border-radius:12px; border:1px dashed var(--border-soft);"><i class="fas fa-history fa-2x" style="opacity:0.3; margin-bottom:10px;"></i><p style="font-weight:500;">No hay movimientos registrados.</p></div>`;
        return;
      }
      
      const bloqueado = [2, 3].includes(this.estadoDetalle.idEstado);

      box.innerHTML = lista.map(i => {
        let btnEdit = '';
        if (!bloqueado && i.tipo !== 'SISTEMA' && String(i.agenteId) === String(window.USUARIO_ACTUAL.idAgente)) {
            const dataStr = encodeURIComponent(JSON.stringify(i.dataCruda));
            const func = i.tipo === 'ACTUACION' ? 'abrirModalActuacion' : 'abrirModalInteraccion';
            btnEdit = `<div class="tl-actions"><button class="btn-edit-tl" onclick="ATC_App.${func}('${dataStr}')" title="Editar"><i class="fas fa-edit"></i></button></div>`;
        }

        let icono = 'fa-circle'; let color = '#64748b'; let badgeHtml = '';
        if(i.tipo === 'ACTUACION') { 
            icono = 'fa-file-signature'; color = 'var(--primary)'; 
            badgeHtml = `<span style="background: var(--primary-light); color: var(--primary); padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; letter-spacing: 0.5px; border: 1px solid var(--primary);">ACTUACIÓN</span>`;
        }
        else if(i.tipo === 'INTERACCION') { 
            icono = 'fa-comment-dots'; color = 'var(--warning)';
            badgeHtml = `<span style="background: var(--warning-bg); color: var(--warning); padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; letter-spacing: 0.5px; border: 1px solid var(--warning);">INTERACCIÓN</span>`;
        }
        else if(i.tipo === 'SISTEMA') { 
            icono = 'fa-robot'; color = '#94a3b8';
            badgeHtml = `<span style="background: #f1f5f9; color: var(--text-muted); padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; letter-spacing: 0.5px; border: 1px solid var(--border-hard);">SISTEMA</span>`;
        }

        let subtituloHtml = '';
        if (i.subtitulo) {
           let bg = '#f1f5f9', col = '#64748b';
           let sub = String(i.subtitulo).toUpperCase();
           if (sub.includes('INICIAD')) { bg = '#dbeafe'; col = '#0284c7'; } 
           if (sub.includes('SUSPENDID')) { bg = '#fef08a'; col = '#a16207'; } 
           if (sub.includes('FINALIZAD')) { bg = '#dcfce7'; col = '#16a34a'; } 
           if (sub.includes('ANULAD')) { bg = '#fee2e2'; col = '#dc2626'; } 
           subtituloHtml = `<span style="background:${bg}; color:${col}; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; margin-bottom: 10px; display: inline-block;">ESTADO: ${sub}</span>`;
        }

        return `
        <div class="tl-item">
          <div class="tl-dot" style="background:${color};"><i class="fas ${icono}"></i></div>
          <div class="tl-content" style="border-left: 4px solid ${color};">
            ${btnEdit}
            <div style="display:flex; justify-content:space-between; align-items: flex-start; margin-bottom:12px; padding-right:30px;">
              <div style="display:flex; align-items:center; gap: 10px;">
                ${badgeHtml}
                <span style="font-weight:700; color:var(--text-main); font-size: 0.9rem;"><i class="fas ${i.tipo === 'SISTEMA' ? 'fa-robot' : 'fa-user-tie'}" style="color:var(--text-muted); margin-right:5px;"></i> ${i.agente}</span>
              </div>
              <span style="color:var(--text-muted); font-weight:600; font-size: 0.8rem;">${i.fechaFormat} hs</span>
            </div>
            <div style="margin-bottom: 5px; font-weight: 700; color: ${color}; font-size: 1.05rem; letter-spacing: -0.01em;">${i.titulo}</div>
            ${subtituloHtml}
            <div style="font-size:0.95rem; line-height: 1.6; color: ${i.tipo === 'SISTEMA' ? 'var(--text-muted)' : 'var(--text-main)'}; font-style: ${i.tipo === 'SISTEMA' ? 'italic' : 'normal'}; white-space: pre-wrap;">${i.texto}</div>
          </div>
        </div>
      `}).join('');
    },

    ejecutarAccionDetalle: function(accion) {
      const titulos = { 'tomar': '¿Tomar el Caso?', 'reabrir': '¿Reabrir el Caso?', 'finalizar': '¿Finalizar el Caso?' };
      Portal_Core.mostrarConfirmacion(titulos[accion] || '¿Confirmar Acción?', `¿Confirma que desea realizar esta acción sobre el caso?`,
        () => {
           document.getElementById('contenedor-acciones').innerHTML = '<span style="color:var(--primary); font-weight:600;"><i class="fas fa-circle-notch spinner"></i> Ejecutando...</span>';
           google.script.run
             .withSuccessHandler(res => {
               if(!res.success) Portal_Core.mostrarToast('warning', 'Atención', res.message); 
               else { Portal_Core.mostrarToast('success', 'Éxito', 'Estado actualizado.'); window.ATC_App.checkNotificaciones(); }
               this.iniciarDetalle(this.estadoDetalle.idCaso); 
             }).withFailureHandler(err => Portal_Core.mostrarToast('error', 'Fallo de Red', err.message))
             .procesarAccionBackend(accion, this.estadoDetalle.idCaso, window.USUARIO_ACTUAL.idAgente, window.USUARIO_ACTUAL.nombre);
        }
      );
    },

    cerrarModalDetalle: function(idModal) { 
        Portal_Core.cerrarModal(idModal);
        if (idModal === 'modal-expediente') {
            document.getElementById('modal-exp-resultados').classList.add('hidden');
            if (this.timeoutBusquedaExp) clearTimeout(this.timeoutBusquedaExp);
        }
    },

    timeoutBusquedaExp: null,

    abrirModalExpediente: function(codigoActual = null) {
      document.getElementById('modal-exp-codigo').value = codigoActual || '';
      document.getElementById('modal-exp-resultados').classList.add('hidden');
      
      const btnGuardar = document.getElementById('btn-guardar-exp');
      btnGuardar.disabled = false; btnGuardar.innerHTML = '<i class="fas fa-link"></i> Vincular';

      document.getElementById('modal-expediente').classList.remove('hidden');
      setTimeout(() => document.getElementById('modal-exp-codigo').focus(), 100);
    },

    buscarExpedienteInput: function() {
        const input = document.getElementById('modal-exp-codigo');
        const box = document.getElementById('modal-exp-resultados');
        const termino = input.value.trim();

        if (this.timeoutBusquedaExp) clearTimeout(this.timeoutBusquedaExp);

        if (termino.length < 3) {
            box.classList.add('hidden');
            return;
        }

        box.innerHTML = `<div style="padding: 10px; text-align: center; color: var(--text-muted); font-size: 0.8rem;"><i class="fas fa-spinner fa-spin"></i> Buscando en archivo...</div>`;
        box.classList.remove('hidden');

        this.timeoutBusquedaExp = setTimeout(() => {
            google.script.run
              .withSuccessHandler(res => {
                if (res.length === 0) {
                    box.innerHTML = `<div style="padding: 10px; text-align: center; color: var(--text-light); font-size: 0.8rem;">No se encontraron coincidencias.</div>`;
                } else {
                    box.innerHTML = res.map(e => `
                        <div style="padding: 10px 15px; border-bottom: 1px solid var(--border-soft); cursor: pointer; transition: 0.2s;" 
                             onmouseover="this.style.background='var(--bg-app)'" onmouseout="this.style.background='white'"
                             onclick="ATC_App.seleccionarExpediente('${e.codigo}')">
                            <div style="font-weight: 700; color: var(--primary); font-size: 0.85rem;">${e.codigo}</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${e.titulo || 'Sin título registrado'}</div>
                        </div>
                    `).join('');
                }
            }).buscarExpedientesBackend(termino);
        }, 500);
    },

    seleccionarExpediente: function(codigo) {
        document.getElementById('modal-exp-codigo').value = codigo;
        document.getElementById('modal-exp-resultados').classList.add('hidden');
    },

    guardarAsociacionExpediente: function() {
      const codigo = document.getElementById('modal-exp-codigo').value.trim();
      if (!codigo) return Portal_Core.mostrarToast('warning', 'Validación', 'Debe ingresar o seleccionar un código de expediente.');
      
      const btn = document.getElementById('btn-guardar-exp');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i> Vinculando...';

      google.script.run
        .withSuccessHandler(res => {
            if (res.success) {
                Portal_Core.mostrarToast('success', 'Éxito', 'Expediente vinculado correctamente al caso.');
                this.cerrarModalDetalle('modal-expediente');
                this.iniciarDetalle(this.estadoDetalle.idCaso); 
            } else {
                Portal_Core.mostrarToast('error', 'Error', res.message);
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-link"></i> Vincular';
            }
        })
        .withFailureHandler(err => {
            Portal_Core.mostrarToast('error', 'Fallo de Red', err.message);
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-link"></i> Vincular';
        })
        .gestionarAsociacionExpedienteBackend(this.estadoDetalle.idCaso, codigo, window.USUARIO_ACTUAL.idAgente, 'vincular');
    },

    desvincularExpediente: function() {
       Portal_Core.mostrarConfirmacion('¿Desvincular Expediente?', 'El caso perderá su conexión con el expediente actual. ¿Desea continuar?', () => {
           document.getElementById('contenedor-acciones').innerHTML = '<span style="color:var(--danger); font-weight:600;"><i class="fas fa-circle-notch spinner"></i> Desvinculando...</span>';
           google.script.run
            .withSuccessHandler(res => {
                if (res.success) {
                    Portal_Core.mostrarToast('success', 'Desvinculado', 'El expediente fue retirado del caso.');
                    this.iniciarDetalle(this.estadoDetalle.idCaso); 
                } else {
                    Portal_Core.mostrarToast('error', 'Error DB', res.message);
                    this.iniciarDetalle(this.estadoDetalle.idCaso); 
                }
            })
            .gestionarAsociacionExpedienteBackend(this.estadoDetalle.idCaso, null, window.USUARIO_ACTUAL.idAgente, 'desvincular');
       });
    },

    abrirModalDerivar: function() {
      const cache = Memoria.leer('diccionariosATC');
      if (!cache || !cache.tipos_destinatario) return Portal_Core.mostrarToast('error', 'Error', 'Faltan diccionarios. Recargue el portal.');
      
      Portal_Core.poblarSelect('modal-der-tipo', cache.tipos_destinatario);
      document.getElementById('modal-der-tipo').value = '';
      document.getElementById('modal-der-destino').innerHTML = '';
      document.getElementById('modal-der-motivo').value = '';
      document.getElementById('modal-der-box-destino').classList.add('hidden');
      
      const btn = document.getElementById('btn-guardar-der');
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Ejecutar Derivación';
      
      document.getElementById('modal-derivar').classList.remove('hidden');
    },

    cambiarTipoDestinoDerivacion: function() {
        const tipo = document.getElementById('modal-der-tipo').value;
        const container = document.getElementById('modal-der-box-destino');
        const select = document.getElementById('modal-der-destino');
        const label = document.getElementById('modal-der-lbl-destino');
        const cache = Memoria.leer('diccionariosATC');
        const cacheGlobal = Memoria.leer('diccionariosGlobales');
        
        select.innerHTML = '<option value="">Seleccione destino...</option>';
        if(!tipo) { container.classList.add('hidden'); return; }
        
        container.classList.remove('hidden');
        select.required = true;

        if (tipo === '1' && cacheGlobal && cacheGlobal.agentes) {
            label.innerHTML = 'Agente Responsable <span style="color:var(--danger)">*</span>';
            cacheGlobal.agentes.forEach(a => select.innerHTML += `<option value="${a.id}">${a.apellido}, ${a.nombre}</option>`);
        } else if (tipo === '2' && cacheGlobal && cacheGlobal.areas) {
            label.innerHTML = 'Área Destino <span style="color:var(--danger)">*</span>';
            cacheGlobal.areas.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nombre}</option>`);
        } else if (tipo === '3' && cache && cache.organismos) {
            label.innerHTML = 'Organismo Externo <span style="color:var(--danger)">*</span>';
            cache.organismos.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nombre}</option>`);
        }
    },

    guardarDerivacion: function() {
      const tipoDestino = document.getElementById('modal-der-tipo').value;
      const destinoId = document.getElementById('modal-der-destino').value;
      const selectDestino = document.getElementById('modal-der-destino');
      const motivo = document.getElementById('modal-der-motivo').value.trim();

      if (!tipoDestino || !destinoId || !motivo) return Portal_Core.mostrarToast('warning', 'Validación', 'Complete todos los campos de derivación.');

      const destinoNombre = selectDestino.options[selectDestino.selectedIndex].text;
      
      const btn = document.getElementById('btn-guardar-der');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner spinner"></i> Procesando...';

      const payload = {
          recepcion_id: this.estadoDetalle.idCaso,
          agente_origen_id: window.USUARIO_ACTUAL.idAgente,
          tipo_destinatario_id: parseInt(tipoDestino),
          destino_id: destinoId, 
          destino_nombre: destinoNombre,
          motivo_derivacion: motivo
      };

      google.script.run
        .withSuccessHandler(res => {
            if(res.success) {
               Portal_Core.mostrarToast('success', 'Caso Derivado', `El caso se ha derivado exitosamente.`);
               this.cerrarModalDetalle('modal-derivar');
               window.ATC_App.checkNotificaciones();
               this.iniciarDetalle(this.estadoDetalle.idCaso); 
            } else {
               Portal_Core.mostrarToast('error', 'Error SQL', res.message);
               btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Ejecutar Derivación';
            }
        })
        .derivarCasoBackend(payload);
    },

    abrirModalInteraccion: function(dataEncoded = null) {
      const modalText = document.getElementById('modal-int-texto');
      const modalId = document.getElementById('modal-int-id');
      const btnGuardar = document.getElementById('btn-guardar-int');
      const modalTitle = document.getElementById('modal-int-title');
      if (dataEncoded) {
          const data = JSON.parse(decodeURIComponent(dataEncoded));
          modalId.value = data.interaccion_id; modalText.value = data.observacion;
          modalTitle.innerText = "Editar Interacción"; btnGuardar.innerHTML = '<i class="fas fa-save"></i> Actualizar';
      } else {
          modalId.value = ''; modalText.value = '';
          modalTitle.innerText = "Nueva Interacción"; btnGuardar.innerHTML = '<i class="fas fa-save"></i> Guardar';
      }
      btnGuardar.disabled = false;
      document.getElementById('modal-interaccion').classList.remove('hidden');
      setTimeout(() => modalText.focus(), 100);
    },

    guardarInteraccion: function() {
      const texto = document.getElementById('modal-int-texto').value.trim();
      const idExistente = document.getElementById('modal-int-id').value;
      if(!texto) return Portal_Core.mostrarToast('warning', 'Validación', 'Debe escribir un comentario.');
      const btn = document.getElementById('btn-guardar-int');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner spinner"></i> Procesando...';

      const payload = { recepcion_id: this.estadoDetalle.idCaso, agente_id: window.USUARIO_ACTUAL.idAgente, es_mensaje_sistema: false, observacion: texto };
      if (idExistente) payload.id = idExistente; 
      
      google.script.run
        .withSuccessHandler(res => { 
          if(res.success) {
            Portal_Core.mostrarToast('success', 'Éxito', idExistente ? 'Interacción actualizada.' : 'Interacción registrada.');
            this.cerrarModalDetalle('modal-interaccion');
            window.ATC_App.checkNotificaciones(); 
            this.iniciarDetalle(this.estadoDetalle.idCaso); 
          } else {
            Portal_Core.mostrarToast('error', 'Error SQL', res.message);
            btn.disabled = false; btn.innerHTML = idExistente ? '<i class="fas fa-save"></i> Actualizar' : '<i class="fas fa-save"></i> Guardar';
          }
        }).guardarInteraccionBackend(payload);
    },

    seleccionarEstadoActuacion: function(idEstado, elemento) {
        document.getElementById('modal-act-estado').value = idEstado;
        const container = document.getElementById('modal-act-estado-group');
        Array.from(container.children).forEach(el => el.classList.remove('active'));
        if (elemento) elemento.classList.add('active');
    },

    abrirModalActuacion: function(dataEncoded = null) {
      const cache = Memoria.leer('diccionariosATC');
      if (!cache || !cache.tramites || !cache.estados_actuacion) return Portal_Core.mostrarToast('error', 'Faltan Diccionarios', 'Por favor, reinicie su sesión.');
      const objCat = cache.categorias.find(c => c.nombre === this.estadoDetalle.categoriaActual);
      const tramitesFiltrados = objCat ? cache.tramites.filter(t => t.categoria_id == objCat.id) : cache.tramites;
      Portal_Core.poblarSelect('modal-act-tramite', tramitesFiltrados);
      
      const groupEstados = document.getElementById('modal-act-estado-group');
      groupEstados.innerHTML = cache.estados_actuacion.map(e => `<div class="radio-btn-estado" onclick="ATC_App.seleccionarEstadoActuacion(${e.id}, this)">${e.nombre}</div>`).join('');

      const modalId = document.getElementById('modal-act-id');
      const selTramite = document.getElementById('modal-act-tramite');
      const inputEstado = document.getElementById('modal-act-estado');
      const modalText = document.getElementById('modal-act-texto');
      const btnGuardar = document.getElementById('btn-guardar-act');
      const modalTitle = document.getElementById('modal-act-title');
      inputEstado.value = '';

      if (dataEncoded) {
          const data = JSON.parse(decodeURIComponent(dataEncoded));
          modalId.value = data.actuacion_id; selTramite.value = data.tramite_id || "";
          if (data.estado_id) {
             const idx = cache.estados_actuacion.findIndex(e => e.id == data.estado_id);
             if (idx !== -1) this.seleccionarEstadoActuacion(data.estado_id, groupEstados.children[idx]);
          }
          modalText.value = data.observaciones || ""; modalTitle.innerText = "Editar Actuación Formal";
          btnGuardar.innerHTML = '<i class="fas fa-save"></i> Actualizar';
      } else {
          modalId.value = ''; selTramite.value = ''; modalText.value = ''; modalTitle.innerText = "Registrar Actuación Formal";
          btnGuardar.innerHTML = '<i class="fas fa-save"></i> Registrar';
      }
      btnGuardar.disabled = false; document.getElementById('modal-actuacion').classList.remove('hidden');
    },

    guardarActuacion: function() {
      const idExistente = document.getElementById('modal-act-id').value;
      const tramite = document.getElementById('modal-act-tramite').value;
      const estado = document.getElementById('modal-act-estado').value;
      const texto = document.getElementById('modal-act-texto').value.trim();
      
      if(!tramite || !estado || !texto) return Portal_Core.mostrarToast('warning', 'Campos Obligatorios', 'El Tipo de Trámite, el Estado y las Observaciones son obligatorios.');
      
      const btn = document.getElementById('btn-guardar-act');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner spinner"></i> Procesando...';

      const payload = { recepcion_id: this.estadoDetalle.idCaso, agente_id: window.USUARIO_ACTUAL.idAgente, tramite_id: parseInt(tramite), estado_id: parseInt(estado), observaciones: texto || null };
      if (idExistente) payload.id = idExistente;
      
      google.script.run
        .withSuccessHandler(res => { 
          if(res.success) {
            Portal_Core.mostrarToast('success', 'Éxito', idExistente ? 'Actuación actualizada.' : 'Actuación registrada.');
            this.cerrarModalDetalle('modal-actuacion');
            window.ATC_App.checkNotificaciones(); 
            this.iniciarDetalle(this.estadoDetalle.idCaso); 
          } else {
            Portal_Core.mostrarToast('error', 'Error SQL', res.message);
            btn.disabled = false; btn.innerHTML = idExistente ? '<i class="fas fa-save"></i> Actualizar' : '<i class="fas fa-save"></i> Registrar';
          }
        }).guardarActuacionBackend(payload);
    }
  });
</script>

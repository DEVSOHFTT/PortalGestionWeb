<script>
  /**
   * ========================================================================
   * CIU_Ficha_JS.html
   * PROYECTO: Portal de Gestión - Defensoría del Pueblo
   * RESPONSABILIDAD: Ficha transversal del ciudadano.
   *   - Carga y renderizado del perfil completo del ciudadano.
   *   - Historial de casos con filtro en tiempo real.
   *   - Toggle entre modo lectura y modo edición.
   *   - Guardar cambios del perfil contra el backend.
   *   - Navegación contextual (volver a Detalle o a Buscador).
   *   - No conoce la lógica del Buscador ni de Recepción.
   *   - Depende de: AppState_JS (ATC_App.estadoFicha, Memoria, USUARIO_ACTUAL),
   *                 Core_JS (mostrarToast, poblarSelect).
   * ========================================================================
   */

  Object.assign(window.ATC_App, {

    // =========================================================
    // INICIALIZACIÓN
    // =========================================================
    iniciarFichaCiudadano: function(idCiudadano) {
      if (this.temporizadores.bandeja) clearInterval(this.temporizadores.bandeja);

      document.getElementById('ruta-actual').innerText = 'Ficha del Ciudadano';
      document.getElementById('content-ficha-ciu').classList.add('hidden');
      document.getElementById('loader-ficha-ciu').classList.remove('hidden');
      document.getElementById('fc-vista-lectura').classList.remove('hidden');
      document.getElementById('fc-vista-edicion').classList.add('hidden');
      document.getElementById('input-filtro-casos-fc').value = '';

      google.script.run
        .withSuccessHandler(res => {
          if (!res.success) {
            Portal_Core.mostrarToast('error', 'Error', res.message);
            this.cerrarFichaCiudadano();
            return;
          }
          window.ATC_App.estadoFicha.ciudadano = res.ciudadano;
          window.ATC_App.estadoFicha.casos     = res.historial;
          this.renderizarFichaCiudadano();
        })
        .withFailureHandler(err => {
          Portal_Core.mostrarToast('error', 'Fallo de Red', err.message);
          this.cerrarFichaCiudadano();
        })
        .obtenerFichaCompletaCiudadanoBackend(idCiudadano);
    },

    // =========================================================
    // RENDERIZADO DEL PERFIL
    // =========================================================
    renderizarFichaCiudadano: function() {
      const c    = window.ATC_App.estadoFicha.ciudadano;
      const casos = window.ATC_App.estadoFicha.casos;

      const esOrg      = (c.dni && c.dni.length > 8) || String(c.tipo_entidad_id) === '2';
      const nombreLimpio = (c.apellido && c.apellido !== '-')
        ? `${c.apellido}, ${c.nombre}`
        : c.nombre;

      document.getElementById('fc-nombre').innerText = nombreLimpio.toUpperCase();

      // Datos de identificación
      document.getElementById('fc-dni').innerHTML  = c.dni
        ? `<i class="fas fa-id-card"></i> DNI: ${c.dni}`
        : `<i class="fas fa-id-card"></i> Sin DNI`;
      document.getElementById('fc-cuil').innerHTML = c.cuil
        ? `<i class="fas fa-hashtag"></i> CUIT/L: ${c.cuil}`
        : `<i class="fas fa-hashtag"></i> Sin CUIT/L`;
      document.getElementById('fc-tel').innerHTML  = c.telefono
        ? `<i class="fas fa-phone-alt"></i> ${c.telefono}`
        : `<i class="fas fa-phone-alt"></i> Sin Teléfono`;

      // Avatar según tipo
      const avatar = document.getElementById('fc-avatar');
      if (esOrg) {
        avatar.innerHTML                     = '<i class="fas fa-building"></i>';
        avatar.style.color                   = 'var(--def-orange)';
        avatar.parentElement.style.background = 'var(--warning-bg)';
      } else {
        avatar.innerHTML                     = '<i class="fas fa-user"></i>';
        avatar.style.color                   = 'var(--primary)';
        avatar.parentElement.style.background = 'var(--primary-light)';
      }

      document.getElementById('fc-email').innerText = c.email || 'Sin registrar';

      // Domicilio compuesto
      const loc = [];
      if (c.calle) loc.push(`${c.calle} ${c.altura || ''}`.trim());
      if (c.piso || c.dpto) loc.push(`Piso ${c.piso || '-'} Dpto ${c.dpto || '-'}`);
      if (c.barrio_id) {
        const cache = Memoria.leer('diccionariosATC');
        if (cache && cache.barrios) {
          const b = cache.barrios.find(x => String(x.id) === String(c.barrio_id));
          if (b) loc.push(b.nombre);
        }
      }
      document.getElementById('fc-domicilio').innerText = loc.length > 0 ? loc.join(' — ') : 'Sin registrar';

      // Edad calculada
      let edadTxt = 'Sin registrar';
      if (c.fecha_nacimiento) {
        try {
          const edad = Math.floor((new Date() - new Date(c.fecha_nacimiento)) / 31557600000);
          if (edad >= 0) edadTxt = `${edad} años`;
        } catch(e) {}
      }
      document.getElementById('fc-nacimiento').innerText = edadTxt;

      // Género
      const GENEROS = { '1': 'Masculino', '2': 'Femenino', '3': 'No Binario' };
      document.getElementById('fc-genero').innerText = GENEROS[String(c.genero_id)] || 'N/D';

      this.renderizarCasosFicha(casos);

      document.getElementById('loader-ficha-ciu').classList.add('hidden');
      document.getElementById('content-ficha-ciu').classList.remove('hidden');
    },

    // =========================================================
    // HISTORIAL DE CASOS (con filtro local)
    // =========================================================
renderizarCasosFicha: function(lista) {
      const badge    = document.getElementById('fc-casos-badge');
      const boxCasos = document.getElementById('fc-contenedor-casos');

      badge.innerText = `${lista.length} CASO${lista.length !== 1 ? 'S' : ''}`;

      if (!lista || lista.length === 0) {
        boxCasos.innerHTML = `
          <div style="text-align:center; padding:50px; color:var(--text-muted);">
            <i class="fas fa-search-minus fa-3x" style="opacity:0.15; margin-bottom:15px;"></i>
            <p style="font-weight:600;">No se encontraron casos con los filtros aplicados.</p>
          </div>`;
        return;
      }

      const COLORES_ESTADO = {
        'PENDIENTE':  { c: 'var(--warning)',    bg: 'var(--warning-bg)',    icon: 'fa-clock' },
        'ASIGNADO':   { c: 'var(--primary)',    bg: 'var(--primary-light)', icon: 'fa-user-check' },
        'EN PROCESO': { c: 'var(--success)',    bg: 'var(--success-bg)',    icon: 'fa-play-circle' },
        'DERIVADO':   { c: 'var(--def-brown)',  bg: '#f3f0ed',             icon: 'fa-share' },
        'FINALIZADO': { c: 'var(--success)',    bg: 'var(--success-bg)',    icon: 'fa-check-double' }
      };

      boxCasos.innerHTML = lista.map(ca => {
        const est = ca.estado.toUpperCase().trim();
        const { c: cE, bg: bgE, icon: iE } = COLORES_ESTADO[est] || { c: '#64748b', bg: '#f1f5f9', icon: 'fa-question-circle' };

        const tieneExp = ca.expediente && ca.expediente !== 'No posee' && ca.expediente !== '';
        const expTag   = tieneExp
          ? `<span style="display:inline-flex; align-items:center; gap:4px; font-size:0.72rem;
                          padding:3px 8px; border-radius:6px; font-weight:700;
                          background:var(--success-bg); color:var(--success);">
               <i class="fas fa-folder"></i> ${ca.expediente}
             </span>`
          : '';

        const catTag = ca.categoria
          ? `<span style="display:inline-flex; align-items:center; gap:4px; font-size:0.72rem;
                          padding:3px 10px; border-radius:6px; font-weight:700;
                          background:var(--warning-bg); color:var(--warning);
                          text-transform:uppercase; letter-spacing:0.3px;">
               <i class="fas fa-tag"></i> ${ca.categoria}
             </span>`
          : '';

        return `
          <div onclick="ATC_App.abrirCasoDesdeFicha('${ca.id}')"
               style="background:var(--bg-surface); border:1px solid var(--border-soft);
                      border-radius:14px; padding:0; cursor:pointer;
                      transition:all 0.2s cubic-bezier(0.4,0,0.2,1);
                      box-shadow:var(--shadow-sm); overflow:hidden; display:flex;"
               onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='var(--shadow-md)'; this.style.borderColor='var(--border-hard)'"
               onmouseout="this.style.transform=''; this.style.boxShadow='var(--shadow-sm)'; this.style.borderColor='var(--border-soft)'">

            <!-- Barra lateral de estado -->
            <div style="width:5px; flex-shrink:0; background:${cE};"></div>

            <!-- Contenido -->
            <div style="flex:1; padding:14px 16px; display:grid;
                        grid-template-columns:1fr auto; gap:6px 12px; align-items:start;">

              <!-- Fila 1 izq: ID + fecha -->
              <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                <span style="font-family:'Fira Mono','Courier New',monospace; font-size:0.8rem;
                             font-weight:700; color:${cE};">
                  #${ca.id.substring(0,8).toUpperCase()}
                </span>
                <span style="font-size:0.75rem; color:var(--text-muted); display:inline-flex;
                             align-items:center; gap:4px;">
                  <i class="far fa-calendar-alt" style="opacity:0.5;"></i>
                  ${ca.fecha} · ${ca.hora} hs
                </span>
              </div>

              <!-- Fila 1 der: Badge estado -->
              <div style="display:flex; align-items:center; gap:4px; justify-self:end;
                          padding:4px 10px; border-radius:14px; font-size:0.7rem;
                          font-weight:700; text-transform:uppercase; letter-spacing:0.3px;
                          background:${bgE}; color:${cE}; white-space:nowrap;">
                <i class="fas ${iE}" style="font-size:0.6rem;"></i>
                ${est}
              </div>

              <!-- Fila 2: Metadatos -->
              <div style="grid-column:1 / -1; display:flex; align-items:center; gap:8px;
                          flex-wrap:wrap;">
                ${catTag}
                ${expTag}

                ${ca.area && ca.area !== 'Sin asignar'
                  ? `<span style="font-size:0.75rem; color:var(--text-muted);
                                  display:inline-flex; align-items:center; gap:3px;">
                       <i class="fas fa-building" style="opacity:0.5; font-size:0.65rem;"></i>
                       ${ca.area}
                     </span>`
                  : ''}

                ${ca.agente && ca.agente !== 'Sin asignar'
                  ? `<span style="font-size:0.75rem; color:var(--text-muted);
                                  display:inline-flex; align-items:center; gap:3px;">
                       <i class="fas fa-user-tie" style="opacity:0.5; font-size:0.65rem;"></i>
                       ${ca.agente}
                     </span>`
                  : ''}
              </div>
            </div>
          </div>`;
      }).join('');
    },

    filtrarCasosCiudadano: function() {
      const texto       = document.getElementById('input-filtro-casos-fc').value.toLowerCase().trim();
      const todosLosCasos = window.ATC_App.estadoFicha.casos;

      if (!texto) {
        this.renderizarCasosFicha(todosLosCasos);
        return;
      }

      const filtrados = todosLosCasos.filter(ca => {
        const cad = `${ca.id} ${ca.categoria} ${ca.area} ${ca.agente} ${ca.estado} ${ca.expediente || ''}`.toLowerCase();
        return cad.includes(texto);
      });

      this.renderizarCasosFicha(filtrados);
    },

    abrirCasoDesdeFicha: function(idCaso) {
      cargarModulo('DetalleCaso', idCaso);
    },

    // =========================================================
    // MODO EDICIÓN
    // =========================================================
    toggleEdicionFicha: function() {
      const boxLectura = document.getElementById('fc-vista-lectura');
      const boxEdicion = document.getElementById('fc-vista-edicion');
      const enEdicion  = !boxEdicion.classList.contains('hidden');

      if (enEdicion) {
        boxEdicion.classList.add('hidden');
        boxLectura.classList.remove('hidden');
        return;
      }

      // Pasar a modo edición: poblar formulario
      const c        = window.ATC_App.estadoFicha.ciudadano;
      const cacheATC = Memoria.leer('diccionariosATC');
      if (cacheATC && cacheATC.barrios) Portal_Core.poblarSelect('edit-fc-barrio', cacheATC.barrios);

      const mapaCampos = {
        'edit-fc-nombre':   c.nombre || '',
        'edit-fc-apellido': (c.apellido && c.apellido !== '-') ? c.apellido : '',
        'edit-fc-dni':      c.dni             || '',
        'edit-fc-cuil':     c.cuil            || '',
        'edit-fc-tel':      c.telefono        || '',
        'edit-fc-email':    c.email           || '',
        'edit-fc-nac':      c.fecha_nacimiento || '',
        'edit-fc-genero':   c.genero_id       || '',
        'edit-fc-calle':    c.calle           || '',
        'edit-fc-altura':   c.altura          || '',
        'edit-fc-piso':     c.piso            || '',
        'edit-fc-dpto':     c.dpto            || ''
      };

      Object.entries(mapaCampos).forEach(([id, val]) => {
        const el = document.getElementById(id);
        if (el) el.value = val;
      });

      // El select de barrio necesita un pequeño delay para que el DOM esté listo
      setTimeout(() => {
        const elBarrio = document.getElementById('edit-fc-barrio');
        if (elBarrio) elBarrio.value = c.barrio_id || '';
      }, 50);

      boxLectura.classList.add('hidden');
      boxEdicion.classList.remove('hidden');
    },

    // Extrae el DNI del CUIL automáticamente al escribir
    extraerDniDeCuilFicha: function() {
      const cuil     = document.getElementById('edit-fc-cuil').value.trim();
      const inputDni = document.getElementById('edit-fc-dni');
      if (cuil.length === 11 && inputDni && !inputDni.value) {
        inputDni.value = parseInt(cuil.substring(2, 10), 10).toString();
      }
    },

    // =========================================================
    // GUARDAR EDICIÓN DEL PERFIL
    // =========================================================
    guardarEdicionFicha: function() {
      const nombre = document.getElementById('edit-fc-nombre').value.trim();
      if (!nombre) {
        return Portal_Core.mostrarToast('warning', 'Validación', 'El nombre o razón social es obligatorio.');
      }

      const cuil = document.getElementById('edit-fc-cuil').value.trim();
      const dni  = document.getElementById('edit-fc-dni').value.trim();
      const tel  = document.getElementById('edit-fc-tel').value.trim();

      if (cuil && cuil.length !== 11) {
        return Portal_Core.mostrarToast('warning', 'Validación', 'El CUIL/CUIT debe tener exactamente 11 dígitos.');
      }
      if (dni && (dni.length < 7 || dni.length > 8)) {
        return Portal_Core.mostrarToast('warning', 'Validación', 'El DNI debe tener 7 u 8 dígitos.');
      }
      if (tel && tel.length < 10) {
        return Portal_Core.mostrarToast('warning', 'Validación', 'El teléfono debe tener al menos 10 dígitos.');
      }
      if (dni && cuil && cuil.substring(2, 10) !== dni.padStart(8, '0')) {
        return Portal_Core.mostrarToast('error', 'Inconsistencia', 'El DNI no coincide con la raíz del CUIL.');
      }

      const btn = document.getElementById('btn-guardar-edicion-fc');
      btn.disabled  = true;
      btn.innerHTML = '<i class="fas fa-spinner spinner"></i> Guardando...';

      const payload = {
        id:               window.ATC_App.estadoFicha.ciudadano.id,
        nombre,
        apellido:         document.getElementById('edit-fc-apellido').value.trim() || '-',
        dni:              dni  || null,
        cuil:             cuil || null,
        telefono:         tel  || null,
        email:            document.getElementById('edit-fc-email').value.trim()  || null,
        fecha_nacimiento: document.getElementById('edit-fc-nac').value           || null,
        genero_id:        parseInt(document.getElementById('edit-fc-genero').value) || null,
        calle:            document.getElementById('edit-fc-calle').value.trim()  || null,
        altura:           document.getElementById('edit-fc-altura').value.trim() || null,
        piso:             document.getElementById('edit-fc-piso').value.trim()   || null,
        dpto:             document.getElementById('edit-fc-dpto').value.trim()   || null,
        barrio_id:        parseInt(document.getElementById('edit-fc-barrio').value) || null
      };

      google.script.run
        .withSuccessHandler(res => {
          btn.disabled  = false;
          btn.innerHTML = '<i class="fas fa-save"></i> Guardar';
          if (res.success) {
            Portal_Core.mostrarToast('success', 'Éxito', 'Perfil del ciudadano actualizado.');
            // Actualizar estado local sin recargar desde el servidor
            window.ATC_App.estadoFicha.ciudadano = {
              ...window.ATC_App.estadoFicha.ciudadano,
              ...payload
            };
            this.toggleEdicionFicha();
            this.renderizarFichaCiudadano();
          } else {
            Portal_Core.mostrarToast('error', 'Error DB', res.message);
          }
        })
        .withFailureHandler(err => {
          btn.disabled  = false;
          btn.innerHTML = '<i class="fas fa-save"></i> Guardar';
          Portal_Core.mostrarToast('error', 'Fallo de Red', err.message);
        })
        .actualizarCiudadanoBackend(payload);
    },

    // =========================================================
    // NAVEGACIÓN DE SALIDA
    // Vuelve al Detalle del caso si vino desde ahí,
    // o al Buscador si vino directo.
    // =========================================================
    cerrarFichaCiudadano: function() {
      if (this.estadoFicha && this.estadoFicha.idCasoOrigen) {
        const idOrigen = this.estadoFicha.idCasoOrigen;
        this.estadoFicha = { idCasoOrigen: null, ciudadano: null, casos: [] };
        cargarModulo('DetalleCaso', idOrigen);
      } else {
        cargarModulo('BuscarCiudadano');
      }
    }

  });
</script>

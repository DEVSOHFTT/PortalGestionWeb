<script>
  /**
   * ========================================================================
   * ATC_Bandeja_JS.html
   * PROYECTO: Portal de Gestión - Defensoría del Pueblo
   * RESPONSABILIDAD: Lógica de la bandeja de casos (MisCasos, MiArea,
   *   TodosLosCasos). Filtros, paginación, renderizado y refresco silencioso.
   *   - No conoce la lógica de Detalle ni de Recepción.
   *   - Depende de: AppState_JS (ATC_App.estadoBandeja, Memoria, USUARIO_ACTUAL),
   *                 Core_JS (mostrarToast),
   *                 Notifications_JS (iniciarNotificaciones).
   * ========================================================================
   */

  Object.assign(window.ATC_App, {

    timeoutBuscador: null,

    // =========================================================
    // INICIALIZACIÓN
    // =========================================================
    iniciarBandeja: function(modulo) {
      this.estadoBandeja.modulo            = modulo;
      this.estadoBandeja.pagina            = 1;
      this.estadoBandeja.terminoBusqueda   = '';

      const titulos = {
        MisCasos:      'Mis Casos',
        MiArea:        'Mi Área',
        TodosLosCasos: 'Histórico General'
      };

      document.getElementById('bandeja-titulo').innerText = titulos[modulo] || 'Casos';
      document.getElementById('ruta-actual').innerText    = titulos[modulo] || 'Bandeja';

      const inputBuscador = document.getElementById('input-buscador');
      if (inputBuscador) {
        inputBuscador.value       = '';
        inputBuscador.placeholder = 'Buscar DNI, Nombre, N° Caso o N° Expediente...';
      }

      // Lazy loading de diccionarios
      const cacheATC    = Memoria.leer('diccionariosATC');
      const cacheGlobal = Memoria.leer('diccionariosGlobales');

      if (cacheATC && cacheGlobal) {
        this.configurarFiltrosAvanzados(modulo, cacheATC, cacheGlobal);
        this.cargarDatosBandeja();
      } else {
        this._mostrarSpinnerBandeja('Preparando entorno de atención ciudadana...');
        google.script.run
          .withSuccessHandler(res => {
            if (res && res.success) {
              Memoria.guardar('diccionariosATC', res.data);
              this.configurarFiltrosAvanzados(modulo, res.data, cacheGlobal);
              this.cargarDatosBandeja();
            } else {
              Portal_Core.mostrarToast('error', 'Fallo de Sincronización', res.message);
            }
          })
          .withFailureHandler(err => Portal_Core.mostrarToast('error', 'Fallo de Red', err.message))
          .obtenerDiccionariosATCBackend();
      }
    },

    // =========================================================
    // CONFIGURACIÓN DE FILTROS AVANZADOS
    // =========================================================
    configurarFiltrosAvanzados: function(modulo, cacheATC, cacheGlobal) {
      ['filtro-estado','filtro-categoria','filtro-desde',
       'filtro-hasta','filtro-agente','filtro-area'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });

      if (cacheATC && cacheATC.categorias) {
        document.getElementById('filtro-categoria').innerHTML =
          '<option value="">Todas las Categorías</option>' +
          cacheATC.categorias.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
      }

      if (cacheGlobal) {
        if (cacheGlobal.agentes) {
          document.getElementById('filtro-agente').innerHTML =
            '<option value="">Todos los Agentes</option>' +
            cacheGlobal.agentes.map(a => `<option value="${a.id}">${a.apellido}, ${a.nombre}</option>`).join('');
        }
        if (cacheGlobal.areas) {
          document.getElementById('filtro-area').innerHTML =
            '<option value="">Todas las Áreas</option>' +
            cacheGlobal.areas.map(a => `<option value="${a.id}">${a.nombre}</option>`).join('');
        }
      }

      const estados = modulo === 'MisCasos'
        ? ['ASIGNADO', 'EN PROCESO', 'FINALIZADO']
        : ['PENDIENTE', 'ASIGNADO', 'EN PROCESO', 'DERIVADO', 'FINALIZADO'];

      document.getElementById('filtro-estado').innerHTML =
        '<option value="">Todos los Estados</option>' +
        estados.map(e => `<option value="${e}">${e}</option>`).join('');

      // Visibilidad contextual de filtros
      const boxAgente = document.getElementById('box-filtro-agente');
      const boxArea   = document.getElementById('box-filtro-area');
      if (boxAgente) boxAgente.classList.toggle('hidden', modulo === 'MisCasos');
      if (boxArea)   boxArea.classList.toggle('hidden',   modulo !== 'TodosLosCasos');
    },

    limpiarFiltrosAvanzados: function() {
      ['filtro-estado','filtro-categoria','filtro-desde',
       'filtro-hasta','filtro-agente','filtro-area'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      this.filtrarBandejaAvanzada();
    },

    filtrarBandejaAvanzada: function() {
      this.estadoBandeja.pagina = 1;
      this.cargarDatosBandeja();
    },

    filtrarBandejaDebounced: function() {
      clearTimeout(this.timeoutBuscador);
      this.timeoutBuscador = setTimeout(() => {
        this.estadoBandeja.terminoBusqueda = document.getElementById('input-buscador').value.trim();
        this.estadoBandeja.pagina          = 1;
        this.cargarDatosBandeja();
      }, 500);
    },

    obtenerPaqueteFiltros: function() {
      const mod = this.estadoBandeja.modulo;
      const g   = (id) => document.getElementById(id) ? document.getElementById(id).value : '';
      return {
        estado:     g('filtro-estado'),
        categoria:  g('filtro-categoria'),
        fechaDesde: g('filtro-desde'),
        fechaHasta: g('filtro-hasta'),
        agenteId:   (mod === 'MiArea' || mod === 'TodosLosCasos') ? g('filtro-agente') : '',
        areaId:     (mod === 'TodosLosCasos') ? g('filtro-area') : ''
      };
    },

    // =========================================================
    // CARGA DE DATOS
    // =========================================================
    cargarDatosBandeja: function() {
      const contexto  = this._contextoFiltro();
      const filtrosAv = this.obtenerPaqueteFiltros();

      this._mostrarSpinnerBandeja('Aplicando filtros y buscando...');

      google.script.run
        .withSuccessHandler(res => {
          if (!res.success) {
            this._mostrarErrorBandeja(res.error || res.message);
            return;
          }
          this.estadoBandeja.datos           = res.casos;
          this.estadoBandeja.totalRegistros  = res.totalRegistros;
          this.estadoBandeja.itemsPorPagina  = res.itemsPorPagina;
          this.renderizarBandeja(res.casos);
        })
        .withFailureHandler(err => this._mostrarErrorBandeja(err.message))
        .obtenerCasosPaginados(
          contexto,
          window.USUARIO_ACTUAL.idAgente,
          window.USUARIO_ACTUAL.idArea,
          this.estadoBandeja.pagina,
          this.estadoBandeja.terminoBusqueda,
          filtrosAv
        );
    },

    // Refresco silencioso: no muestra spinner, solo actualiza si
    // el usuario está en página 1 sin búsqueda activa.
    cargarDatosSilencioso: function() {
      const contexto  = this._contextoFiltro();
      const filtrosAv = this.obtenerPaqueteFiltros();

      google.script.run
        .withSuccessHandler(res => {
          const sinFiltro = this.estadoBandeja.terminoBusqueda === '' && this.estadoBandeja.pagina === 1;
          if (res.success && sinFiltro) {
            this.estadoBandeja.datos          = res.casos;
            this.estadoBandeja.totalRegistros = res.totalRegistros;
            this.renderizarBandeja(res.casos);
          }
        })
        .obtenerCasosPaginados(
          contexto,
          window.USUARIO_ACTUAL.idAgente,
          window.USUARIO_ACTUAL.idArea,
          1, '', filtrosAv
        );
    },

    // =========================================================
    // RENDERIZADO DE LA GRILLA
    // =========================================================
    renderizarBandeja: function(lista) {
      const box = document.getElementById('dashboard-content');
      if (!box) return;

      if (!lista || lista.length === 0) {
        box.innerHTML = `
          <div style="text-align:center; padding:60px; color:var(--text-muted);
                      background:white; border-radius:12px; border:1px solid var(--border-soft);">
            <i class="fas fa-filter fa-3x" style="opacity:0.2; margin-bottom:15px;"></i>
            <p style="font-weight:600;">No se encontraron casos con los filtros aplicados.</p>
          </div>`;
        return;
      }

      const termino  = this.estadoBandeja.terminoBusqueda;
      const resaltar = (texto) => {
        if (!termino || !texto) return texto || '';
        return String(texto).replace(
          new RegExp(`(${termino})`, 'gi'),
          `<mark style="background-color:#fef08a; color:#854d0e; padding:0 2px; border-radius:2px;">$1</mark>`
        );
      };

      const COLORES_ESTADO = {
        'PENDIENTE':  { color: 'var(--warning)',   bg: 'var(--warning-bg)',   icon: 'fa-clock' },
        'ASIGNADO':   { color: 'var(--primary)',   bg: 'var(--primary-light)', icon: 'fa-user-check' },
        'EN PROCESO': { color: 'var(--success)',   bg: 'var(--success-bg)',   icon: 'fa-play-circle' },
        'DERIVADO':   { color: 'var(--def-brown)', bg: '#f3f0f0',             icon: 'fa-share' },
        'FINALIZADO': { color: '#10b981',          bg: '#dcfce7',             icon: 'fa-check-double' }
      };

      box.innerHTML = lista.map(c => {
        const estadoKey = c.estado.toUpperCase().trim();
        const { color: colorEstado, bg: bgEstado, icon: iconEstado } =
          COLORES_ESTADO[estadoKey] || { color: '#64748b', bg: '#f1f5f9', icon: 'fa-circle' };

        let nombreLimpio = c.ciudadano.replace(/^[\s,\-]+/g, '');
        const esOrg     = c.dni && c.dni.length > 8;
        const partes    = c.fecha.split(' ');
        const fecha     = partes[0] || '';
        const hora      = partes[1] ? partes[1] + ' hs' : '';

        // Expediente
        const expTag = c.expediente
          ? `<span style="font-size:0.72rem; font-weight:700; padding:2px 8px; border-radius:10px;
                          background:#e0f2fe; color:#0369a1; border:1px solid #bae6fd;
                          display:inline-flex; align-items:center; gap:4px;">
               <i class="fas fa-folder-open"></i> EXP-${c.expediente.substring(0,6).toUpperCase()}
             </span>`
          : '';

        // Área y agente — si no hay área pero hay agente asignado,
        // mostramos el agente con ícono específico (caso asignado a persona directamente)
        const areaLabel  = c.area && c.area !== 'Sin Asignar' && c.area !== 'Sin Área'
          ? `<span style="display:inline-flex; align-items:center; gap:5px; font-size:0.8rem;
                          color:var(--primary); font-weight:700;">
               <i class="fas fa-building" style="opacity:0.7;"></i> ${resaltar(c.area)}
             </span>`
          : `<span style="display:inline-flex; align-items:center; gap:5px; font-size:0.75rem;
                          color:var(--text-muted); font-style:italic;">
               <i class="fas fa-building" style="opacity:0.4;"></i> Sin área asignada
             </span>`;

        const agenteLabel = c.agente && c.agente !== 'Sin Asignar'
          ? `<span style="display:inline-flex; align-items:center; gap:5px; font-size:0.8rem;
                          color:var(--text-main); font-weight:600;">
               <i class="fas fa-user-tie" style="color:var(--text-muted); opacity:0.7;"></i>
               ${resaltar(c.agente)}
             </span>`
          : `<span style="display:inline-flex; align-items:center; gap:5px; font-size:0.75rem;
                          color:var(--warning); font-weight:700;">
               <i class="fas fa-user-clock"></i> Sin responsable
             </span>`;

        return `
          <div onclick="cargarModulo('DetalleCaso', '${c.id}')"
               style="background:white; border:1px solid var(--border-soft); border-radius:14px;
                      padding:18px 20px; margin-bottom:12px; cursor:pointer;
                      transition:all 0.2s ease; box-shadow:var(--shadow-sm);
                      border-left:4px solid ${colorEstado}; display:grid;
                      grid-template-columns:110px 1fr auto; gap:16px; align-items:center;"
               onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='var(--shadow-md)'"
               onmouseout="this.style.transform=''; this.style.boxShadow='var(--shadow-sm)'">

            <!-- Columna 1: ID + fecha -->
            <div style="display:flex; flex-direction:column; gap:4px;">
              <span style="font-family:monospace; font-size:0.85rem; font-weight:800;
                           color:${colorEstado}; letter-spacing:0.5px;">
                #${c.id.substring(0,8).toUpperCase()}
              </span>
              <span style="font-size:0.75rem; color:var(--text-muted); font-weight:600;">
                <i class="far fa-calendar-alt" style="margin-right:3px;"></i>${fecha}
              </span>
              ${hora ? `<span style="font-size:0.72rem; color:var(--text-muted);">
                          <i class="far fa-clock" style="margin-right:3px;"></i>${hora}
                        </span>` : ''}
            </div>

            <!-- Columna 2: ciudadano + categoría + responsable -->
            <div style="min-width:0; display:flex; flex-direction:column; gap:6px;">
              <div style="display:flex; align-items:center; gap:8px;">
                <div style="width:30px; height:30px; border-radius:8px; flex-shrink:0;
                            background:${esOrg ? 'var(--warning-bg)' : 'var(--primary-light)'};
                            color:${esOrg ? 'var(--def-orange)' : 'var(--primary)'};
                            display:flex; align-items:center; justify-content:center; font-size:0.85rem;">
                  <i class="fas ${esOrg ? 'fa-building' : 'fa-user'}"></i>
                </div>
                <div style="min-width:0;">
                  <div style="font-weight:800; color:var(--text-main); font-size:0.95rem;
                              white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                    ${resaltar(nombreLimpio)}
                  </div>
                  <div style="font-size:0.75rem; color:var(--text-muted);">
                    <i class="fas fa-id-card" style="margin-right:3px;"></i>
                    ${resaltar(c.dni || 'S/D')}
                  </div>
                </div>
              </div>
              <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                <span style="background:var(--primary-light); color:var(--primary); padding:2px 10px;
                             border-radius:10px; font-size:0.75rem; font-weight:700;
                             white-space:nowrap; display:inline-flex; align-items:center; gap:4px;">
                  <i class="fas fa-tag"></i> ${resaltar(c.categoria)}
                </span>
                ${expTag}
              </div>
              <div style="display:flex; flex-direction:column; gap:3px;">
                ${areaLabel}
                ${agenteLabel}
              </div>
            </div>

            <!-- Columna 3: estado -->
            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0;">
              <span style="font-size:0.8rem; font-weight:800; padding:6px 14px; border-radius:20px;
                           background:${bgEstado}; color:${colorEstado}; white-space:nowrap;
                           border:1px solid ${colorEstado}; display:flex; align-items:center; gap:6px;">
                <i class="fas ${iconEstado}"></i> ${c.estado}
              </span>
            </div>
          </div>`;
      }).join('');
    },

    // =========================================================
    // REFRESCO DE NOTIFICACIONES DESDE LA BANDEJA
    // =========================================================
    checkNotificaciones: function() {
      if (!window.USUARIO_ACTUAL) return;
      google.script.run
        .withSuccessHandler(res => {
          if (res.success) Portal_Core.iniciarNotificaciones(res.lista, res.total);
        })
        .obtenerNotificacionesBackend(
          window.USUARIO_ACTUAL.idAgente,
          window.USUARIO_ACTUAL.idArea
        );
    },

    // =========================================================
    // PRIVADOS
    // =========================================================
    _contextoFiltro: function() {
      const m = this.estadoBandeja.modulo;
      return m === 'MisCasos' ? 'MIO' : m === 'MiArea' ? 'AREA' : 'TODOS';
    },

    _mostrarSpinnerBandeja: function(msg = 'Cargando...') {
      const box = document.getElementById('dashboard-content');
      if (box) box.innerHTML = `
        <div style="text-align:center; padding:50px;">
          <i class="fas fa-circle-notch spinner fa-2x" style="color:var(--primary)"></i>
          <p style="margin-top:10px; color:var(--text-muted); font-weight:500;">${msg}</p>
        </div>`;
    },

    _mostrarErrorBandeja: function(msg) {
      const box = document.getElementById('dashboard-content');
      if (box) box.innerHTML = `
        <div style="color:var(--danger); padding:20px; background:var(--danger-bg);
                    border-radius:8px;">
          <b>Error:</b> ${msg}
        </div>`;
    }

  });
</script>

<script>
  /**
   * ========================================================================
   * Sidebar_JS.html
   * PROYECTO: Portal de Gestión - Defensoría del Pueblo
   * RESPONSABILIDAD: Control completo del menú lateral (sidebar).
   * ========================================================================
   */

  window.Portal_Core = window.Portal_Core || {};

  Object.assign(window.Portal_Core, {

    toggleSidebar: function() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      if (!sidebar) return;
      sidebar.classList.toggle('open');
      if (overlay) overlay.classList.toggle('active', sidebar.classList.contains('open'));
    },

    cerrarSidebar: function() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      if (!sidebar) return;
      sidebar.classList.remove('open');
      if (overlay) overlay.classList.remove('active');
    },

    volverAlHub: function() {
      cargarModulo('PortalHome');
    },

    construirMenuSidebar: function(codigoModulo) {
      const menu = document.getElementById('sidebar-contextual-menu');
      if (!menu) return;

      const seccion = (label) =>
        `<div style="padding:15px 16px 5px; font-size:0.7rem; font-weight:700;
                     color:var(--text-muted); text-transform:uppercase;
                     letter-spacing:0.05em;">${label}</div>`;

      const item = (id, icono, label) =>
        `<li onclick="cargarModulo('${id}')" id="m-${id}">
           <i class="fas ${icono}"></i> ${label}
         </li>`;

      if (codigoModulo === 'ATC') {
        menu.innerHTML = `
          ${seccion('Atención al Ciudadano')}
          ${item('BuscarCiudadano', 'fa-search', 'Buscar Ciudadano')}
          ${seccion('Bandejas de Trabajo')}
          ${item('MisCasos',      'fa-user-check', 'Mis Casos')}
          ${item('MiArea',        'fa-building',   'Mi Área')}
          ${item('TodosLosCasos', 'fa-database',   'Histórico General')}
        `;
      }

      else if (codigoModulo === 'INV') {
        // Sin ítem separado de scanner — está integrado en la Bandeja
        menu.innerHTML = `
          ${seccion('Inventario General')}
          ${item('InventarioBandeja', 'fa-boxes', 'Activos e Insumos')}
        `;
      }

    },

    marcarItemActivo: function(accionLogica) {
      document.querySelectorAll('.menu li').forEach(li => li.classList.remove('active'));
      const itemActivo = document.getElementById('m-' + accionLogica);
      // InventarioScan y InventarioBandeja activan el mismo ítem
      const target = itemActivo || document.getElementById('m-InventarioBandeja');
      if (target) target.classList.add('active');
    }

  });
</script>

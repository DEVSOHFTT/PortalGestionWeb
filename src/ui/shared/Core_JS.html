<script>
  /**
   * ========================================================================
   * Core_JS.html
   * PROYECTO: Portal de Gestión - Defensoría del Pueblo
   * RESPONSABILIDAD: Utilidades de UI puras y reutilizables.
   *   - Toast, confirmación modal, poblarSelect, reproducirSonido.
   *   - No conoce módulos, rutas, sesión ni notificaciones.
   *   - Depende de: AppState_JS (ninguna dependencia de estado directa,
   *     solo necesita que window.Portal_Core exista).
   * ========================================================================

   * ========================================================================
   * Core_JS.html
   * PROYECTO: Portal de Gestión - Defensoría del Pueblo
   * RESPONSABILIDAD: Utilidades de UI puras y reutilizables.
   * ========================================================================
   */

  window.Portal_Core = window.Portal_Core || {};

  Object.assign(window.Portal_Core, {

    // =========================================================
    // API GATEWAY: WRAPPER PARA GOOGLE APPS SCRIPT
    // =========================================================

    /**
     * Ejecuta una función del backend inyectando el JWT de Supabase automáticamente
     * y devolviendo una Promesa para poder usar async/await.
     * * @param {string} nombreFuncion - El nombre exacto de la función en el .gs
     * @param  {...any} argumentos - Los parámetros que requiere la función (sin contar el token)
     * @returns {Promise<any>}
     */
    
    ejecutarBackend: async function(nombreFuncion, ...argumentos) {
      try {
        // 1. Validar y obtener la sesión actual
        if (!window.DB) throw new Error("Cliente de base de datos no inicializado.");
        
        const sesion = await window.DB.getSession();
        const token = sesion ? sesion.access_token : null;

        if (!token) {
          this.mostrarToast('error', 'Sesión Expirada', 'Por favor, inicie sesión nuevamente.');
          // Opcional: forzar cierre de sesión aquí
          throw new Error("No hay un token de acceso válido.");
        }

        // 2. Envolver google.script.run en una Promesa nativa
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(res => resolve(res))
            .withFailureHandler(err => reject(err))
            [nombreFuncion](token, ...argumentos); // Se inyecta el token como 1er parámetro
        });

      } catch (error) {
        console.error(`[API_Gateway] Fallo en ${nombreFuncion}:`, error);
        throw error; // Se relanza para que el módulo lo maneje si quiere
      }
    },

    // =========================================================
    // SONIDO
    // =========================================================
    reproducirSonido: function(tipo) {
      const base = 'https://actions.google.com/sounds/v1/';
      const audios = {
        success: base + 'water/water_drop.ogg',
        error:   base + 'alarms/error_beep.ogg',
        warning: base + 'ui/pop_up_close.ogg',
        info:    base + 'ui/slide_click.ogg',
        campana: base + 'ui/message_notification.ogg'
      };
      const audio = new Audio(audios[tipo] || audios['info']);
      audio.volume = 0.4;
      audio.play().catch(() => {});
    },

    // =========================================================
    // SISTEMA DE TOASTS
    // =========================================================
    mostrarToast: function(tipo, titulo, mensaje, duracion = 5000, conSonido = true) {
      if (conSonido) this.reproducirSonido(tipo);

      const container = document.getElementById('toast-container');
      if (!container) return;

      const iconos = {
        success: 'fa-check-circle',
        error:   'fa-exclamation-triangle',
        warning: 'fa-exclamation-circle',
        info:    'fa-info-circle'
      };

      const toast = document.createElement('div');
      toast.className = `toast-card toast-${tipo}`;
      toast.innerHTML = `
        <div class="toast-icon"><i class="fas ${iconos[tipo] || iconos.info}"></i></div>
        <div class="toast-content">
          <div class="toast-title">${titulo}</div>
          <div class="toast-message">${mensaje}</div>
        </div>
        <button class="toast-close" onclick="this.parentElement.remove()">
          <i class="fas fa-times"></i>
        </button>
      `;

      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 50);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, duracion);
    },

    // =========================================================
    // MANEJADOR DE MODALES (Zero-DOM-Hacks)
    // =========================================================
    abrirModal: function(idModal) {
      const modal = document.getElementById(idModal);
      if (!modal) return;
      
      // Mueve el modal al final del body sólo una vez si no está allí,
      // centralizando el control y evitando hacerlo en la lógica de negocio.
      if (modal.parentElement !== document.body) {
        document.body.appendChild(modal);
      }
      
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden'; // Previene el scroll del fondo
    },

    cerrarModal: function(idModal) {
      const modal = document.getElementById(idModal);
      if (modal) {
        modal.classList.add('hidden');
        // Restaura el scroll solo si no hay otros modales abiertos
        if (document.querySelectorAll('.modal-overlay:not(.hidden)').length === 0) {
           document.body.style.overflow = '';
        }
      }
    },

    // =========================================================
    // MODAL DE CONFIRMACIÓN
    // =========================================================
    confirmCallback: null,

    mostrarConfirmacion: function(titulo, mensaje, onConfirm) {
      this.reproducirSonido('info');
      document.getElementById('confirm-title').innerText = titulo;
      document.getElementById('confirm-msg').innerText   = mensaje;
      this.confirmCallback = onConfirm;
      this.abrirModal('custom-confirm-modal');
    },

    ejecutarConfirmacion: function() {
      this.cerrarModal('custom-confirm-modal');
      if (typeof this.confirmCallback === 'function') this.confirmCallback();
      this.confirmCallback = null;
    },

    cerrarConfirmacion: function() {
      this.cerrarModal('custom-confirm-modal');
      this.confirmCallback = null;
    },

    // =========================================================
    // UTILIDAD: POBLAR SELECTS
    // =========================================================
    poblarSelect: function(idSelect, datos, textoPorDefecto = 'Seleccione...') {
      const select = document.getElementById(idSelect);
      if (!select) return;

      select.innerHTML = `<option value="">${textoPorDefecto}</option>`;

      if (datos && datos.length > 0) {
        datos.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d.id;
          opt.text  = d.nombre || (d.apellido ? `${d.apellido}, ${d.nombre}` : d.id);
          select.appendChild(opt);
        });
      }
    }

  });
</script>

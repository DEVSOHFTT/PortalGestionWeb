<script>
  /**
   * ========================================================================
   * Main_JS.html - Motor de Navegación y Sesión Global
   * ========================================================================
   */
  const Memoria = {
    leer: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
    guardar: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
    borrar: (k) => localStorage.removeItem(k)
  };

  window.USUARIO_ACTUAL = null;
  window.Portal_Core = window.Portal_Core || {};
  
  window.ATC_App = window.ATC_App || {};
  window.ATC_App.estadoBandeja = { modulo: '', datos: [], pagina: 1, totalRegistros: 0, itemsPorPagina: 20 };
  window.ATC_App.estadoDetalle = { idCaso: null, idEstado: null, categoriaActual: null, idCiudadano: null };
  window.ATC_App.estadoNuevaRecepcion = { ciudadanoActual: null, casosCiudadanoActual: [], idCasoDuplicadoCache: null, reprogramado: false };
  window.ATC_App.estadoFicha = { idCasoOrigen: null, ciudadano: null, casos: [] };
  window.ATC_App.temporizadores = { bandeja: null };

  window.INV_App = window.INV_App || {};
  window.INV_App.estadoBandeja = { modulo: 'Equipos', pagina: 1, filtros: {} };

  const MAPA_CONTENEDORES = {
    'Login': 'view-Login', 
    'PortalHome': 'view-PortalHome', 
    'MisCasos': 'view-Bandeja',
    'MiArea': 'view-Bandeja', 
    'TodosLosCasos': 'view-Bandeja', 
    'DetalleCaso': 'view-DetalleCaso',
    'BuscarCiudadano': 'view-BuscarCiudadano', 
    'NuevaRecepcionPaso2': 'view-NuevaRecepcionPaso2',
    'FichaCiudadano': 'view-FichaCiudadano',
    'InventarioBandeja': 'view-InventarioBandeja',
    'InventarioScan': 'view-InventarioScan',
    'InventarioFicha': 'view-InventarioFicha'
  };

  window.onload = () => verificarSesion();

  function verificarSesion() {
    const sesion = Memoria.leer('sesionDefensoria');
    const preloader = document.getElementById('preloader-global');
    if (preloader) preloader.style.display = 'none';

    if (sesion && sesion.idAgente) {
      window.USUARIO_ACTUAL = sesion;
      document.body.classList.remove('modo-login');
      document.getElementById('topbar').classList.remove('hidden');
      document.getElementById('nombre-usuario-topbar').innerText = window.USUARIO_ACTUAL.nombre;
      arrancarEntornoGlobal(sesion);
    } else {
      document.body.classList.add('modo-login');
      document.getElementById('sidebar').classList.add('hidden');
      document.getElementById('topbar').classList.add('hidden');
      cargarModulo('Login');
    }
  }

  function arrancarEntornoGlobal(usuario) {
    document.querySelectorAll('.view-container').forEach(v => v.classList.add('hidden'));
    const spinner = document.createElement('div');
    spinner.id = 'spinner-arranque';
    spinner.innerHTML = `<div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:60vh; width: 100%;"><i class="fas fa-circle-notch spinner fa-2x" style="color:var(--primary); margin-bottom:15px;"></i><span style="color:var(--text-light); font-weight:500;">Iniciando sistema central...</span></div>`;
    document.getElementById('contenedor-principal').appendChild(spinner);

    google.script.run
      .withSuccessHandler(res => {
        document.getElementById('spinner-arranque').remove();
        if(res.success) {
          Memoria.guardar('diccionariosGlobales', res.data.diccionariosGlobales);
          
          if(window.Portal_Core.iniciarNotificaciones) {
              window.Portal_Core.iniciarNotificaciones(res.data.notificaciones, res.data.totalNotificaciones);
          }

          cargarModulo('PortalHome');
        } else alert("Error crítico iniciando el sistema: " + res.message);
      })
      .withFailureHandler(err => { document.getElementById('spinner-arranque').innerHTML = `<div style="color:red; padding: 20px; text-align:center;"><b>Fallo de conexión:</b> ${err.message}</div>`; })
      .bootSystemBackend(usuario.idAgente, usuario.idArea); 
  }

  window.Portal_Core.toggleSidebar = function() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.toggle('open');
    if (sidebar.classList.contains('open')) overlay.classList.add('active');
    else overlay.classList.remove('active');
  };

  window.Portal_Core.construirMenuSidebar = function(codigoModulo) {
    const menu = document.getElementById('sidebar-contextual-menu');
    if (codigoModulo === 'ATC') {
      menu.innerHTML = `
        <div style="padding: 15px 16px 5px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Atención al Ciudadano</div>
        <li onclick="cargarModulo('BuscarCiudadano')" id="m-BuscarCiudadano"><i class="fas fa-search"></i> Buscar Ciudadano</li>
        <div style="padding: 20px 16px 5px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Bandejas de Trabajo</div>
        <li onclick="cargarModulo('MisCasos')" id="m-MisCasos"><i class="fas fa-user-check"></i> Mis Casos</li>
        <li onclick="cargarModulo('MiArea')" id="m-MiArea"><i class="fas fa-building"></i> Mi Área</li>
        <li onclick="cargarModulo('TodosLosCasos')" id="m-TodosLosCasos"><i class="fas fa-database"></i> Histórico General</li>
      `;
    } 
    else if (codigoModulo === 'INV') {
      menu.innerHTML = `
        <div style="padding: 15px 16px 5px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Operativa de Campo</div>
        <li onclick="cargarModulo('InventarioScan')" id="m-InventarioScan"><i class="fas fa-qrcode"></i> Escanear Activo (QR)</li>
        <div style="padding: 20px 16px 5px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Gestión e Informes</div>
        <li onclick="cargarModulo('InventarioBandeja')" id="m-InventarioBandeja"><i class="fas fa-boxes"></i> Inventario General</li>
      `;
    }
  };

  window.Portal_Core.volverAlHub = function() { cargarModulo('PortalHome'); };

  function cargarModulo(accionLogica, paramExtra = null) {
    try {
      const sidebarObj = document.getElementById('sidebar');
      const overlayObj = document.getElementById('sidebar-overlay');
      if (sidebarObj && sidebarObj.classList.contains('open')) {
         sidebarObj.classList.remove('open');
         if(overlayObj) overlayObj.classList.remove('active');
      }

      if (['MisCasos', 'MiArea', 'TodosLosCasos', 'DetalleCaso', 'BuscarCiudadano', 'NuevaRecepcionPaso2', 'FichaCiudadano'].includes(accionLogica)) {
          window.Portal_Core.construirMenuSidebar('ATC');
      } else if (['InventarioBandeja', 'InventarioScan', 'InventarioFicha'].includes(accionLogica)) {
          window.Portal_Core.construirMenuSidebar('INV');
      }

      document.querySelectorAll('.view-container').forEach(view => view.classList.add('hidden'));

      if (accionLogica === 'PortalHome' || accionLogica === 'Login') {
          sidebarObj.classList.add('hidden');
          document.getElementById('ruta-actual').innerText = 'Tablero Principal';
      } else {
          sidebarObj.classList.remove('hidden');
      }

      document.querySelectorAll('.menu li').forEach(li => li.classList.remove('active'));
      const itemMenu = document.getElementById('m-' + accionLogica);
      if(itemMenu) itemMenu.classList.add('active');

      const vistaActivaId = MAPA_CONTENEDORES[accionLogica];
      if (vistaActivaId) document.getElementById(vistaActivaId).classList.remove('hidden');

      if (['MisCasos', 'MiArea', 'TodosLosCasos'].includes(accionLogica) && window.ATC_App.iniciarBandeja) ATC_App.iniciarBandeja(accionLogica);
      else if (accionLogica === 'DetalleCaso' && window.ATC_App.iniciarDetalle) ATC_App.iniciarDetalle(paramExtra);
      else if (accionLogica === 'BuscarCiudadano' && window.ATC_App.iniciarBuscarCiudadano) ATC_App.iniciarBuscarCiudadano();
      else if (accionLogica === 'NuevaRecepcionPaso2' && window.ATC_App.iniciarNuevaRecepcionPaso2) ATC_App.iniciarNuevaRecepcionPaso2();
      else if (accionLogica === 'FichaCiudadano' && window.ATC_App.iniciarFichaCiudadano) ATC_App.iniciarFichaCiudadano(paramExtra);
      
      else if (accionLogica === 'InventarioBandeja' && typeof window.INV_App.iniciarBandeja === 'function') window.INV_App.iniciarBandeja();
      else if (accionLogica === 'InventarioScan' && typeof window.INV_App.iniciarScan === 'function') window.INV_App.iniciarScan();
      else if (accionLogica === 'InventarioFicha' && typeof window.INV_App.iniciarFicha === 'function') window.INV_App.iniciarFicha(paramExtra);

    } catch (errorJS) { 
      console.error(errorJS); 
      Portal_Core.mostrarToast('error', 'Error de Navegación', errorJS.message); 
    }
  }

  function cerrarSesion() {
    Memoria.borrar('sesionDefensoria');
    window.USUARIO_ACTUAL = null;
    
    if(window.Portal_Core.temporizadorNotificaciones) clearInterval(window.Portal_Core.temporizadorNotificaciones);
    
    document.getElementById('dashboard-content').innerHTML = '';
    const formLogin = document.getElementById('form-login');
    if (formLogin) formLogin.reset(); 
    
    verificarSesion();
  }
</script>

<script>
  /**
   * ========================================================================
   * Session_JS.html — V2.1.1
   * PROYECTO: Portal de Gestión - Defensoría del Pueblo
   * ========================================================================
   * Guard: si DB no cargó aún, espera. SupabaseClient_JS reintenta.
   * ========================================================================
   */

  async function verificarSesion() {
    const preloader = document.getElementById('preloader-global');
    if (preloader) preloader.style.display = 'none';

    // Guard: si la librería supabase-js no cargó aún, mostrar login
    // SupabaseClient_JS reintentará verificarSesion() cuando cargue
    if (!window.DB) {
      console.warn('[Session] DB no disponible aún — esperando carga de supabase-js...');
      _mostrarPantallaLogin();
      return;
    }

    try {
      const perfil = await DB.verificarAuth();

      if (perfil) {
        window.USUARIO_ACTUAL = perfil;
        Memoria.guardar('sesionDefensoria', perfil);

        document.body.classList.remove('modo-login');
        const topbar   = document.getElementById('topbar');
        const nombreEl = document.getElementById('nombre-usuario-topbar');
        if (topbar)   topbar.classList.remove('hidden');
        if (nombreEl) nombreEl.innerText = perfil.nombre;

        await arrancarEntornoGlobal(perfil);
      } else {
        Memoria.borrar('sesionDefensoria');
        window.USUARIO_ACTUAL = null;
        _mostrarPantallaLogin();
      }
    } catch (err) {
      console.error('[Session] Error verificando auth:', err);
      Memoria.borrar('sesionDefensoria');
      _mostrarPantallaLogin();
    }
  }

  async function arrancarEntornoGlobal(usuario) {
    document.querySelectorAll('.view-container').forEach(v => v.classList.add('hidden'));

    const contenedor = document.getElementById('contenedor-principal');
    const spinner    = document.createElement('div');
    spinner.id       = 'spinner-arranque';
    spinner.innerHTML = `
      <div style="display:flex; flex-direction:column; justify-content:center;
                  align-items:center; height:60vh; width:100%;">
        <i class="fas fa-circle-notch spinner fa-2x"
           style="color:var(--primary); margin-bottom:15px;"></i>
        <span style="color:var(--text-muted); font-weight:500;">
          Iniciando sistema central...
        </span>
      </div>`;
    if (contenedor) contenedor.appendChild(spinner);

    try {
      const [areasRes, agentesRes] = await Promise.all([
        DB.from('areas').select('id,nombre').order('nombre'),
        DB.from('agentes').select('id,nombre,apellido').eq('estado', true).order('apellido')
      ]);

      const diccionarios = {
        areas:   areasRes.data || [],
        agentes: agentesRes.data || []
      };
      Memoria.guardar('diccionariosGlobales', diccionarios);

      const notis = await _cargarNotificacionesDirecto(usuario);

      const spinnerEl = document.getElementById('spinner-arranque');
      if (spinnerEl) spinnerEl.remove();

      Portal_Core.iniciarNotificaciones(notis.lista, notis.total);
      _iniciarPollingNotificaciones(usuario);
    
    cargarModulo('PortalHome');

      // Mostrar card de Admin solo para tipo Sistemas
      if (window.USUARIO_ACTUAL && parseInt(window.USUARIO_ACTUAL.tipoUsuario) === 1) {
        const cardAdmin = document.getElementById('hub-card-admin');
        if (cardAdmin) cardAdmin.style.display = '';
      } 

    } catch (err) {
      const spinnerEl = document.getElementById('spinner-arranque');
      if (spinnerEl) spinnerEl.innerHTML = `
        <div style="color:var(--danger); padding:20px; text-align:center;">
          <b>Fallo de conexión:</b> ${err.message}
        </div>`;
    }
  }

  async function _cargarNotificacionesDirecto(usuario) {
    try {
      const qMios = await DB.from('vw_bandeja_casos')
        .select('recepcion_id, categoria, fecha_inicio', { count: 'exact' })
        .eq('agente_responsable_id', usuario.idAgente)
        .eq('estado_id', 1)
        .order('fecha_inicio', { ascending: false })
        .limit(5);

      const qArea = await DB.from('vw_bandeja_casos')
        .select('recepcion_id, categoria, fecha_inicio', { count: 'exact' })
        .eq('area_destino_id', usuario.idArea)
        .eq('estado_id', 4)
        .order('fecha_inicio', { ascending: false })
        .limit(5);

      let lista = [];
      const totalMios = qMios.count || 0;
      const totalArea = qArea.count || 0;

      (qMios.data || []).forEach(r => lista.push({
        id: r.recepcion_id, tipo: 'personal', titulo: r.categoria || 'Sin categoría',
        fecha: r.fecha_inicio ? new Date(r.fecha_inicio).toLocaleString('es-AR') : 'S/D',
        mensaje: 'Asignado a ti. Requiere inicio de gestión.'
      }));

      (qArea.data || []).forEach(r => lista.push({
        id: r.recepcion_id, tipo: 'area', titulo: r.categoria || 'Sin categoría',
        fecha: r.fecha_inicio ? new Date(r.fecha_inicio).toLocaleString('es-AR') : 'S/D',
        mensaje: 'Pendiente en tu área. Sin agente asignado.'
      }));

      return { lista, total: totalMios + totalArea };
    } catch (e) {
      return { lista: [], total: 0 };
    }
  }

  let _pollingNotisTimer = null;

  function _iniciarPollingNotificaciones(usuario) {
    if (_pollingNotisTimer) clearInterval(_pollingNotisTimer);

    _pollingNotisTimer = setInterval(async () => {
      if (!window.USUARIO_ACTUAL || !window.DB) return;
      try {
        const totalAnterior = Portal_Core.estadoTotalNotis || 0;
        const notis = await _cargarNotificacionesDirecto(usuario);

        Portal_Core.estadoNotificaciones = notis.lista;
        Portal_Core.estadoTotalNotis     = notis.total;
        Portal_Core.renderizarBadge();

        if (notis.total > totalAnterior) {
          Portal_Core.mostrarToast('info', 'Actualización de Bandeja',
            'Tenés ' + notis.total + ' casos que requieren atención.', 8000, false);
          Portal_Core.reproducirSonido('campana');
        }

        const panel = document.getElementById('panel-notificaciones');
        if (panel && !panel.classList.contains('hidden')) {
          Portal_Core.renderizarPanelNotificaciones();
        }
      } catch (e) {
        console.warn('[Polling] Error:', e.message);
      }
    }, 30000);
  }

  async function cerrarSesion() {
    if (window.DB) await DB.logout();

    Memoria.borrar('sesionDefensoria');
    Memoria.borrar('diccionariosGlobales');
    Memoria.borrar('diccionariosATC');
    Memoria.borrar('diccionariosINV');
    window.USUARIO_ACTUAL = null;

    if (_pollingNotisTimer) { clearInterval(_pollingNotisTimer); _pollingNotisTimer = null; }
    if (Portal_Core.temporizadorNotificaciones) { clearInterval(Portal_Core.temporizadorNotificaciones); Portal_Core.temporizadorNotificaciones = null; }
    if (window.ATC_App && ATC_App.temporizadores && ATC_App.temporizadores.bandeja) { clearInterval(ATC_App.temporizadores.bandeja); ATC_App.temporizadores.bandeja = null; }
    if (window.INV_App && typeof INV_App.detenerCamaraEnVivo === 'function') INV_App.detenerCamaraEnVivo();

    const dc = document.getElementById('dashboard-content'); if (dc) dc.innerHTML = '';
    const fl = document.getElementById('form-login'); if (fl) fl.reset();

    verificarSesion();
  }

  function _mostrarPantallaLogin() {
    document.body.classList.add('modo-login');
    const sidebar = document.getElementById('sidebar');
    const topbar  = document.getElementById('topbar');
    if (sidebar) sidebar.classList.add('hidden');
    if (topbar)  topbar.classList.add('hidden');
    cargarModulo('Login');
  }
</script>

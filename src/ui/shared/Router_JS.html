<script>
  /**
   * ========================================================================
   * Router_JS.html
   * PROYECTO: Portal de Gestión - Defensoría del Pueblo
   * ========================================================================
   */

  const MAPA_MODULOS = {
    // -- ATC --
    MisCasos:            { sidebar: 'ATC', topbar: true,  init: (p) => ATC_App.iniciarBandeja('MisCasos') },
    MiArea:              { sidebar: 'ATC', topbar: true,  init: (p) => ATC_App.iniciarBandeja('MiArea') },
    TodosLosCasos:       { sidebar: 'ATC', topbar: true,  init: (p) => ATC_App.iniciarBandeja('TodosLosCasos') },
    DetalleCaso:         { sidebar: 'ATC', topbar: true,  init: (p) => ATC_App.iniciarDetalle(p) },
    BuscarCiudadano:     { sidebar: 'ATC', topbar: true,  init: (p) => ATC_App.iniciarBuscarCiudadano() },
    NuevaRecepcionPaso2: { sidebar: 'ATC', topbar: true,  init: (p) => ATC_App.iniciarNuevaRecepcionPaso2() },
    FichaCiudadano:      { sidebar: 'ATC', topbar: true,  init: (p) => ATC_App.iniciarFichaCiudadano(p) },

    // -- Inventario --
    InventarioBandeja:   { sidebar: 'INV', topbar: true,  init: (p) => INV_App.iniciarBandeja() },
    InventarioScan:      { sidebar: 'INV', topbar: true,  init: (p) => INV_App.iniciarBandeja() },  // redirige a Bandeja
    InventarioFicha:     { sidebar: 'INV', topbar: true,  init: (p) => INV_App.iniciarFicha(p) },

    // -- Hub: muestra topbar pero NO sidebar --
    PortalHome:          { sidebar: null,  topbar: true,  init: (p) => {} },

    // -- Login: sin topbar ni sidebar --
    Login:               { sidebar: null,  topbar: false, init: (p) => {} },
  };

  function cargarModulo(accionLogica, paramExtra = null) {
    try {
      Portal_Core.cerrarSidebar();

      const ruta = MAPA_MODULOS[accionLogica];
      if (!ruta) {
        Portal_Core.mostrarToast('error', 'Ruta no encontrada', `El módulo "${accionLogica}" no está registrado.`);
        return;
      }

      if (ruta.sidebar) {
        Portal_Core.construirMenuSidebar(ruta.sidebar);
      }

      document.querySelectorAll('.view-container').forEach(v => v.classList.add('hidden'));

      const sidebar = document.getElementById('sidebar');
      const topbar  = document.getElementById('topbar');

      // Sidebar: visible solo si la ruta tiene módulo
      if (sidebar) sidebar.classList.toggle('hidden', !ruta.sidebar);

      // Topbar: visible según la propiedad topbar de la ruta (default true)
      const mostrarTopbar = ruta.topbar !== false;
      if (topbar) topbar.classList.toggle('hidden', !mostrarTopbar);

      const idVista = window.MAPA_CONTENEDORES[accionLogica];
      if (idVista) {
        const vista = document.getElementById(idVista);
        if (vista) vista.classList.remove('hidden');
      }

      Portal_Core.marcarItemActivo(accionLogica);

      if (typeof ruta.init === 'function') ruta.init(paramExtra);

    } catch (err) {
      console.error('[Router] Error al cargar módulo:', accionLogica, err);
      Portal_Core.mostrarToast('error', 'Error de Navegación', err.message);
    }
  }
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    /* Layout */
    --side-width: 260px;
    --top-height: 70px;
    --highlight-bg: var(--warning-bg);
    --highlight-color: var(--warning);
    
    /* Paleta Institucional Defensoría */
    --def-violet: #3f22ba;
    --def-orange: #f98d14;
    --def-teal: #2eaf94;
    --def-magenta: #e51c63;
    --def-brown: #6d5a45;
    
    /* Asignación Semántica de la Paleta */
    --primary: var(--def-violet);
    --primary-hover: #321b95; 
    --primary-light: #ece9fa; 
    
    --success: var(--def-teal);
    --success-bg: #e5f6f3;
    --warning: var(--def-orange);
    --warning-bg: #fef2e5;
    --danger: var(--def-magenta);
    --danger-bg: #fce5ec;
    
    /* Neutros y Fondos UI */
    --bg-app: #f8fafc;
    --bg-surface: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border-soft: #e2e8f0;
    --border-hard: #cbd5e1;
    
    /* Efectos */
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
    --radius-md: 12px;
    --radius-lg: 16px;
    --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ==========================================
     RESETEO Y BASE
     ========================================== */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
  
  body { 
    background: var(--bg-app); 
    color: var(--text-main); 
    display: flex; 
    height: 100vh; 
    overflow: hidden; 
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ==========================================
     MODO LOGIN (UX Institucional)
     ========================================== */
  body.modo-login { 
    justify-content: center; 
    align-items: center; 
    background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%); 
  }
  body.modo-login .sidebar, body.modo-login .topbar { display: none !important; }
  body.modo-login .main-content { flex: none; width: 100%; max-width: 480px; padding: 20px; }
  
  .login-card { 
    background: var(--bg-surface); 
    padding: 45px; 
    border-radius: var(--radius-lg); 
    box-shadow: var(--shadow-lg); 
    text-align: center; 
    border: 1px solid rgba(255,255,255,0.8); 
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.5s ease-out;
  }
  
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 5px;
    background: linear-gradient(90deg, var(--def-violet) 0%, var(--def-magenta) 50%, var(--def-orange) 100%);
  }

  .login-logo { width: 80px; margin-bottom: 24px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.08)); }
  .login-title { font-size: 1.75rem; font-weight: 800; color: var(--text-main); margin-bottom: 6px; letter-spacing: -0.02em; }
  .login-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 35px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  
  .form-group { text-align: left; margin-bottom: 22px; }
  .form-group label { display: flex; align-items: center; font-size: 0.8rem; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;}
  .form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border-soft); border-radius: var(--radius-md); font-size: 1rem; outline: none; background: var(--bg-app); transition: var(--transition); color: var(--text-main); }
  .form-group input:focus { border-color: var(--primary); background: var(--bg-surface); box-shadow: 0 0 0 4px var(--primary-light); }
  
  .btn-login { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: var(--radius-md); font-weight: 600; font-size: 1rem; cursor: pointer; transition: var(--transition); display: flex; justify-content: center; align-items: center; box-shadow: var(--shadow-sm); }
  .btn-login:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .btn-login:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ==========================================
     LAYOUT PRINCIPAL (APP)
     ========================================== */
  .sidebar { width: var(--side-width); background: var(--bg-surface); border-right: 1px solid var(--border-soft); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; z-index: 10; }
  .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .topbar { height: var(--top-height); background: var(--bg-surface); border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; flex-shrink: 0; z-index: 5; }
  #contenedor-principal { flex: 1; overflow-y: auto; padding: 32px 40px; background: var(--bg-app); position: relative; }

  /* ==========================================
     SIDEBAR Y MENÚ
     ========================================== */
  .brand { padding: 30px 24px 25px; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 12px; font-size: 1.25rem; letter-spacing: -0.02em; }
  .brand i { color: var(--primary); font-size: 1.4rem; }
  
  .menu { list-style: none; padding: 0 16px; }
  .menu li { padding: 12px 16px; margin-bottom: 6px; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center; gap: 14px; color: var(--text-muted); font-size: 0.95rem; font-weight: 500; transition: var(--transition); border: 1px solid transparent; }
  .menu li i { width: 20px; text-align: center; font-size: 1.1rem; transition: var(--transition); }
  .menu li:hover { background: var(--bg-app); color: var(--text-main); border-color: var(--border-soft); }
  .menu li.active { background: var(--primary-light); color: var(--primary); font-weight: 600; border-color: transparent; }
  .menu li.active i { color: var(--primary); }

  /* ==========================================
     BANDEJA Y TARJETAS
     ========================================== */
  .header-bandeja { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; gap: 20px; }
  .search-box { position: relative; width: 400px; flex-shrink: 0; }
  .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  .search-box input { width: 100%; padding: 14px 20px 14px 50px; border: 1.5px solid var(--border-soft); border-radius: var(--radius-md); outline: none; background: var(--bg-surface); transition: var(--transition); font-size: 0.95rem; color: var(--text-main); box-shadow: var(--shadow-sm); }
  .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }

  .tab-estado { padding: 8px 18px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border-soft); background: var(--bg-surface); color: var(--text-muted); transition: var(--transition); white-space: nowrap; box-shadow: var(--shadow-sm); }
  .tab-estado:hover { border-color: var(--border-hard); color: var(--text-main); transform: translateY(-1px); }
  .tab-estado.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(63, 34, 186, 0.25); }

  .card-caso {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    padding: 0;
    display: flex;
    flex-direction: row;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-caso:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--border-hard);
  }

  /* ==========================================
     DETALLE Y FORMULARIOS (Fichas)
     ========================================== */
  .layout-detalle { display: grid; grid-template-columns: 400px 1fr; gap: 24px; align-items: start; }
  
  .ficha-card { background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
  .ficha-header { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-soft); padding-bottom: 12px; }
  .grid-datos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; }
  .dato-lbl { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; display: block; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
  .dato-val { font-size: 0.95rem; font-weight: 500; color: var(--text-main); word-break: break-word; display: block; }
  
  /* ==========================================
     BOTONES Y COMPONENTES
     ========================================== */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: var(--transition); text-decoration: none; }
  .btn:active { transform: scale(0.98); }
  
  .btn-icono { width: 40px; height: 40px; padding: 0; background: var(--bg-surface); border-color: var(--border-soft); color: var(--text-muted); border-radius: 50%; }
  .btn-icono:hover { border-color: var(--border-hard); color: var(--text-main); background: var(--bg-app); }
  
  .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
  .btn-primary:hover { background: var(--primary-hover); box-shadow: var(--shadow-md); }
  
  .btn-success { background: var(--success); color: white; box-shadow: var(--shadow-sm); }
  .btn-success:hover { background: #238b77; box-shadow: var(--shadow-md); }
  
  .btn-outline { background: var(--bg-surface); border-color: var(--border-soft); color: var(--text-main); box-shadow: var(--shadow-sm); }
  .btn-outline:hover { background: var(--bg-app); border-color: var(--border-hard); }

  .badge-cat {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 6px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    background: var(--warning-bg);
    color: var(--warning);
  }

  .badge-exp {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 700;
    background: var(--success-bg);
    color: var(--success);
  }
  
  /* ==========================================
     TIMELINE
     ========================================== */
  .tabs { display: flex; gap: 20px; border-bottom: 2px solid var(--border-soft); margin-bottom: 24px; }
  .tab-btn { padding: 12px 0; border: none; background: none; cursor: pointer; font-weight: 600; color: var(--text-muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: var(--transition); font-size: 0.95rem; }
  .tab-btn:hover { color: var(--text-main); }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

  .timeline { border-left: 2px solid var(--border-soft); padding-left: 24px; margin-left: 12px; margin-top: 10px; }
  .tl-item { margin-bottom: 28px; position: relative; }
  .tl-dot { position: absolute; left: -31px; top: 4px; width: 12px; height: 12px; border-radius: 50%; border: 4px solid var(--bg-surface); box-sizing: content-box; box-shadow: 0 0 0 1px var(--border-soft); }
  .tl-content { background: var(--bg-app); border: 1px solid var(--border-soft); padding: 16px 20px; border-radius: var(--radius-md); transition: var(--transition); }
  .tl-content:hover { border-color: var(--border-hard); background: var(--bg-surface); box-shadow: var(--shadow-sm); }

  .hidden { display: none !important; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 0.8s linear infinite; }

  /* ==========================================
     SISTEMA DE NOTIFICACIONES (TOASTS)
     ========================================== */
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
  .toast-card { pointer-events: auto; background: var(--bg-surface); border-radius: var(--radius-md); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15); padding: 16px 20px; min-width: 300px; max-width: 400px; display: flex; align-items: flex-start; gap: 12px; transform: translateX(120%); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-left: 5px solid var(--primary); }
  .toast-card.show { transform: translateX(0); opacity: 1; }
  .toast-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
  .toast-content { flex-grow: 1; }
  .toast-title { font-weight: 700; font-size: 0.95rem; color: var(--text-main); margin-bottom: 4px; }
  .toast-message { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }
  .toast-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 0; }
  .toast-success { border-left-color: var(--success); } .toast-success .toast-icon { color: var(--success); }
  .toast-error { border-left-color: var(--danger); } .toast-error .toast-icon { color: var(--danger); }
  .toast-warning { border-left-color: var(--warning); } .toast-warning .toast-icon { color: var(--warning); }
  .toast-info { border-left-color: var(--primary); } .toast-info .toast-icon { color: var(--primary); }

  /* ==========================================
     RESPONSIVE Y MOBILE-FIRST (NUEVO)
     ========================================== */
  .sidebar-overlay { display: none; }
  .hidden-desktop { display: none !important; }

  /* Tablets y Pantallas Medianas */
  @media (max-width: 1024px) {
    .layout-detalle { grid-template-columns: 1fr; }
    .grid-datos { grid-template-columns: 1fr; }
    .card-caso {
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 16px;
    }
    .header-bandeja { flex-direction: column; align-items: stretch; }
    .search-box { width: 100%; }
  }

  /* Celulares (Menú Hamburguesa y Off-Canvas) */
  @media (max-width: 768px) {
    .hidden-desktop { display: inline-flex !important; }
    
    /* Configuración del Sidebar Off-Canvas */
    .sidebar {
      position: fixed;
      left: -300px;
      top: 0;
      height: 100vh;
      z-index: 10000;
      box-shadow: var(--shadow-lg);
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sidebar.open { left: 0; }
    
    /* Fondo oscuro al abrir el menú */
    .sidebar-overlay {
      display: block;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(2px);
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* Topbar más compacta */
    .topbar { padding: 0 16px; gap: 10px; }
    #nombre-usuario-topbar, .user-role-label { display: none !important; }
    
    /* Contenedor principal sin tanto margen */
    #contenedor-principal { padding: 20px 16px; }
    
    /* Adaptación de Login */
    .login-card { padding: 30px 20px; }
    
    /* Botonera y Fuentes un poco más chicas */
    .btn { padding: 10px 14px; font-size: 0.85rem; }
    .toast-container { right: 10px; left: 10px; top: 10px; }
    .toast-card { min-width: 100%; }
  }
</style>

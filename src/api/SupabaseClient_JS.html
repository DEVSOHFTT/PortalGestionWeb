<script>
  /**
   * ========================================================================
   * SupabaseClient_JS.html — Compatible con GAS iframe
   * ========================================================================
   * Espera a que supabase-js cargue desde el CDN antes de inicializar.
   * Si la librería no carga en 10s, usa GAS legacy como fallback.
   * ========================================================================
   */

  const SUPABASE_URL      = 'https://qgegablqfspqczxygwvf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnZWdhYmxxZnNwcWN6eHlnd3ZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzODY3NDQsImV4cCI6MjA4Nzk2Mjc0NH0.5vFy9sEnT0ThEeL43_gbZS71PJW30D6k_cYnmfsoH4s';

  // Placeholder hasta que la librería cargue
  window.DB = null;
  window._supabaseReady = false;

  function _initSupabaseClient() {
    if (!window.supabase || !window.supabase.createClient) return false;

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.DB = {
      _client: client,
      from: (tabla) => client.from(tabla),
      rpc:  (fn, params) => client.rpc(fn, params),

      login: async function(dni, password) {
        const email = dni.trim() + '@defensoria.local';
        const { data, error } = await client.auth.signInWithPassword({ email, password });
        if (error) return { success: false, message: error.message };

        const { data: perfil, error: perfilError } = await client.rpc('obtener_perfil_agente');
        if (perfilError) return { success: false, message: perfilError.message };

        const p = typeof perfil === 'string' ? JSON.parse(perfil) : perfil;
        if (!p.success) return { success: false, message: p.message };
        return { success: true, user: p };
      },

      logout: async function() { await client.auth.signOut(); },

      getSession: async function() {
        const { data: { session } } = await client.auth.getSession();
        return session;
      },

      verificarAuth: async function() {
        const session = await this.getSession();
        if (!session) return null;
        const { data: perfil, error } = await client.rpc('obtener_perfil_agente');
        if (error) return null;
        const p = typeof perfil === 'string' ? JSON.parse(perfil) : perfil;
        return p.success ? p : null;
      },

      fetchPaginado: async function(vista, query) {
        query = query || {};
        let q = client.from(vista).select(query.select || '*', { count: 'exact' });
        if (query.filters)  query.filters.forEach(f => { q = q.filter(f.col, f.op, f.val); });
        if (query.order)    q = q.order(query.order.col, { ascending: query.order.asc ?? false });
        if (query.limit)    q = q.limit(query.limit);
        if (query.offset)   q = q.range(query.offset, query.offset + (query.limit || 20) - 1);
        if (query.ilike)    Object.entries(query.ilike).forEach(([col, val]) => { q = q.ilike(col, val); });
        if (query.eq)       Object.entries(query.eq).forEach(([col, val]) => { q = q.eq(col, val); });
        const { data, count, error } = await q;
        if (error) throw new Error(error.message);
        return { data: data || [], count: count || 0 };
      },

      insert: async function(tabla, payload) {
        const { data, error } = await client.from(tabla).insert(payload).select();
        if (error) throw new Error(error.message);
        return data;
      },

      update: async function(tabla, id, payload) {
        const { data, error } = await client.from(tabla).update(payload).eq('id', id).select();
        if (error) throw new Error(error.message);
        return data;
      },

      softDelete: async function(tabla, registroId, agenteId) {
        const { data, error } = await client.rpc('soft_delete', {
          p_tabla: tabla, p_registro_id: registroId, p_agente_id: agenteId
        });
        if (error) throw new Error(error.message);
        return typeof data === 'string' ? JSON.parse(data) : data;
      },

      subscribe: function(tabla, evento, callback) {
        return client.channel('public:' + tabla)
          .on('postgres_changes', { event: evento, schema: 'public', table: tabla }, callback)
          .subscribe();
      }
    };

    window._supabaseReady = true;
    console.log('[Supabase] Cliente inicializado correctamente.');
    return true;
  }

  // Intentar inicializar inmediatamente
  if (!_initSupabaseClient()) {
    // Si la librería aún no cargó, reintentar cada 100ms (máx 10s)
    var _sbRetry = setInterval(function() {
      if (_initSupabaseClient()) {
        clearInterval(_sbRetry);
        // Si el sistema ya intentó arrancar y falló, reintentar
        if (document.getElementById('preloader-global') &&
            document.getElementById('preloader-global').style.display !== 'none') {
          console.log('[Supabase] Librería cargó tarde — reintentando arranque...');
          if (typeof verificarSesion === 'function') verificarSesion();
        }
      }
    }, 100);

    // Timeout de seguridad
    setTimeout(function() {
      clearInterval(_sbRetry);
      if (!window._supabaseReady) {
        console.error('[Supabase] La librería no cargó en 10 segundos.');
      }
    }, 10000);
  }
</script>
